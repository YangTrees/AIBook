<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第26课：给AI的清楚指什- 互动游成</title>
    <!-- Tailwind CSS -->
    <script src="../../libs/libs/tailwind.min.js"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="../../libs/libs/react.production.min.js"></script>
    <script crossorigin src="../../libs/libs/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="../../libs/libs/babel.min.js"></script>
    <!-- Tone.js for Sound Effects -->
    <script src="../../libs/libs/Tone.js"></script>
    
    <style>
        body { font-family: 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #f0fdfa; overflow-x: hidden; }
        
        /* 通用动画 */
        .bounce-hover:hover { transform: translateY(-5px); transition: all 0.2s ease; }
        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* 魔法闪烁特效 */
        .magic-sparkle { animation: sparkle 2s infinite alternate; }
        @keyframes sparkle {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
            100% { filter: hue-rotate(30deg) drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); }
        }
        
        /* 错误震动特效 */
        .shake-error { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* 魔法锅熬制动画*/
        .cauldron-bubble { animation: bubble 1s infinite alternate; }
        @keyframes bubble {
            0% { transform: scale(1) rotate(-2deg); }
            100% { transform: scale(1.05) rotate(2deg); filter: drop-shadow(0 0 20px #a855f7); }
        }

        /* 魔法光束动画 */
        .magic-beam {
            position: absolute;
            height: 10px;
            background: linear-gradient(90deg, transparent, #a855f7, #fde047, #a855f7, transparent);
            width: 200%;
            left: -50%;
            top: 50%;
            transform: translateY(-50%);
            animation: shootBeam 0.5s ease-out forwards;
            opacity: 0;
            z-index: 10;
        }
        @keyframes shootBeam {
            0% { transform: translateY(-50%) translateX(-50%); opacity: 1; }
            100% { transform: translateY(-50%) translateX(50%); opacity: 0; }
        }

        /* 漂浮动画 */
        .float-idle { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .cloud-bg { background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="80" r="15" fill="%23e0f2fe" opacity="0.5"/><circle cx="50" cy="70" r="25" fill="%23e0f2fe" opacity="0.5"/><circle cx="80" cy="80" r="15" fill="%23e0f2fe" opacity="0.5"/></svg>'); }
        
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 音效管理系统 ---
let toneStarted = false;
        const playSound = async (type) => {
            try {
                if (!toneStarted) {
                    await Tone.start();
                    toneStarted = true;
                }
                const synth = new Tone.PolySynth(Tone.Synth).toDestination();
                synth.volume.value = -10; // 降低音量保护儿童听力
const now = Tone.now();
                switch (type) {
                    case 'click':
                        synth.triggerAttackRelease("C5", "32n", now);
                        break;
                    case 'drop':
                        synth.triggerAttackRelease("G4", "16n", now);
                        break;
                    case 'magic':
                        synth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "8n", now);
                        break;
                    case 'success':
                        synth.triggerAttackRelease("C4", "8n", now);
                        synth.triggerAttackRelease("E4", "8n", now + 0.15);
                        synth.triggerAttackRelease("G4", "8n", now + 0.3);
                        synth.triggerAttackRelease("C5", "4n", now + 0.45);
                        break;
                    case 'error':
                        synth.triggerAttackRelease("C3", "8n", now);
                        synth.triggerAttackRelease("A2", "4n", now + 0.2);
                        break;
                }
            } catch (error) {
                console.log("Sound disabled or error:", error);
            }
        };

        // --- 游成 1: 魔法锅合成大收集 ---
const Game1 = ({ globalStars, addStar }) => {
            const [target, setTarget] = useState(null);
            const [condition, setCondition] = useState(null);
            const [format, setFormat] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [result, setResult] = useState(null);
            const [collection, setCollection] = useState([]);

            const targets = [
                { id: 'cat', icon: '🐱', name: '橘猫' },
                { id: 'dog', icon: '🐶', name: '小狗' },
                { id: 'robot', icon: '🤖', name: '机器人' }
            ];
            const conditions = [
                { id: 'raincoat', icon: '🧥', name: '穿雨衣' },
                { id: 'sunglasses', icon: '🕶️', name: '戴墨镜' },
                { id: 'magic', icon: '🪄', name: '拿魔杖' }
            ];
            const formats = [
                { id: 'moon', icon: '🌙', name: '在月球上' },
                { id: 'umbrella', icon: '⭐', name: '在蓝伞下' },
                { id: 'garden', icon: '🌻', name: '在花园里' }
            ];

            const handleSelect = (setter, item) => {
                playSound('drop');
                setter(item);
            };

            const handleGenerate = () => {
                if (target && condition && format) {
                    playSound('magic');
                    setIsGenerating(true);
                    
                    setTimeout(() => {
                        setIsGenerating(false);
                        playSound('success');
                        const newResult = `${target.icon} ${condition.icon} ${format.icon}`;
                        setResult({
                            icons: newResult,
                            desc: `一叀${condition.name}的${target.name}：${format.name}`
                        });
                        
                        // 加入收藏天
const comboId = `${target.id}-${condition.id}-${format.id}`;
                        if (!collection.some(c => c.id === comboId)) {
                            setCollection(prev => [...prev, { id: comboId, icons: newResult }]);
                            addStar(1);
                        }
                    }, 2000);
                }
            };

            const reset = () => {
                playSound('click');
                setTarget(null); setCondition(null); setFormat(null); setResult(null);
            };

            return (
                <div className="bg-white rounded-3xl p-6 shadow-xl border-4 border-teal-200 pop-in cloud-bg">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-2xl font-bold text-teal-600">🍲 游成1：魔法锅合成收集</h2>
                        <div className="bg-yellow-100 text-yellow-600 px-4 py-2 rounded-full font-bold shadow-sm flex items-center gap-2">
                            <span>⭕x {globalStars}</span>
                            <span className="text-sm border-l border-yellow-300 pl-2">收集图鉴: {collection.length}/27</span>
                        </div>
                    </div>
                    <p className="text-center text-gray-600 mb-6 font-bold bg-white/80 py-2 rounded-xl">
                        把提示词【三件套】丢进魔法锅，看看能炼出什么卡片！
                    </p>
                    
                    {!result ? (
                        <div className="relative">
                            <div className="flex flex-col md:flex-row justify-between gap-4 mb-8">
                                {/* 目标货架 */}
                                <div className="flex-1 bg-pink-50 p-4 rounded-2xl border-2 border-pink-200 shadow-inner">
                                    <h3 className="text-center font-bold text-pink-500 mb-3 bg-white py-1 rounded-full border border-pink-200">🎯 第一件：选目格</h3>
                                    <div className="flex justify-center gap-2">
                                        {targets.map(t => (
                                            <button key={t.id} onClick={() => handleSelect(setTarget, t)} 
                                                className={`text-3xl p-2 rounded-full transition-all w-14 h-14 flex items-center justify-center
                                                    ${target?.id === t.id ? 'bg-pink-400 text-white scale-110 shadow-lg ring-4 ring-pink-200' : 'bg-white hover:bg-pink-100 shadow-sm border border-pink-100'}`}>
                                                {t.icon}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                {/* 条件货架 */}
                                <div className="flex-1 bg-yellow-50 p-4 rounded-2xl border-2 border-yellow-200 shadow-inner">
                                    <h3 className="text-center font-bold text-yellow-600 mb-3 bg-white py-1 rounded-full border border-yellow-200">📏 第二件：加条什</h3>
                                    <div className="flex justify-center gap-2">
                                        {conditions.map(c => (
                                            <button key={c.id} onClick={() => handleSelect(setCondition, c)} 
                                                className={`text-3xl p-2 rounded-full transition-all w-14 h-14 flex items-center justify-center
                                                    ${condition?.id === c.id ? 'bg-yellow-400 text-white scale-110 shadow-lg ring-4 ring-yellow-200' : 'bg-white hover:bg-yellow-100 shadow-sm border border-yellow-100'}`}>
                                                {c.icon}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                {/* 背景货架 */}
                                <div className="flex-1 bg-blue-50 p-4 rounded-2xl border-2 border-blue-200 shadow-inner">
                                    <h3 className="text-center font-bold text-blue-500 mb-3 bg-white py-1 rounded-full border border-blue-200">🖼︀第三件：定背晀</h3>
                                    <div className="flex justify-center gap-2">
                                        {formats.map(f => (
                                            <button key={f.id} onClick={() => handleSelect(setFormat, f)} 
                                                className={`text-3xl p-2 rounded-full transition-all w-14 h-14 flex items-center justify-center
                                                    ${format?.id === f.id ? 'bg-blue-400 text-white scale-110 shadow-lg ring-4 ring-blue-200' : 'bg-white hover:bg-blue-100 shadow-sm border border-blue-100'}`}>
                                                {f.icon}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* 魔法锅区埀*/}
                            <div className="flex flex-col items-center mt-8 relative">
                                <div className="absolute top-[-40px] flex gap-4 text-4xl z-10 drop-shadow-md">
                                    {target && <div className="pop-in">{target.icon}</div>}
                                    {condition && <div className="pop-in">{condition.icon}</div>}
                                    {format && <div className="pop-in">{format.icon}</div>}
                                </div>
                                
                                <div className={`text-8xl transition-all duration-300 ${isGenerating ? 'cauldron-bubble filter hue-rotate-90' : 'float-idle'} mb-4 relative`}>
                                    🍲
                                    {isGenerating && <div className="absolute top-0 left-1/2 -translate-x-1/2 text-4xl magic-sparkle z-20">✅</div>}
                                </div>
                                
                                <button 
                                    onClick={handleGenerate}
                                    disabled={!target || !condition || !format || isGenerating}
                                    className={`px-10 py-4 rounded-full text-2xl font-bold shadow-xl transition-all transform z-20 border-4 border-white/50
                                        ${(!target || !condition || !format) ? 'bg-gray-300 text-gray-500 cursor-not-allowed border-gray-400' : 'bg-gradient-to-r from-purple-500 to-indigo-500 text-white hover:scale-105 active:scale-95 magic-sparkle'}`}>
                                    {isGenerating ? '🌟 魔法融合一..' : '✅念出提示词咒语！'}
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="pop-in flex flex-col items-center gap-6 py-8">
                            <div className="text-7xl bg-gradient-to-br from-yellow-100 to-orange-100 p-10 rounded-3xl shadow-2xl border-8 border-yellow-300 magic-sparkle relative">
                                <div className="absolute -top-4 -left-4 bg-red-500 text-white text-sm px-3 py-1 rounded-full font-bold transform -rotate-12">NEW!</div>
                                {result.icons}
                            </div>
                            <div className="text-gray-800 font-bold text-2xl bg-white px-6 py-2 rounded-2xl shadow-sm border-2 border-gray-200">
                                📜 "{result.desc}"
                            </div>
                            <button onClick={reset} className="mt-4 bg-teal-500 hover:bg-teal-600 text-white px-8 py-3 rounded-full font-bold shadow-lg transition transform hover:scale-105 text-xl flex items-center gap-2">
                                <span>🔄 再炼一销</span>
                            </button>
                        </div>
                    )}

                    {/* 收集图鉴 */}
                    {collection.length > 0 && (
                        <div className="mt-12 bg-white/50 p-4 rounded-2xl border-2 border-dashed border-teal-300">
                            <h4 className="font-bold text-teal-700 mb-3 flex items-center gap-2">📁 我的魔法画廊 ({collection.length})</h4>
                            <div className="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                                {collection.map((item, idx) => (
                                    <div key={idx} className="bg-white p-3 rounded-xl shadow-sm border border-gray-200 text-2xl flex-shrink-0 pop-in hover:scale-110 transition-transform cursor-pointer" title={item.id}>
                                        {item.icons}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 游成 2: 打败模糊怀(RPG Battle Style) ---
const Game2 = ({ globalStars, addStar }) => {
            const [step, setStep] = useState(0);
            const [showSuccess, setShowSuccess] = useState(false);
            const [isShaking, setIsShaking] = useState(false);
            const [beamActive, setBeamActive] = useState(false);
            const [message, setMessage] = useState("快用【清楚的提示词】打败模糊怪！");

            const challenges = [
                {
                    enemyHp: 3,
                    fuzzy: "帮我画画",
                    fuzzyImg: "🌫️👦",
                    options: [
                        { text: "随便画点什乀(太模糊啦)", isCorrect: false },
                        { text: "画一只线色小猫坐在月亮上", isCorrect: true },
                        { text: "用笔画个动物 (缺细节哦)", isCorrect: false }
                    ],
                    clearImg: "🐈🟥🌙"
                },
                {
                    enemyHp: 2,
                    fuzzy: "画个房子",
                    fuzzyImg: "🌫️🏆",
                    options: [
                        { text: "画大一点的房子 (多大算大：", isCorrect: false },
                        { text: "画一座蘑菇屋，在发光的森林里", isCorrect: true },
                        { text: "画一个彩色的房子 (不够具体)", isCorrect: false }
                    ],
                    clearImg: '🍄🏠✅'
                },
                {
                    enemyHp: 1,
                    fuzzy: "画个圈",
                    fuzzyImg: "🌫️⭕",
                    options: [
                        { text: "画一个写实风格的蓝色地球！", isCorrect: true },
                        { text: "画个大圆圈(还是不清楀", isCorrect: false },
                        { text: "随便画个圆的东西 (AI听不懀", isCorrect: false }
                    ],
                    clearImg: '🌍✨🔍'
                }
            ];

            const current = challenges[step];

            const handleOptionClick = (isCorrect) => {
                if (isCorrect) {
                    playSound('magic');
                    setBeamActive(true);
                    setMessage('魔法击中！提示词非常清晰！');
                    
                    setTimeout(() => {
                        setBeamActive(false);
                        playSound('success');
                        setShowSuccess(true);
                        addStar(2);
                    }, 500);

                } else {
                    playSound('error');
                    setIsShaking(true);
                    setMessage('哎呀，咒语太模糊，魔法失效了！');
                    setTimeout(() => setIsShaking(false), 400);
                }
            };

            const nextStep = () => {
                playSound('click');
                if (step < challenges.length - 1) {
                    setStep(step + 1);
                    setShowSuccess(false);
                    setMessage('新的模糊怪出现了！');
                } else {
                    setStep(0); 
                    setShowSuccess(false);
                    setMessage("快用【清楚的提示词】打败模糊怪！");
                }
            };

            return (
                <div className="bg-white rounded-3xl p-6 shadow-xl border-4 border-indigo-200 pop-in relative overflow-hidden">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-2xl font-bold text-indigo-600">⚔️ 游成2：模糊建散大作战</h2>
                        <div className="bg-yellow-100 text-yellow-600 px-4 py-2 rounded-full font-bold shadow-sm flex items-center gap-2">
                            <span>⭕x {globalStars}</span>
                            <span className="text-sm border-l border-yellow-300 pl-2">关卡: {step + 1}/{challenges.length}</span>
                        </div>
                    </div>
                    
                    {/* 战斗舞台 */}
                    <div className="bg-gray-900 rounded-2xl p-8 mb-6 relative overflow-hidden border-4 border-gray-700 h-64 flex flex-col justify-center">
                        {/* 魔法光束层*/}
                        {beamActive && <div className="magic-beam"></div>}

                        <div className="flex justify-between items-center relative z-20">
                            {/* 玩家/法师 */}
                            <div className="flex flex-col items-center">
                                <div className="text-6xl mb-2 float-idle">🧙♂︀</div>
                                <div className="bg-indigo-500 text-white text-xs px-3 py-1 rounded-full font-bold">团团法师</div>
                            </div>

                            {/* VS 标志或信恀*/}
                            <div className="flex-1 flex justify-center text-center px-4">
                                <div className={`text-sm font-bold px-4 py-2 rounded-xl border-2 transition-colors
                                    ${showSuccess ? 'bg-green-100 text-green-700 border-green-400' : 'bg-gray-800 text-yellow-300 border-gray-600'}`}>
                                    {message}
                                </div>
                            </div>

                            {/* 敌人/目标 */}
                            <div className="flex flex-col items-center">
                                <div className={`text-7xl mb-2 transition-all duration-500 
                                    ${isShaking ? 'shake-error' : ''} 
                                    ${!showSuccess ? 'float-idle filter drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]' : 'magic-sparkle scale-110'}`}>
                                    {showSuccess ? current.clearImg : current.fuzzyImg}
                                </div>
                                {!showSuccess && (
                                    <div className="bg-red-500 text-white text-xs px-3 py-1 rounded-full font-bold animate-pulse">
                                        模糊怀HP: {"❤️".repeat(current.enemyHp)}
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        {/* 模糊怪的台词 */}
                        {!showSuccess && (
                            <div className="absolute top-4 right-20 bg-white text-gray-800 text-xs px-3 py-1 rounded-xl rounded-br-none font-bold border-2 border-gray-300">
                                "{current.fuzzy}"
                            </div>
                        )}
                    </div>

                    {/* 操作区*/}
                    {!showSuccess ? (
                        <div className="space-y-3 max-w-lg mx-auto">
                            <h3 className="text-center font-bold text-gray-700 mb-2">选择清楚的咒语卡片：</h3>
                            {current.options.map((opt, i) => (
                                <button key={i} onClick={() => handleOptionClick(opt.isCorrect)}
                                    className="w-full text-left bg-gradient-to-r from-blue-50 to-indigo-50 hover:from-blue-100 hover:to-indigo-100 border-2 border-indigo-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-all font-bold text-gray-700 flex items-center justify-between group bounce-hover relative overflow-hidden">
                                    <span className="relative z-10">{opt.text}</span>
                                    <span className="text-indigo-300 group-hover:text-indigo-600 text-2xl relative z-10">🪄</span>
                                    {/* 卡片高光 */}
                                    <div className="absolute top-0 left-[-100%] w-1/2 h-full bg-white opacity-20 transform skew-x-12 group-hover:animate-[slideRight_1s_ease-out]"></div>
                                </button>
                            ))}
                        </div>
                    ) : (
                        <div className="text-center pop-in mt-6">
                            <div className="text-3xl font-bold text-green-500 mb-6 drop-shadow-sm">🌟 恭喜！成功驱散模糊！</div>
                            <button onClick={nextStep} className="bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-10 py-4 rounded-full font-bold shadow-xl transition transform hover:scale-105 text-xl flex items-center justify-center mx-auto gap-2">
                                <span>{step < challenges.length - 1 ? '战战下一只怪物 🚀' : '重新战战 🔄'}</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- 游成 3: 魔法照相馀(Time/Task Matching) ---
const Game3 = ({ globalStars, addStar }) => {
            const [subject, setSubject] = useState('熊猫');
            const [style, setStyle] = useState('写实风');
            const [isGenerating, setIsGenerating] = useState(false);
            const [taskIndex, setTaskIndex] = useState(0);
            const [feedback, setFeedback] = useState(null); // 'success', 'fail', null
const subjects = ['熊猫', '小猫', '恐龙'];
            const styles = ['写实风', '水彩画', '像素风'];

            const tasks = [
                { s: '恐龙', st: '水彩画', text: "我想要一张【水彩画】风格的【恐龙】！" },
                { s: '小猫', st: '像素风', text: "帮我拍一张【像素风】的【小猫】当头像！" },
                { s: '熊猫', st: '写实风', text: "能给我一张【写实风】的【熊猫】照片吗！" }
            ];

            const currentTask = tasks[taskIndex];

            const getImageContent = (sub, sty) => {
                const map = {
                    '熊猫_写实风': '🐼📸', '熊猫_水彩画': '🎨🐼', '熊猫_像素风': '👾🐼',
                    '小猫_写实风': '🐈📸', '小猫_水彩画': '🎨🐱', '小猫_像素风': '👾🐱',
                    '恐龙_写实风': '🦖📸', '恐龙_水彩画': '🎨🦕', '恐龙_像素风': '👾🦖',
                };
                return map[`${sub}_${sty}`] || '✅';
            };

            const handleSubjectClick = (s) => { playSound('click'); setSubject(s); setFeedback(null); };
            const handleStyleClick = (s) => { playSound('click'); setStyle(s); setFeedback(null); };

            const handleSubmit = () => {
                playSound('magic');
                setIsGenerating(true);
                setFeedback(null);
                
                setTimeout(() => {
                    setIsGenerating(false);
                    if (subject === currentTask.s && style === currentTask.st) {
                        playSound('success');
                        setFeedback('success');
                        addStar(3); // 奖励更多星星
setTimeout(() => {
                            setTaskIndex((prev) => (prev + 1) % tasks.length);
                            setFeedback(null);
                        }, 2500);
                    } else {
                        playSound('error');
                        setFeedback('fail');
                    }
                }, 1000);
            };

            return (
                <div className="bg-white rounded-3xl p-6 shadow-xl border-4 border-orange-200 pop-in cloud-bg relative">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-2xl font-bold text-orange-600">📸 游成3：魔法照相馆</h2>
                        <div className="bg-yellow-100 text-yellow-600 px-4 py-2 rounded-full font-bold shadow-sm flex items-center gap-2">
                            <span>⭕x {globalStars}</span>
                            <span className="text-sm border-l border-yellow-300 pl-2">任务: {taskIndex + 1}/{tasks.length}</span>
                        </div>
                    </div>
                    <p className="text-center text-gray-600 mb-6 font-bold">顾客来了！快调整【参数】，拍出他们想要的照片！</p>
                    
                    <div className="flex flex-col lg:flex-row gap-6 items-stretch bg-orange-50 p-6 rounded-3xl border-2 border-orange-100">
                        
                        {/* 左侧：顾客区埀*/}
                        <div className="w-full lg:w-1/3 flex flex-col items-center justify-center border-r-0 lg:border-r-4 border-dashed border-orange-200 p-4">
                            <div className="text-6xl mb-4 float-idle">🤖</div>
                            <div className="bg-white p-4 rounded-2xl rounded-tl-none border-2 border-orange-300 shadow-md relative">
                                <div className="absolute -top-3 -left-3 text-orange-400 text-2xl">💬</div>
                                <p className="font-bold text-gray-700 text-lg">{currentTask.text}</p>
                            </div>
                            {feedback === 'success' && <div className="text-green-500 font-bold mt-4 pop-in text-xl">"太棒了！这就是我想要的！"</div>}
                            {feedback === 'fail' && <div className="text-red-500 font-bold mt-4 shake-error text-xl">"嗀..好像不太对哎" </div>}
                        </div>

                        {/* 中间：控制台 */}
                        <div className="flex-1 space-y-6 flex flex-col justify-center px-4">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-orange-100">
                                <h3 className="font-bold text-orange-700 mb-3 flex items-center gap-2">⚙️ 调整主角</h3>
                                <div className="flex gap-2">
                                    {subjects.map(s => (
                                        <button key={s} onClick={() => handleSubjectClick(s)}
                                            className={`px-4 py-3 rounded-xl font-bold transition-all flex-1 shadow-sm border-b-4 
                                            ${subject === s ? 'bg-orange-500 text-white border-orange-700 translate-y-1' : 'bg-gray-100 text-gray-600 border-gray-300 hover:bg-orange-100'}`}>
                                            {s}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-purple-100">
                                <h3 className="font-bold text-purple-700 mb-3 flex items-center gap-2">🎨 调整画风</h3>
                                <div className="flex gap-2">
                                    {styles.map(s => (
                                        <button key={s} onClick={() => handleStyleClick(s)}
                                            className={`px-4 py-3 rounded-xl font-bold transition-all flex-1 shadow-sm border-b-4
                                            ${style === s ? 'bg-purple-500 text-white border-purple-700 translate-y-1' : 'bg-gray-100 text-gray-600 border-gray-300 hover:bg-purple-100'}`}>
                                            {s}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* 右侧：画框与拍照 */}
                        <div className="w-full lg:w-1/3 flex flex-col items-center justify-center">
                            <div className="relative w-48 h-48 md:w-56 md:h-56 border-[12px] border-yellow-800 bg-yellow-50 rounded-lg shadow-2xl flex items-center justify-center overflow-hidden mb-6 group">
                                <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/canvas.png')]"></div>
                                
                                {isGenerating ? (
                                    <div className="flex flex-col items-center pop-in">
                                        <div className="animate-spin text-5xl mb-2">⚙️</div>
                                        <div className="font-bold text-yellow-800 bg-white/80 px-2 rounded">冲洗一..</div>
                                    </div>
                                ) : (
                                    <div className={`text-6xl md:text-7xl transition-all duration-300 filter drop-shadow-lg relative z-10 ${feedback === 'success' ? 'magic-sparkle scale-110' : ''}`}>
                                        {getImageContent(subject, style)}
                                    </div>
                                )}
                                
                                {/* 闪光灯效果*/}
                                {isGenerating && <div className="absolute inset-0 bg-white opacity-0 animate-[flash_1s_ease-out]"></div>}
                            </div>

                            <button onClick={handleSubmit} disabled={isGenerating}
                                className={`w-full py-4 rounded-full text-xl font-bold shadow-lg transition-all flex items-center justify-center gap-2 border-b-4
                                    ${isGenerating ? 'bg-gray-400 text-white cursor-not-allowed border-gray-600' : 'bg-red-500 hover:bg-red-600 text-white border-red-700 active:translate-y-1 active:border-b-0 hover:scale-105'}`}>
                                <span>📸 拍照交付</span>
                            </button>
                        </div>
                    </div>
                    {/* 添加内联关键帧处理闪光灯 */}
                    <style>{`@keyframes flash { 0% {opacity: 1;} 100% {opacity: 0;} } @keyframes slideRight { 100% {left: 100%;} }`}</style>
                </div>
            );
        };

        // --- 主程序(Main App) ---
const App = () => {
            const [activeTab, setActiveTab] = useState(1);
            const [globalStars, setGlobalStars] = useState(0);

            // 初始化音频上下文在首次点击时
useEffect(() => {
                const initAudio = () => { playSound('none'); window.removeEventListener('click', initAudio); };
                window.addEventListener('click', initAudio);
                return () => window.removeEventListener('click', initAudio);
            }, []);

            const addStar = (amount) => {
                setGlobalStars(prev => prev + amount);
            };

            const handleTabSwitch = (id) => {
                playSound('click');
                setActiveTab(id);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    {/* 头部标题区域 */}
                    <div className="text-center mb-8 max-w-2xl w-full relative">
                        {/* 顶部星星展示 */}
                        <div className="absolute top-0 right-0 bg-yellow-400 text-white px-4 py-2 rounded-2xl shadow-lg font-bold flex items-center gap-2 transform rotate-3 hover:rotate-0 transition-transform cursor-pointer border-2 border-white">
                            <span className="text-2xl magic-sparkle">⭕</span>
                            <span className="text-xl">x {globalStars}</span>
                        </div>

                        <div className="inline-block bg-teal-100 text-teal-800 px-4 py-1 rounded-full font-bold text-sm mb-2 shadow-sm border border-teal-200 mt-8 md:mt-0">
                            AI启蒙绘本 · 第6诀                        </div>
                        <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 tracking-tight drop-shadow-sm mb-4">
                            给AI的<span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-600">清楚指令</span> 🪄
                        </h1>
                        <p className="text-lg text-gray-600 font-bold bg-white/50 inline-block px-6 py-2 rounded-full shadow-sm backdrop-blur-sm">
                            👦团团 & 🤖点点 陪你一起玩转"提示词"！
                        </p>
                    </div>

                    {/* 游成导航条*/}
                    <div className="flex flex-wrap justify-center gap-3 mb-8 w-full max-w-4xl bg-white p-2 rounded-full shadow-md border border-gray-100">
                        {[
                            { id: 1, icon: '🍲', title: '魔法锅合成' },
                            { id: 2, icon: '⚔️', title: '打败模糊怪' },
                            { id: 3, icon: '📸', title: '魔法照相馆' }
                        ].map(tab => (
                            <button key={tab.id} onClick={() => handleTabSwitch(tab.id)}
                                className={`px-6 py-3 rounded-full font-bold text-lg transition-all flex items-center gap-2 flex-1 justify-center min-w-[140px]
                                ${activeTab === tab.id ? 'bg-indigo-500 text-white shadow-inner scale-105 transform' : 'bg-transparent text-gray-500 hover:bg-indigo-50 hover:text-indigo-600'}`}>
                                <span className="text-2xl">{tab.icon}</span> 
                                <span className="hidden md:inline">{tab.title}</span>
                            </button>
                        ))}
                    </div>

                    {/* 游成内容区*/}
                    <div className="w-full max-w-5xl relative min-h-[500px]">
                        {activeTab === 1 && <Game1 globalStars={globalStars} addStar={addStar} />}
                        {activeTab === 2 && <Game2 globalStars={globalStars} addStar={addStar} />}
                        {activeTab === 3 && <Game3 globalStars={globalStars} addStar={addStar} />}
                    </div>

                    {/* 底部复盘总结 */}
                    <div className="mt-12 bg-white/90 backdrop-blur-md p-6 rounded-3xl w-full max-w-4xl border-2 border-indigo-100 shadow-lg text-center relative overflow-hidden">
                        <div className="absolute -right-10 -bottom-10 text-9xl opacity-10">💡</div>
                        <h3 className="text-2xl font-bold text-indigo-800 mb-3 flex items-center justify-center gap-2">
                            <span>💡</span> 今日复盘小课堀                        </h3>
                        <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 inline-block">
                            <p className="text-gray-700 text-lg leading-relaxed font-bold">
                                <strong>提示词（Prompt）：</strong>就是我们给AI的规则法术<br/>
                                记住秘诀：<span className="text-pink-500 bg-pink-100 px-2 rounded">目标</span> + <span className="text-yellow-600 bg-yellow-100 px-2 rounded">条件</span> + <span className="text-blue-500 bg-blue-100 px-2 rounded">格式</span> = <span className="text-green-600">清楚的指令！</span><br/>
                                越具体，AI画得越棒！                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
