<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第4课《仓库管理员机器人》互动游成</title>
    <script src="../../libs/libs/tailwind.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap');
        
        body {
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', cursive, sans-serif;
            background-color: #fdf6e7;
            /* 蜂巢背景图案 */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='103.92304845413264' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 25.98076211353316l-30 17.32050807568877L0 25.98076211353316V-8.660254037844387l30-17.32050807568877 30 17.32050807568877z' fill-rule='evenodd' stroke='%23f0e6cf' stroke-width='2' fill='transparent'/%3E%3Cpath d='M30 77.94228634059948l-30 17.32050807568877L-30 77.94228634059948V43.30127018922194l30-17.32050807568877 30 17.32050807568877z' fill-rule='evenodd' stroke='%23f0e6cf' stroke-width='2' fill='transparent'/%3E%3C/svg%3E");
        }

        .wood-border {
            border: 4px solid #cdb38b;
            box-shadow: 4px 4px 0px rgba(205, 179, 139, 0.4);
        }

        .cell-empty {
            border: 2px dashed #cdb38b;
            background-color: #fffaf0;
        }

        .cell-filled {
            border: 2px solid #e67e22;
            background-color: #ffeaa7;
            box-shadow: inset 0 0 10px rgba(230, 126, 34, 0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .shake-anim {
            animation: shake 0.4s ease-in-out;
        }

        .tab-btn.active {
            background-color: #f39c12;
            color: white;
            border-bottom: 4px solid #d35400;
            transform: translateY(2px);
        }
        .tab-btn {
            background-color: #f1c40f;
            color: #d35400;
            border-bottom: 6px solid #e67e22;
            transition: all 0.1s;
        }
        .tab-btn:active {
            border-bottom: 2px solid #e67e22;
            transform: translateY(4px);
        }

        /* 游成2工具激活状态*/
        .tool-active {
            outline: 4px solid #2ecc71;
            transform: scale(1.1);
        }

        .cloud-robot {
            background: linear-gradient(to bottom, #ffffff, #e0f2f1);
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            position: relative;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

    <!-- 标题区-->
    <header class="text-center mb-8 relative z-10 w-full max-w-4xl">
        <h1 class="text-3xl sm:text-5xl font-bold text-[#d35400] tracking-wider mb-2" style="text-shadow: 2px 2px 0px #fff, 4px 4px 0px #f1c40f;">
            仓库管理员机器人
        </h1>
        <p class="text-lg sm:text-xl text-gray-700 font-bold bg-white/80 inline-block px-4 py-1 rounded-full border-2 border-[#cdb38b]">
            第4课互动体验：探索格子的秘寀        </p>
    </header>

    <!-- 游成主界面-->
    <main class="w-full max-w-4xl bg-white/95 backdrop-blur-sm rounded-3xl p-4 sm:p-8 wood-border flex flex-col items-center">
        
        <!-- 标签页切捀-->
        <div class="flex space-x-4 mb-8 w-full justify-center">
            <button onclick="switchTab('game1')" id="tab-game1" class="tab-btn active px-6 py-3 rounded-t-2xl font-bold text-xl w-1/2 sm:w-auto">
                战战1：格子的容量<br><span class="text-sm font-normal">(3-7页</span>
            </button>
            <button onclick="switchTab('game2')" id="tab-game2" class="tab-btn px-6 py-3 rounded-t-2xl font-bold text-xl w-1/2 sm:w-auto">
                战战2：更短的记法<br><span class="text-sm font-normal">(8-9岁)</span>
            </button>
        </div>

        <!-- 游成区域容器 -->
        <div class="w-full relative min-h-[400px]">
            
            <!-- ==================== 游成 1：格子的容量 ==================== -->
            <div id="game1-container" class="flex flex-col items-center w-full transition-opacity duration-300">
                
                <div class="flex flex-col sm:flex-row items-center justify-center gap-8 w-full mb-8">
                    <!-- 机器人互动区 -->
                    <div class="relative flex flex-col items-center">
                        <img id="diandian-img" src="" alt="点点" class="w-32 h-32 object-contain mb-4 z-10 drop-shadow-lg" />
                        
                        <!-- 对话气泡 -->
                        <div id="g1-speech" class="absolute -top-16 -right-32 sm:-right-48 bg-white border-4 border-[#80cbc4] rounded-2xl p-3 text-lg font-bold text-gray-700 shadow-lg min-w-[200px] text-center z-20 transition-all">
                            欢迎来到仓库：<br>请帮我放东西吧！
                            <div class="absolute -bottom-3 left-8 w-4 h-4 bg-white border-b-4 border-r-4 border-[#80cbc4] transform rotate-45"></div>
                        </div>

                        <!-- 控制面板 -->
                        <div class="flex flex-col gap-3 bg-[#f0e6cf] p-4 rounded-xl wood-border mt-4">
                            <button onclick="setGridSize(4)" class="px-4 py-2 bg-white rounded-lg border-2 border-gray-300 hover:border-[#f39c12] hover:bg-[#fff9e6] font-bold text-gray-700">选用 4格盒子</button>
                            <button onclick="setGridSize(8)" class="px-4 py-2 bg-white rounded-lg border-2 border-gray-300 hover:border-[#f39c12] hover:bg-[#fff9e6] font-bold text-gray-700">选用 8格盒子</button>
                            <div class="text-sm text-gray-600 text-center mb-1">放一样东西进盒子：</div>
                            <button onclick="addItem('文件')" class="px-4 py-3 bg-[#3498db] text-white rounded-lg border-b-4 border-[#2980b9] active:border-b-0 active:translate-y-1 font-bold text-lg">
                                📁 放文件
                            </button>
                            <button onclick="addItem('玩具')" class="px-4 py-3 bg-[#9b59b6] text-white rounded-lg border-b-4 border-[#8e44ad] active:border-b-0 active:translate-y-1 font-bold text-lg">
                                🧸 放玩具
                            </button>
                            <button onclick="addItem('食物')" class="px-4 py-3 bg-[#e74c3c] text-white rounded-lg border-b-4 border-[#c0392b] active:border-b-0 active:translate-y-1 font-bold text-lg">
                                🍎 放食物
                            </button>
                        </div>
                    </div>

                    <!-- 盒子展示区-->
                    <div class="flex flex-col items-center bg-[#fdf6e7] p-6 rounded-2xl wood-border">
                        <h3 id="g1-box-title" class="text-2xl font-bold text-[#8d6e63] mb-4 bg-white px-4 py-1 rounded-full border-2 border-[#cdb38b]">小盒子(4格</h3>
                        
                        <!-- 动态网格-->
                        <div id="g1-grid" class="grid grid-cols-2 gap-3 bg-[#d7ccc8] p-4 rounded-xl">
                            <!-- JS动态生成格子-->
                        </div>
                        
                        <div class="mt-4 text-xl font-bold text-[#d35400]">
                            已占用：<span id="g1-count">0</span> / <span id="g1-max">4</span>
                        </div>
                    </div>
                </div>

                <div class="text-center text-gray-600 bg-yellow-100 px-6 py-2 rounded-full border-2 border-yellow-300">
                    💡 知识点：机器的记忆就像格子，容量有限</strong>满了，就放不下了：</strong>
                </div>
            </div>

            <!-- ==================== 游成 2：更短的记法 ==================== -->
            <div id="game2-container" class="hidden flex-col items-center w-full transition-opacity duration-300">
                
                <div class="w-full flex flex-col lg:flex-row gap-8 justify-center items-start">
                    
                    <!-- 任务提示 -->
                    <div class="bg-blue-50 border-4 border-blue-200 rounded-2xl p-4 sm:p-6 lg:w-1/3 w-full relative">
                        <div class="absolute -top-4 left-6 bg-blue-500 text-white px-3 py-1 rounded-full font-bold text-sm">今日任务</div>
<p class="text-lg text-gray-700 mt-2 mb-4">我们需要把<strong>"红色的圆形"</strong>和<strong>"蓝色的方形"</strong>存进仓库</p>
                        <p class="text-md text-gray-600 font-bold mb-2">但是仓库现在只剩 <span class="text-red-500">2个格子</span> 了！</p>
                        
                        <div class="flex justify-center gap-4 my-4">
                            <!-- 目标1 -->
                            <div class="flex flex-col items-center">
                                <div class="w-12 h-12 rounded-full bg-red-500 border-2 border-red-700 flex items-center justify-center text-white font-bold text-xs">红圆</div>
                            </div>
                            <!-- 目标2 -->
                            <div class="flex flex-col items-center">
                                <div class="w-12 h-12 bg-blue-500 border-2 border-blue-700 flex items-center justify-center text-white font-bold text-xs">蓝方</div>
                            </div>
                        </div>
                        <p class="text-sm text-gray-500">提示：如果把"红色"和"圆形"分开放，需要两个格子。能不能用更短的记法：</p>
                        <button onclick="resetGame2()" class="mt-4 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-bold w-full">重新开始组合</button>
                    </div>

                    <!-- 操作区-->
                    <div class="flex flex-col items-center w-full lg:w-2/3">
                        
                        <!-- 符号工作台(工具栏 -->
                        <div class="bg-[#fdf6e7] p-4 rounded-2xl wood-border w-full mb-6">
                            <h3 class="text-center font-bold text-[#8d6e63] mb-3">1. 点击选择符号</h3>
                            <div class="flex justify-center gap-4">
                                <!-- 颜色组-->
                                <button onclick="selectTool('color', 'red')" id="tool-red" class="w-16 h-16 rounded-xl bg-white border-4 border-gray-200 hover:border-red-300 flex items-center justify-center transition-all">
                                    <div class="w-8 h-8 rounded-full bg-red-500 shadow-inner"></div>
                                </button>
                                <button onclick="selectTool('color', 'blue')" id="tool-blue" class="w-16 h-16 rounded-xl bg-white border-4 border-gray-200 hover:border-blue-300 flex items-center justify-center transition-all">
                                    <div class="w-8 h-8 rounded-full bg-blue-500 shadow-inner"></div>
                                </button>
                                <div class="w-px h-16 bg-[#cdb38b] mx-2"></div> <!-- 分隔线-->
                                <!-- 形状组-->
                                <button onclick="selectTool('shape', 'circle')" id="tool-circle" class="w-16 h-16 rounded-xl bg-white border-4 border-gray-200 hover:border-gray-400 flex items-center justify-center transition-all">
                                    <div class="w-10 h-10 rounded-full border-4 border-gray-700"></div>
                                </button>
                                <button onclick="selectTool('shape', 'square')" id="tool-square" class="w-16 h-16 rounded-xl bg-white border-4 border-gray-200 hover:border-gray-400 flex items-center justify-center transition-all">
                                    <div class="w-10 h-10 border-4 border-gray-700"></div>
                                </button>
                            </div>
                        </div>

                        <!-- 记忆格子 (目标区 -->
                        <div class="bg-white p-6 rounded-2xl border-4 border-[#80cbc4] w-full shadow-lg relative">
                            <h3 class="text-center font-bold text-[#00897b] mb-4">2. 点击格子放入组合</h3>
                            
                            <!-- 只剩一个格子-->
                            <div class="flex justify-center gap-6">
                                <div id="g2-slot-1" onclick="applyToolToSlot(1)" class="w-28 h-28 border-4 border-dashed border-[#80cbc4] rounded-xl bg-gray-50 flex items-center justify-center cursor-pointer hover:bg-[#e0f2f1] transition-colors relative">
                                    <span class="text-gray-300 font-bold">格子 1</span>
                                    <!-- 内容占位符-->
                                    <div id="g2-content-1" class="absolute inset-0 flex items-center justify-center p-2 gap-1 pointer-events-none"></div>
                                </div>
                                <div id="g2-slot-2" onclick="applyToolToSlot(2)" class="w-28 h-28 border-4 border-dashed border-[#80cbc4] rounded-xl bg-gray-50 flex items-center justify-center cursor-pointer hover:bg-[#e0f2f1] transition-colors relative">
                                    <span class="text-gray-300 font-bold">格子 2</span>
                                    <!-- 内容占位符-->
                                    <div id="g2-content-2" class="absolute inset-0 flex items-center justify-center p-2 gap-1 pointer-events-none"></div>
                                </div>
                            </div>

                            <!-- 机器人反馈-->
                            <div id="g2-feedback" class="mt-6 text-center font-bold text-lg text-gray-600 h-8">
                                把颜色和形状放进同一个格子里压缩：                            </div>
                        </div>

                    </div>
                </div>

                <div class="mt-8 text-center text-gray-600 bg-blue-100 px-6 py-2 rounded-full border-2 border-blue-300 w-full">
                    💡 知识点：同样多的信息，换个约定的组合放法，就能<strong>大幅节省空间</strong>：                </div>
            </div>

        </div>
    </main>

    <script>
        // --- 角色图片加载逻辑 ---
const diandianImages = [
            '../../characters/characters/diandian.png', '../../characters/characters/diandian01.png', '../../characters/characters/diandian02.png', '../../characters/characters/diandian03.png',
            '../../characters/characters/diandian04.png', '../../characters/characters/diandian05.png', '../../characters/characters/diandian06.png'
        ];

        function getRandomImage(images) {
            return images[Math.floor(Math.random() * images.length)];
        }

        function initCharacters() {
            document.getElementById('diandian-img').src = getRandomImage(diandianImages);
        }

        // ==========================
        // 全层标签切换逻辑
        // ==========================
        function switchTab(tabId) {
            document.getElementById('tab-game1').classList.remove('active');
            document.getElementById('tab-game2').classList.remove('active');
            
            document.getElementById('game1-container').classList.add('hidden');
            document.getElementById('game1-container').classList.remove('flex');
            document.getElementById('game2-container').classList.add('hidden');
            document.getElementById('game2-container').classList.remove('flex');
            
            if (tabId === 'game1') {
                document.getElementById('tab-game1').classList.add('active');
                document.getElementById('game1-container').classList.remove('hidden');
                document.getElementById('game1-container').classList.add('flex');
            } else {
                document.getElementById('tab-game2').classList.add('active');
                document.getElementById('game2-container').classList.remove('hidden');
                document.getElementById('game2-container').classList.add('flex');
                resetGame2(); // 切换时重置游成
}
        }

        // ==========================
        // 游成 1 逻辑：格子的容量
        // ==========================
let g1CurrentMax = 4;
        let g1CurrentCount = 0;
        let g1Items = []; // 记录每个格子存放的物品图标

        function renderGrid(itemType, itemEmoji) {
            const gridContainer = document.getElementById('g1-grid');
            gridContainer.innerHTML = '';
            
            // 动态调整网格列数        
gridContainer.className = `grid ${g1CurrentMax === 4 ? 'grid-cols-2' : 'grid-cols-4'} gap-3 bg-[#d7ccc8] p-4 rounded-xl`;
for (let i = 0; i < g1CurrentMax; i++) {
                const cell = document.createElement('div');
                cell.className = 'w-16 h-16 sm:w-20 sm:h-20 rounded-lg flex items-center justify-center text-3xl transition-all duration-300';
                
                if (i < g1Items.length) {
                    cell.classList.add('cell-filled');
                    cell.innerHTML = g1Items[i];
} else {
                    cell.classList.add('cell-empty');
                }
                gridContainer.appendChild(cell);
            }

            document.getElementById('g1-count').textContent = g1Items.length;
            document.getElementById('g1-max').textContent = g1CurrentMax;
        }

        function setGridSize(size) {
            g1CurrentMax = size;
            g1Items = []; // 切换盒子时清空
document.getElementById('g1-box-title').textContent = size === 4 ? "小盒子(4格" : "大盒子(8格";
            renderGrid();
            
            const speech = document.getElementById('g1-speech');
            speech.innerHTML = `换成 ${size} 格的仓库啦！<br>空间变大/小了！`;
            speech.classList.remove('text-red-600');
            speech.classList.add('text-gray-700');
        }

        function addItem(itemType) {
            const itemEmoji = itemType === '文件' ? '📁' : itemType === '玩具' ? '🧸' : '🍎';
            const speech = document.getElementById('g1-speech');
            
            if (g1Items.length < g1CurrentMax) {
                g1Items.push(itemEmoji);
                renderGrid();
                speech.innerHTML = `放进去了 1 个${itemType} ${itemEmoji}！<br>仓库还剩${g1CurrentMax - g1Items.length} 个空位。`;
                speech.classList.remove('text-red-600');
                speech.classList.add('text-green-600');
            } else {
                // 满了，执行抖动动画并提示
const grid = document.getElementById('g1-grid');
                grid.classList.remove('shake-anim');
                void grid.offsetWidth; // 触发重绘
grid.classList.add('shake-anim');
                
                speech.innerHTML = `哎呀，仓库满了！<br><strong>${itemType} ${itemEmoji} 放不下了！</strong>`;
                speech.classList.remove('text-green-600');
                speech.classList.add('text-red-600');
            }
        }

        // 初始化游成
renderGrid();

        // ==========================
        // 游成 2 逻辑：更短的记法
        // ==========================
let currentTool = { type: null, val: null }; // 当前选中的工具(color/shape)
        // 存储格子的状态{ slotId: { color: 'red', shape: 'circle' } }
let g2Slots = {
            1: { color: null, shape: null },
            2: { color: null, shape: null }
        };

        function selectTool(type, val) {
            currentTool = { type, val };
            
            // 移除所有高亮
const tools = ['red', 'blue', 'circle', 'square'];
            tools.forEach(t => document.getElementById(`tool-${t}`).classList.remove('tool-active', 'border-yellow-400'));
            
            // 增加选中高亮
const activeBtn = document.getElementById(`tool-${val}`);
            activeBtn.classList.add('tool-active', 'border-yellow-400');
            
            const typeText = type === 'color' ? '颜色' : '形状';
            document.getElementById('g2-feedback').textContent = `已拿起 {val} {typeText}，请点击要放入的格子！`;
            document.getElementById('g2-feedback').className = "mt-6 text-center font-bold text-lg text-blue-600 h-8";
        }

        function applyToolToSlot(slotId) {
            if (!currentTool.type) {
                document.getElementById('g2-feedback').textContent = "请先从上面点击选择一个符号！";
                document.getElementById('g2-feedback').className = "mt-6 text-center font-bold text-lg text-orange-500 h-8";
                return;
            }

            const slot = g2Slots[slotId];
            
            // 覆盖对应属性        
slot[currentTool.type] = currentTool.val;
            
            renderG2Slot(slotId);
            checkG2Win();
        }

        function renderG2Slot(slotId) {
            const contentDiv = document.getElementById(`g2-content-${slotId}`);
            const slotData = g2Slots[slotId];
            contentDiv.innerHTML = ''; // 清空

            // 如果两个都有，渲染成组合后的"压缩"形态！
if (slotData.color && slotData.shape) {
                const combined = document.createElement('div');
                combined.className = 'w-16 h-16 flex items-center justify-center animate-bounce'; // 组合成功动画
let bgColor = slotData.color === 'red' ? 'bg-red-500' : 'bg-blue-500';
                let shapeClass = slotData.shape === 'circle' ? 'rounded-full' : 'rounded-md';
                
                combined.innerHTML = `<div class="w-14 h-14 ${bgColor} ${shapeClass} shadow-md border-2 border-white"></div>`;
                contentDiv.appendChild(combined);
                
                // 给盒子加个发光练边框表示成功合成一个物品
document.getElementById(`g2-slot-${slotId}`).classList.add('border-green-400', 'bg-green-50');
                document.getElementById(`g2-slot-${slotId}`).classList.remove('border-[#80cbc4]', 'bg-gray-50');

            } else {
                // 如果只有一个，单独渲染
document.getElementById(`g2-slot-${slotId}`).classList.remove('border-green-400', 'bg-green-50');
                document.getElementById(`g2-slot-${slotId}`).classList.add('border-[#80cbc4]', 'bg-gray-50');

                if (slotData.color) {
                    const c = document.createElement('div');
                    c.className = `w-6 h-6 rounded-full shadow-inner ${slotData.color === 'red' ? 'bg-red-500' : 'bg-blue-500'}`;
                    contentDiv.appendChild(c);
                }
                if (slotData.shape) {
                    const s = document.createElement('div');
                    s.className = `w-8 h-8 border-4 border-gray-600 ${slotData.shape === 'circle' ? 'rounded-full' : ''}`;
                    contentDiv.appendChild(s);
                }
            }
        }

        function checkG2Win() {
            const feedback = document.getElementById('g2-feedback');
            const s1 = g2Slots[1];
            const s2 = g2Slots[2];

            // 棕查是否完成了目标：线圈和蓝方，分别在两个格子里（顺序无关：
const hasRedCircle = (s1.color === 'red' && s1.shape === 'circle') || (s2.color === 'red' && s2.shape === 'circle');
            const hasBlueSquare = (s1.color === 'blue' && s1.shape === 'square') || (s2.color === 'blue' && s2.shape === 'square');

            if (hasRedCircle && hasBlueSquare) {
                feedback.innerHTML = "🎉 太棒了！用符号组合，**2个格子*就存下了所有的信息！大大节省了容量！";
                feedback.className = "mt-6 text-center font-bold text-xl text-green-600 h-8";
                
                // 放个礼花
            } else if ((s1.color && s1.shape) || (s2.color && s2.shape)) {
                feedback.textContent = "干得好！成功合成了一个物品，继续存放下一个吧！";
                feedback.className = "mt-6 text-center font-bold text-lg text-green-500 h-8";
            } else {
                feedback.textContent = "把颜色和形状放进同一个格子里试试！";
                feedback.className = "mt-6 text-center font-bold text-lg text-gray-600 h-8";
            }
        }

        function resetGame2() {
            currentTool = { type: null, val: null };
            g2Slots = {
                1: { color: null, shape: null },
                2: { color: null, shape: null }
            };
            
            ['red', 'blue', 'circle', 'square'].forEach(t => document.getElementById(`tool-${t}`).classList.remove('tool-active', 'border-yellow-400'));
            
            renderG2Slot(1);
            renderG2Slot(2);
            
            document.getElementById('g2-feedback').textContent = "把颜色和形状放进同一个格子里压缩！";
            document.getElementById('g2-feedback').className = "mt-6 text-center font-bold text-lg text-gray-600 h-8";
        }

        // 页面加载时初始化角色图片
window.onload = function() {
            initCharacters();
        };

    </script>
</body>
</html>
