<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>没有标签的玩具箱 - AI启蒙互动游成</title>
    <style>
        /* ================= 核心视觉变量 (低饱和马卡龙配色) ================= */
        :root {
            --bg-color: #FDF9F1; /* 浅米色护眼背晀*/
            --box-bg: #FFFFFF;
            --primary-color: #89C4F4; /* 柔和云朵蓝*/
            --accent-color: #FAD0C9; /* 治愈马卡龙粉 */
            --text-main: #5C4B51; /* 柔和深灰，代替纯黑保护视劀*/
            --text-light: #8C7A80;
            --success-color: #A8E6CF; /* 柔和薄荷练*/
            --shadow: 0 8px 24px rgba(92, 75, 81, 0.08);
            --radius-lg: 32px;
            --radius-md: 20px;
        }

        /* ================= 全层极简样式 ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* 防止幼儿误触选中文字 */
            -webkit-tap-highlight-color: transparent; /* 移除点击高亮 */
        }

        body {
            font-family: 'Comic Sans MS', 'Varela Round', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* 锁定屏幕，防止拖拽时页面滚动 */
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* ================= 通用 UI 组件 ================= */
        .hidden { display: none !important; }
        
        .header {
            text-align: center;
            padding: 2vh 0;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.8);
            z-index: 10;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary-color);
            text-shadow: 2px 2px 0px #FFF;
            letter-spacing: 2px;
        }

        .container {
            flex: 1;
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 菜单大按钀*/
        .menu-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 500px;
        }

        .btn {
            background: var(--box-bg);
            border: 4px solid white;
            border-radius: var(--radius-lg);
            padding: 20px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-main);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn:active { transform: scale(0.95); }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(92, 75, 81, 0.12); }
        .btn-icon { font-size: 2.5rem; }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 2rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            z-index: 100;
            color: var(--primary-color);
            transition: transform 0.2s;
        }
        .back-btn:active { transform: scale(0.9); }

        /* 角色对话框*/
        .dialogue-box {
            display: flex;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            margin-bottom: 2vh;
            border: 3px solid var(--accent-color);
            width: 90%;
            max-width: 700px;
            animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .robot-icon { font-size: 3rem; margin-right: 15px; animation: float 3s ease-in-out infinite; }
        .dialogue-text { font-size: 1.4rem; font-weight: bold; line-height: 1.4; }

        /* ================= 游成 1：无标签玩具收纳 (拖拽) ================= */
        .g1-play-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .toy-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            min-height: 100px;
            width: 90%;
            background: rgba(255,255,255,0.5);
            border-radius: var(--radius-md);
            padding: 20px;
        }

        .toy {
            font-size: 4rem;
            cursor: grab;
            touch-action: none; /* 关键：阻止移动端默认滚动，实现丝滑拖拽*/
            transition: transform 0.2s;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            z-index: 50;
        }
        .toy.dragging { transform: scale(1.2) rotate(-5deg); opacity: 0.9; z-index: 100; cursor: grabbing; }

        .boxes-container {
            display: flex;
            gap: 30px;
            width: 90%;
            justify-content: center;
        }

        .toy-box {
            flex: 1;
            max-width: 300px;
            height: 250px;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            border: 6px dashed #d1d8e0;
            border-radius: var(--radius-lg);
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            padding: 15px;
            gap: 10px;
            transition: all 0.3s;
            position: relative;
        }
        /* 空箱子上的无标签标志 */
        .toy-box::after {
            content: "☁️ 没标签的空箱子;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #a4b0be;
            font-size: 1.2rem;
            font-weight: bold;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.3s;
            width: 100%;
            text-align: center;
        }
        .toy-box.has-items::after { opacity: 0; }
        .toy-box.drag-over {
            border-color: var(--success-color);
            background: #f1fbf7;
            transform: scale(1.02);
        }

        /* ================= 游成 2：找找不一样的归类 (找不合 ================= */
        .g2-play-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .g2-boxes {
            display: flex;
            gap: 30px;
            width: 90%;
            justify-content: center;
        }
        
        .g2-box {
            flex: 1;
            max-width: 350px;
            min-height: 250px;
            background: white;
            border: 6px solid #e2e8f0;
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 15px;
            position: relative;
        }
        
        .box-label {
            position: absolute;
            top: -25px;
            background: var(--primary-color);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: var(--shadow);
            border: 3px solid white;
        }
        .box-label.ai-label { background: var(--success-color); color: #333; }

        .g2-toy {
            font-size: 4rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        .g2-toy:hover { transform: scale(1.1) rotate(5deg); }
        
        /* 纠错动画 */
        .fly-correct {
            animation: flyToCorrect 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            pointer-events: none;
        }

        /* ================= 游成 3：AI盲辨大战成(剪影猜猜眼 ================= */
        .g3-play-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        
        .silhouette-stage {
            background: white;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 8px 24px rgba(0,0,0,0.05), var(--shadow);
            border: 8px solid var(--bg-color);
            position: relative;
        }
        
        .target-toy {
            font-size: 8rem;
            filter: brightness(0) opacity(0.7); /* 剪影特效 */
            transition: filter 1s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .target-toy.revealed {
            filter: brightness(1) opacity(1);
            transform: scale(1.2) rotate(360deg);
        }

        .options-container {
            display: flex;
            gap: 20px;
        }
        
        .option-card {
            background: white;
            width: 100px;
            height: 100px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s, background 0.2s;
            border: 4px solid transparent;
        }
        .option-card:active { transform: scale(0.9); }
        .option-card.wrong { animation: shake 0.4s; background: #fff0f0; border-color: #ffcccc; }
        .option-card.correct { background: #f0fff0; border-color: var(--success-color); }

        /* ================= 动画与特效================= */
        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }
        @keyframes flyToCorrect {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.5) translateY(-50px); opacity: 0.8; }
            100% { transform: scale(1) translateY(0); }
        }

        /* 礼花特效容器 */
        #confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 999;
        }
        .confetti {
            position: absolute;
            width: 15px; height: 15px;
            background-color: var(--primary-color);
            border-radius: 50%;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* 成功通关弹窗 */
        .success-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(253, 249, 241, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .success-card {
            background: white; padding: 40px; border-radius: var(--radius-lg);
            text-align: center; box-shadow: var(--shadow); border: 4px solid var(--success-color);
            animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .success-card h2 { font-size: 2.5rem; color: var(--success-color); margin-bottom: 20px; }
        .success-card p { font-size: 1.5rem; color: var(--text-main); margin-bottom: 30px; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="title">📦 没有标签的玩具箱</h1>
    </header>

    <div class="container" id="main-container">
        <!-- ================= 主菜单================= -->
        <div id="menu-screen" class="menu-screen">
            <div class="dialogue-box" style="justify-content: center;">
                <div class="robot-icon">☁️🤖</div>
                <div class="dialogue-text">点点：小朋友你好！我们要学人工智能啦：br>请选择一个游成开始吧：</div>
            </div>
            
            <button class="btn" onclick="startGame(1)">
                <span class="btn-icon">🖐︀</span>
                <div>
                    <div style="font-size: 1.8rem;">无标签收线</div>
                    <div style="font-size: 1rem; font-weight: normal; color: var(--text-light);">自己决定分类规则</div>
                </div>
            </button>
            <button class="btn" style="border-color: var(--primary-color);" onclick="startGame(2)">
                <span class="btn-icon">🔍</span>
                <div>
                    <div style="font-size: 1.8rem;">找找不一样的</div>
                    <div style="font-size: 1rem; font-weight: normal; color: var(--text-light);">发现放错的玩兀</div>
                </div>
            </button>
            <button class="btn" style="border-color: var(--accent-color);" onclick="startGame(3)">
                <span class="btn-icon">✅</span>
                <div>
                    <div style="font-size: 1.8rem;">AI 盲辨大战成</div>
                    <div style="font-size: 1rem; font-weight: normal; color: var(--text-light);">看轮廓猜玩具</div>
                </div>
            </button>
        </div>

        <!-- ================= 游成 1 ================= -->
        <div id="game1-screen" class="hidden" style="width: 100%; height: 100%;">
            <button class="back-btn" onclick="showMenu()">🔙</button>
            <div class="g1-play-area">
                <div class="dialogue-box">
                    <div class="robot-icon">☁️🤖</div>
                    <div class="dialogue-text" id="g1-dialogue">点点：这里有两个空箱子，没有任何标签哦！<br>请把下面的玩具，用你喜欢的方法分到两个箱子里吧！</div>
                </div>
                
                <div class="toy-pool" id="g1-pool">
                    <!-- JS动态生成玩兀-->
                </div>
                
                <div class="boxes-container">
                    <div class="toy-box" id="box1"></div>
                    <div class="toy-box" id="box2"></div>
                </div>
            </div>
        </div>

        <!-- ================= 游成 2 ================= -->
        <div id="game2-screen" class="hidden" style="width: 100%; height: 100%;">
            <button class="back-btn" onclick="showMenu()">🔙</button>
            <div class="g2-play-area">
                <div class="dialogue-box">
                    <div class="robot-icon">👦</div>
                    <div class="dialogue-text" id="g2-dialogue">团团：线色箱子里混进了一个奇怪的玩具：br>你能把它找出来，点击它纠正错误吗：</div>
                </div>
                
                <div class="g2-boxes">
                    <div class="g2-box" id="g2-box-rigid">
                        <div class="box-label">🔴 只能放线色</div>
                        <!-- JS填充：线色玩兀+ 1个蓝色玩兀错误项 -->
                    </div>
                    <div class="g2-box" id="g2-box-ai">
                        <div class="box-label ai-label">☁️ AI无标签箱</div>
                        <!-- JS填充：蓝色玩兀-->
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= 游成 3 ================= -->
        <div id="game3-screen" class="hidden" style="width: 100%; height: 100%;">
            <button class="back-btn" onclick="showMenu()">🔙</button>
            <div class="g3-play-area">
                <div class="dialogue-box">
                    <div class="robot-icon">☁️🤖</div>
                    <div class="dialogue-text" id="g3-dialogue">点点：AI不用看标签，靠形状就能认出玩具！<br>猜猜这个黑影是什么玩具？</div>
                </div>
                
                <div class="silhouette-stage">
                    <div class="target-toy" id="g3-target">🧸</div>
                </div>
                
                <div class="options-container" id="g3-options">
                    <!-- JS填充选项 -->
                </div>
            </div>
        </div>

        <!-- 通用通关弹窗 -->
        <div id="success-overlay" class="success-overlay hidden">
            <div class="success-card">
                <h2 id="success-title">太棒啦！</h2>
                <p id="success-msg">你学会了AI智能分类：</p>
                <button class="btn" style="background: var(--success-color); color: white; border-color: white; margin: 0 auto;" onclick="closeSuccess()">
                    🌟 继续游成
                </button>
            </div>
        </div>

        <div id="confetti-container"></div>
    </div>

    <script>
        // ================= 全层音频系统 (纯代码生成温和护眼音敀 =================
const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 成功时轻柔的叮咚层    
function playSuccessSound() {
initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.type = 'sine'; // 柔和的正弦波
osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.3); // C6
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1); // 音量低，不刺耀        
gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.6);
        }

        // 错误时温柔的提示层(低沉柔和，不是警呀
function playGentleBoop() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // ================= 撒花特效 =================
        function fireConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            const colors = ['#89C4F4', '#FAD0C9', '#A8E6CF', '#FFD3B6', '#FF8B94'];
            for(let i=0; i<50; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 0.5) + 's';
                container.appendChild(conf);
            }
            setTimeout(() => { container.innerHTML = ''; }, 4000);
        }

        // ================= 导航控制 =================
        function showMenu() {
            document.querySelectorAll('.container > div[id$="-screen"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function startGame(level) {
            initAudio(); // 交互时解锁音频上下文
document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById(`game${level}-screen`).classList.remove('hidden');
            if(level === 1) initGame1();
            if(level === 2) initGame2();
            if(level === 3) initGame3();
        }

        function showSuccess(title, msg) {
            document.getElementById('success-title').innerText = title;
            document.getElementById('success-msg').innerHTML = msg;
            document.getElementById('success-overlay').classList.remove('hidden');
            playSuccessSound();
            fireConfetti();
        }

        function closeSuccess() {
            document.getElementById('success-overlay').classList.add('hidden');
            showMenu();
        }

        // ================= 游成 1：拖拽收纳引擀(兼容触摸与鼠格 =================
const g1ToysList = ['🍎', '🚗', '🚙', '🍏', '🧸', '🪀'];
        
        function initGame1() {
            const pool = document.getElementById('g1-pool');
            const box1 = document.getElementById('box1');
            const box2 = document.getElementById('box2');
            pool.innerHTML = '';
            box1.innerHTML = ''; box2.innerHTML = '';
            box1.classList.remove('has-items'); box2.classList.remove('has-items');

            g1ToysList.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = 'toy';
                el.innerText = t;
                el.id = 'toy_' + i;
                makeDraggable(el);
                pool.appendChild(el);
            });
            document.getElementById('g1-dialogue').innerHTML = "点点：把下面的玩具，拖进两个空箱子里吧！<br><span style='color:var(--primary-color)'>怎么分都可以，你来定规则：</span>";
        }

        function makeDraggable(el) {
            let active = false;
            let currentX; let currentY; let initialX; let initialY;
            let xOffset = 0; let yOffset = 0;

            function dragStart(e) {
                if (e.type === "touchstart") { initialX = e.touches[0].clientX - xOffset; initialY = e.touches[0].clientY - yOffset; } 
                else { initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; }
                if (e.target === el) {
                    active = true;
                    el.classList.add('dragging');
                }
            }

            function dragEnd(e) {
                if (!active) return;
                initialX = currentX; initialY = currentY;
                active = false;
                el.classList.remove('dragging');
                
                // 碰撞检测逻辑
const rect = el.getBoundingClientRect();
                const elCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                
                let placed = false;
                ['box1', 'box2', 'g1-pool'].forEach(boxId => {
                    const box = document.getElementById(boxId);
                    const bRect = box.getBoundingClientRect();
                    if(elCenter.x > bRect.left && elCenter.x < bRect.right && 
                       elCenter.y > bRect.top && elCenter.y < bRect.bottom) {
                        
                        box.appendChild(el); // 物理转移DOM
                        // 重置拖拽偏移量，由flex布层接管位置
xOffset = 0; yOffset = 0;
                        setTranslate(0, 0, el);
                        placed = true;
                        
                        // 更新箱子状态文有                    
if(boxId !== 'g1-pool') box.classList.add('has-items');
                        if(boxId === 'g1-pool' && box.children.length === 0) {
                            // 池子空了，游成结条
setTimeout(() => {
                                showSuccess("太棒啦！", "你没有用固定的标签，<br>用自己的规则把玩具收好了！这就是AI的能力哦"：);
                            }, 500);
                        }
                    }
                    box.classList.remove('drag-over');
                });

                if(!placed) {
                    // 弹回原处
setTranslate(0, 0, el);
                    xOffset = 0; yOffset = 0;
                }
            }

            function drag(e) {
                if (active) {
                    e.preventDefault(); // 阻止滚动
if (e.type === "touchmove") { currentX = e.touches[0].clientX - initialX; currentY = e.touches[0].clientY - initialY; } 
                    else { currentX = e.clientX - initialX; currentY = e.clientY - initialY; }
                    xOffset = currentX; yOffset = currentY;
                    setTranslate(currentX, currentY, el);

                    // 悬停高亮反馈
const elRect = el.getBoundingClientRect();
                    ['box1', 'box2'].forEach(id => {
                        const b = document.getElementById(id);
                        const bRect = b.getBoundingClientRect();
                        if(elRect.left < bRect.right && elRect.right > bRect.left && elRect.top < bRect.bottom && elRect.bottom > bRect.top) {
                            b.classList.add('drag-over');
                        } else {
                            b.classList.remove('drag-over');
                        }
                    });
                }
            }

            function setTranslate(xPos, yPos, el) { el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`; }

            el.addEventListener("touchstart", dragStart, {passive: false});
            el.addEventListener("touchend", dragEnd, {passive: false});
            el.addEventListener("touchmove", drag, {passive: false});
            el.addEventListener("mousedown", dragStart);
            window.addEventListener("mouseup", dragEnd);
            window.addEventListener("mousemove", drag);
        }

        // ================= 游成 2：找找不一样的 (点击纠错) =================
        function initGame2() {
            const boxRigid = document.getElementById('g2-box-rigid');
            const boxAi = document.getElementById('g2-box-ai');
            
            // 清理旧玩兀(保留标题)
Array.from(boxRigid.children).forEach(c => { if(!c.classList.contains('box-label')) c.remove(); });
            Array.from(boxAi.children).forEach(c => { if(!c.classList.contains('box-label')) c.remove(); });

            // 线色箱子（带有个蓝色的错误项）
            ['🍎', '🚗', '🎈'].forEach(t => {
                let el = document.createElement('div'); el.className = 'g2-toy'; el.innerText = t;
                el.onclick = () => playGentleBoop(); // 点对了没反应，只给轻柔提示            
boxRigid.appendChild(el);
});
            
            // 错误项
let wrongItem = document.createElement('div');
            wrongItem.className = 'g2-toy';
            wrongItem.innerText = '🚙';
            wrongItem.onclick = function() {
                playSuccessSound();
                this.style.position = 'relative';
                this.classList.add('fly-correct');
                setTimeout(() => {
                    this.classList.remove('fly-correct');
                    boxAi.appendChild(this); // 移入正确的箱子
this.onclick = null;
                    setTimeout(() => {
                        showSuccess("火眼金睛：, "传统的标签分类很死板：br>AI无标签分类更聪明灵活哦！");
                    }, 500);
                }, 1000);
            };
            // 随机插入到线色箱子中
boxRigid.insertBefore(wrongItem, boxRigid.children[Math.floor(Math.random() * 3) + 1]);

            // 蓝色AI箱子初始为空，或者放一点蓝色物品            ['📘', '🐳'].forEach(t => {
let el = document.createElement('div'); el.className = 'g2-toy'; el.innerText = t;
                boxAi.appendChild(el);
            });
        }

        // ================= 游成 3：AI盲辨大战成(剪影) =================
const g3Levels = [
            { target: '🧸', options: ['🚗', '🧸', '🍎'] },
            { target: '🎸', options: ['🎸', '⚪', '📚'] },
            { target: '🐰', options: ['🐶', '🐱', '🐰'] }
        ];
        let currentG3Level = 0;

        function initGame3() {
            currentG3Level = 0;
            loadG3Level();
        }

        function loadG3Level() {
            const data = g3Levels[currentG3Level];
            const targetEl = document.getElementById('g3-target');
            const optionsContainer = document.getElementById('g3-options');
            
            targetEl.innerText = data.target;
            targetEl.classList.remove('revealed');
            
            optionsContainer.innerHTML = '';
            // 打乱选项
const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(opt => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerText = opt;
                card.onclick = () => {
                    if(opt === data.target) {
                        playSuccessSound();
                        card.classList.add('correct');
                        targetEl.classList.add('revealed');
                        document.getElementById('g3-dialogue').innerHTML = "点点：span style='color:var(--success-color)'>猜对啦！AI就是靠特征识别物体的：</span>";
                        
                        setTimeout(() => {
                            currentG3Level++;
                            if(currentG3Level < g3Levels.length) {
                                document.getElementById('g3-dialogue').innerHTML = "点点：AI不用看标签，靠形状就能认出玩具！<br>猜猜这个黑影是什么玩具？";
                                loadG3Level();
                            } else {
                                showSuccess("全部猜对：, "你就像AI一样聪明！<br>不需要标签，靠特征就能认出所有玩具！");
                            }
                        }, 2000);
                    } else {
                        playGentleBoop();
                        card.classList.add('wrong');
                        setTimeout(() => card.classList.remove('wrong'), 400);
                    }
                };
                optionsContainer.appendChild(card);
            });
        }
    </script>
