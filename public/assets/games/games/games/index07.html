<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第7课：行李箱装不下啦</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="../../libs/libs/tailwind.min.js"></script>
    
    <!-- 引入 React 和ReactDOM -->
    <script crossorigin src="../../libs/libs/react.production.min.js"></script>
    <script crossorigin src="../../libs/libs/react-dom.production.min.js"></script>
    
    <!-- 修复项1：固宀Babel 版本一7.23.6，避免新版本引入模块导入错误 -->
    <script src="../../libs/libs/babel.min.js"></script>
    
    <!-- 修复项2：将 @import 替换为更稳定的link 标签 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', cursive, sans-serif;
            background-color: #fdf6e3;
            background-image: radial-gradient(#e2d5c3 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }
        
        .graph-paper {
            background-color: #fff;
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 30px 30px;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        
        .bounce-in {
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .float-anim {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .shake-anim {
            animation: shake 0.4s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            50% { transform: translateX(5px) rotate(5deg); }
            75% { transform: translateX(-5px) rotate(-5deg); }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root">
        <!-- 增加防白屏的加载提示 -->
        <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #f97316; font-size: 1.5rem; font-weight: bold;">
            <div style="margin-bottom: 20px;">🎨 正在准备互动课件...</div>
            <div style="font-size: 1rem; color: #6b7280; font-weight: normal;">如果长时间未加载，请刷新页面哦！</div>
        </div>
    </div>

    <!-- 修复项3：明确声昀presets 和作一module 运行 -->
    <script type="text/babel" data-presets="react,env" data-type="module">
        const { useState, useEffect } = React;

        const tuantuanImages = [
            '../../characters/characters/tuantuan.png', '../../characters/characters/tuantuan01.png', '../../characters/characters/tuantuan02.png', '../../characters/characters/tuantuan03.png',
            '../../characters/characters/tuantuan04.png', '../../characters/characters/tuantuan05.png', '../../characters/characters/tuantuan06.png'
        ];
        const diandianImages = [
            '../../characters/characters/diandian.png', '../../characters/characters/diandian01.png', '../../characters/characters/diandian02.png', '../../characters/characters/diandian03.png',
            '../../characters/characters/diandian04.png', '../../characters/characters/diandian05.png', '../../characters/characters/diandian06.png'
        ];

        function getRandomImage(images) {
            return images[Math.floor(Math.random() * images.length)];
        }

        const DiandianSVG = ({ className }) => (
            <img src={getRandomImage(diandianImages)} className={className} style={{ objectFit: 'contain' }} alt="点点" />
        );

        const TuantuanSVG = ({ className }) => (
            <img src={getRandomImage(tuantuanImages)} className={className} style={{ objectFit: 'contain' }} alt="团团" />
        );

        const Intro = ({ onNext }) => (
            <div className="flex flex-col items-center justify-center h-full text-center p-6 bounce-in">
                <h1 className="text-4xl md:text-5xl font-bold text-orange-600 mb-8 drop-shadow-md">
                    第7课：行李箱装不下啦！
                </h1>
                
                <div className="flex flex-col md:flex-row items-center justify-center gap-8 mb-8">
                    <div className="relative w-48 h-48">
                        <TuantuanSVG className="w-full h-full" />
                        <div className="absolute top-0 -left-16 bg-white p-3 rounded-2xl rounded-br-none shadow-lg border-2 border-orange-200">
                            <p className="text-gray-700 text-sm">大画太大了，<br/>怎么塞都合不上！</p>
                        </div>
                    </div>
                    
                    <div className="relative w-48 h-48 float-anim">
                        <DiandianSVG className="w-full h-full" />
                        <div className="absolute top-0 -right-16 bg-white p-3 rounded-2xl rounded-bl-none shadow-lg border-2 border-blue-200">
                            <p className="text-gray-700 text-sm">别急，我们可以<br/>画<strong className="text-blue-500 text-lg">{'压缩'}</strong>魔术：</p>
                        </div>
                    </div>
                </div>
                
                <div className="bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-sm border border-orange-100 max-w-2xl mb-8">
                    <p className="text-xl text-gray-800 mb-4">
                        小朋友，今天我们要学习像整理衣服一样，把电脑里的文件变小　                    </p>
                    <p className="text-orange-500 font-bold text-xl">准备好和点点一起施展魔法了吗？</p>
                </div>

                <button 
                    onClick={onNext}
                    className="bg-orange-500 hover:bg-orange-400 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-[0_6px_0_#c2410c] hover:shadow-[0_2px_0_#c2410c] hover:translate-y-1 transition-all"
                >
                    开始挑战！
                </button>
            </div>
        );

        const Game1 = ({ onNext }) => {
            const initialRows = [
                { id: 1, colorName: '蓝', color: 'bg-blue-400', count: 7, isCounted: false, isCompressed: false, options: [5, 7, 8] },
                { id: 2, colorName: '红', color: 'bg-red-400', count: 4, isCounted: false, isCompressed: false, options: [3, 4, 6] },
                { id: 3, colorName: '绿', color: 'bg-green-400', count: 3, isCounted: false, isCompressed: false, options: [2, 3, 5] },
            ];

            const [rows, setRows] = useState(initialRows);
            const [isSuccess, setIsSuccess] = useState(false);
            const [wrongGuess, setWrongGuess] = useState({ rowId: null, guess: null });

            useEffect(() => {
                if (rows.every(r => r.isCompressed)) {
                    setTimeout(() => setIsSuccess(true), 600);
                }
            }, [rows]);

            const handleGuess = (id, guess) => {
                const row = rows.find(r => r.id === id);
                if (guess === row.count) {
                    setRows(rows.map(r => r.id === id ? { ...r, isCounted: true } : r));
                    setWrongGuess({ rowId: null, guess: null });
                } else {
                    setWrongGuess({ rowId: id, guess: guess });
                    setTimeout(() => setWrongGuess({ rowId: null, guess: null }), 400);
                }
            };

            const compressRow = (id) => {
                setRows(rows.map(r => r.id === id ? { ...r, isCompressed: true } : r));
            };

            return (
                <div className="flex flex-col h-full p-4 md:p-8 max-w-4xl mx-auto bounce-in">
                    <div className="flex items-center gap-4 mb-6">
                        <div className="w-20 h-20 shrink-0 float-anim">
                            <DiandianSVG className="w-full h-full" />
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border-2 border-blue-200 relative flex-1">
                            <div className="absolute w-4 h-4 bg-white border-b-2 border-l-2 border-blue-200 transform rotate-45 -left-2.5 top-8"></div>
                            <h2 className="text-2xl font-bold text-blue-600 mb-2">挑战 1：数一数，施展魔法</h2>
                            <p className="text-gray-700 text-lg">
                                先准确数出方块的数量，解锁并点击<strong className="text-orange-500">“施展魔法 </strong>，看它们怎么省下空间：                            </p>
                        </div>
                    </div>

                    <div className="graph-paper p-4 md:p-8 flex-1 flex flex-col justify-center relative border-4 border-gray-200">
                        {isSuccess && (
                            <div className="absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/95 backdrop-blur-sm rounded-xl bounce-in">
                                <h3 className="text-4xl md:text-5xl font-bold text-orange-500 mb-4 drop-shadow-md">太棒啦！</h3>
                                
                                <div className="bg-orange-50 border-2 border-orange-200 rounded-2xl p-6 mb-6 text-center shadow-inner max-w-sm">
                                    <h4 className="text-2xl text-orange-700 font-bold mb-4">空间大比拀📊</h4>
                                    <div className="flex justify-between items-center text-lg text-gray-700 mb-2 border-b border-orange-200 pb-2">
                                        <span>没压缩前：</span>
                                        <span><strong className="text-red-500 text-2xl">14</strong> 个格子</span>
                                    </div>
                                    <div className="flex justify-between items-center text-lg text-gray-700 mb-4">
                                        <span>压缩魔法后：</span>
                                        <span><strong className="text-green-500 text-2xl">6</strong> 个格子</span>
                                    </div>
                                    <div className="bg-orange-200 text-orange-800 rounded-xl p-3 font-bold text-xl bounce-in">
                                        直接省下了<span className="text-3xl text-orange-600">8</span> 个格子！
                                    </div>
                                    <p className="text-sm text-gray-500 mt-2">（现在的6个格子= 3个颜色块 + 3个数字块：</p>
                                </div>

                                <button onClick={onNext} className="bg-blue-500 hover:bg-blue-400 text-white text-xl font-bold py-3 px-8 rounded-full shadow-[0_4px_0_#1d4ed8] hover:translate-y-1 hover:shadow-none transition-all">
                                    行李箱合上啦！进入下一兀➡                                </button>
                            </div>
                        )}

                        <div className="flex font-bold text-gray-400 mb-4 pb-2 border-b-2 border-dashed border-gray-300">
                            <div className="w-[45%] text-center text-lg md:text-xl">Before (压缩剀</div>
                            <div className="w-[55%] text-center text-lg md:text-xl border-l-2 border-dashed border-gray-300">After (压缩吀</div>
                        </div>

                        <div className="space-y-8">
                            {rows.map((row) => (
                                <div key={row.id} className="flex items-center">
                                    
                                    <div className="w-[45%] flex items-center gap-1 justify-center relative min-h-[50px] flex-wrap">
                                        {!row.isCompressed ? (
                                            Array.from({ length: row.count }).map((_, i) => (
                                                <div key={i} className={`w-8 h-8 md:w-10 md:h-10 ${row.color} rounded border-2 border-black/20 shadow-sm bounce-in flex items-center justify-center text-white/50 font-bold text-xs md:text-base`}>
                                                    1
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-gray-300 text-sm md:text-lg italic">空间已腾出~</div>
                                        )}
                                    </div>
                                    
                                    <div className="w-[55%] flex items-center border-l-2 border-dashed border-gray-300 min-h-[50px] pl-2 md:pl-6">
                                        
                                        {!row.isCounted && !row.isCompressed && (
                                            <div className="flex flex-col w-full bounce-in">
                                                <span className="text-gray-500 text-sm font-bold mb-1">数一数，有几个{row.colorName}色？</span>
                                                <div className="flex gap-2">
                                                    {row.options.map((opt, i) => {
                                                        const isWrong = wrongGuess.rowId === row.id && wrongGuess.guess === opt;
                                                        return (
                                                            <button 
                                                                key={i}
                                                                onClick={() => handleGuess(row.id, opt)}
                                                                className={`w-10 h-10 md:w-12 md:h-12 rounded-full font-bold text-lg transition-all shadow-sm border-2
                                                                    ${isWrong ? 'bg-red-100 text-red-500 border-red-300 shake-anim' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50 hover:border-gray-300 hover:scale-105'}`}
                                                            >
                                                                {opt}
                                                            </button>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {row.isCounted && !row.isCompressed && (
                                            <div className="flex w-full items-center justify-start bounce-in">
                                                <button 
                                                    onClick={() => compressRow(row.id)}
                                                    className="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-bold py-2 px-3 md:px-5 rounded-full shadow-md hover:scale-105 transition-transform flex items-center gap-1 border-2 border-yellow-500"
                                                >
                                                    <span>🌟施展魔法</span>
                                                    <span className="text-lg">➡</span>
                                                </button>
                                            </div>
                                        )}

                                        {row.isCompressed && (
                                            <div className="flex items-center gap-2 bounce-in w-full">
                                                <div className={`h-8 md:h-10 ${row.color} rounded border-2 border-black/20 shadow-md flex items-center justify-center text-white font-bold px-2 md:px-4`}
                                                     style={{ width: `${Math.min(row.count * 12, 120)}px`, minWidth: '50px' }}>
                                                </div>
                                                <div className="bg-white border-2 border-gray-300 rounded-lg px-2 py-1 md:px-3 md:py-1 font-bold text-gray-700 shadow-sm flex items-center gap-1 text-sm md:text-base whitespace-nowrap">
                                                    <span className={`w-3 h-3 rounded-full ${row.color}`}></span>
                                                    × {row.count}
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const Game2 = ({ onRestart }) => {
            const itemsList = [
                { id: 1, name: '风景甀', type: 'lossy', icon: '🌲⛰️', desc: '少几片叶子也能认出是森林' },
                { id: 2, name: '课本文字', type: 'lossless', icon: '📝📚', desc: '字迹模糊就看不懂了' },
                { id: 3, name: '简单像素树', type: 'lossy', icon: '🌳', desc: '颜色少一点，形状还在' },
                { id: 4, name: '身份证照牀', type: 'lossless', icon: '🪪👤', desc: '必须看清楚是谁，不能变样' },
            ];

            const [items, setItems] = useState(itemsList);
            const [currentItemIndex, setCurrentItemIndex] = useState(0);
            const [boxes, setBoxes] = useState({ lossy: [], lossless: [] });
            const [feedback, setFeedback] = useState(null);
            const [isFinished, setIsFinished] = useState(false);

            const currentItem = items[currentItemIndex];

            const handleSort = (targetType) => {
                if (!currentItem) return;

                if (currentItem.type === targetType) {
                    setFeedback({ type: 'success', text: '分对啦！' });
                    setBoxes(prev => ({
                        ...prev,
                        [targetType]: [...prev[targetType], currentItem]
                    }));
                    
                    setTimeout(() => {
                        setFeedback(null);
                        if (currentItemIndex + 1 < items.length) {
                            setCurrentItemIndex(curr => curr + 1);
                        } else {
                            setIsFinished(true);
                        }
                    }, 1000);
                } else {
                    setFeedback({ type: 'error', text: '哎呀，再想想！' });
                    setTimeout(() => setFeedback(null), 1500);
                }
            };

            return (
                <div className="flex flex-col h-full p-4 md:p-8 max-w-5xl mx-auto bounce-in">
                    <div className="flex items-center gap-4 mb-4">
                        <div className="w-20 h-20 shrink-0 float-anim">
                            <TuantuanSVG className="w-full h-full" />
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border-2 border-orange-200 relative flex-1">
                            <div className="absolute w-4 h-4 bg-white border-b-2 border-l-2 border-orange-200 transform rotate-45 -left-2.5 top-8"></div>
                            <h2 className="text-2xl font-bold text-orange-600 mb-2">挑战 2：能不能丢细节？</h2>
                            <p className="text-gray-700 text-lg">
                                有些文件压缩<strong className="text-green-600">可以少点细节（变糊一点点：</strong>，有了<strong className="text-red-500">绝对不能丢细节</strong>。帮我分一分吧：                            </p>
                        </div>
                    </div>

                    {!isFinished ? (
                        <div className="flex flex-col items-center justify-center flex-1 space-y-8">
                            <div className="relative">
                                {currentItem && (
                                    <div className="bg-white p-8 rounded-3xl shadow-xl border-4 border-blue-100 flex flex-col items-center transform transition-transform hover:scale-105 w-64 bounce-in">
                                        <div className="text-6xl mb-4">{currentItem.icon}</div>
                                        <h3 className="text-2xl font-bold text-gray-800 text-center">{currentItem.name}</h3>
                                    </div>
                                )}
                                
                                {feedback && (
                                    <div className={`absolute -top-12 left-1/2 transform -translate-x-1/2 px-6 py-2 rounded-full font-bold text-white shadow-lg bounce-in z-20 ${feedback.type === 'success' ? 'bg-green-500' : 'bg-red-500 shake-anim'}`}>
                                        {feedback.text}
                                    </div>
                                )}
                            </div>

                            <div className="flex flex-col md:flex-row gap-6 w-full justify-center px-4">
                                <button 
                                    onClick={() => handleSort('lossy')}
                                    className="flex-1 bg-green-100 hover:bg-green-200 border-4 border-green-400 rounded-2xl p-6 shadow-md transition-all flex flex-col items-center group relative overflow-hidden"
                                >
                                    <div className="absolute inset-0 bg-green-500 opacity-0 group-hover:opacity-10 transition-opacity"></div>
                                    <h4 className="text-2xl font-bold text-green-700 mb-2">🟢 可以少点细节</h4>
                                    <p className="text-green-600 font-medium">（变小、稍糊也没关系）</p>
                                    
                                    <div className="mt-4 flex gap-2 flex-wrap justify-center">
                                        {boxes.lossy.map(item => (
                                            <span key={item.id} className="text-2xl bg-white/50 rounded-md p-1" title={item.name}>{item.icon}</span>
                                        ))}
                                    </div>
                                </button>

                                <button 
                                    onClick={() => handleSort('lossless')}
                                    className="flex-1 bg-red-100 hover:bg-red-200 border-4 border-red-400 rounded-2xl p-6 shadow-md transition-all flex flex-col items-center group relative overflow-hidden"
                                >
                                    <div className="absolute inset-0 bg-red-500 opacity-0 group-hover:opacity-10 transition-opacity"></div>
                                    <h4 className="text-2xl font-bold text-red-700 mb-2">🔴 不能丢细节</h4>
                                    <p className="text-red-600 font-medium">（必须超清晰，不能变糊）</p>

                                    <div className="mt-4 flex gap-2 flex-wrap justify-center">
                                        {boxes.lossless.map(item => (
                                            <span key={item.id} className="text-2xl bg-white/50 rounded-md p-1" title={item.name}>{item.icon}</span>
                                        ))}
                                    </div>
                                </button>
                            </div>
                            
                            <div className="text-gray-500 font-medium">
                                进度: {currentItemIndex + 1} / {items.length}
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col items-center justify-center flex-1 bg-white/80 backdrop-blur-sm rounded-3xl shadow-sm border border-green-200 p-8 bounce-in">
                            <h3 className="text-4xl font-bold text-green-600 mb-6 flex items-center gap-3">
                                <span>🎉</span> 全部分对啦！ <span>🎉</span>
                            </h3>
                            <div className="w-32 h-32 mb-6">
                                <DiandianSVG className="w-full h-full float-anim" />
                            </div>
                            
                            <div className="bg-yellow-50 p-6 rounded-2xl border-2 border-yellow-200 max-w-2xl text-left mb-8">
                                <h4 className="font-bold text-xl text-yellow-800 mb-3">复盘小结：</h4>
                                <ul className="space-y-2 text-lg text-gray-700 list-disc list-inside">
                                    <li><strong className="text-blue-500">压缩</strong>就像施魔术，能让文件变小，省出空间　</li>
                                    <li>有些压缩会<strong className="text-orange-500">丢掉一点细芀</strong>，比如风景画　</li>
                                    <li>像文字、证件照：<strong className="text-red-500">不能随便丢细节</strong>，否则就没法用啦：</li>
                                </ul>
                            </div>

                            <button onClick={onRestart} className="bg-orange-500 hover:bg-orange-400 text-white text-xl font-bold py-3 px-8 rounded-full shadow-[0_4px_0_#c2410c] hover:translate-y-1 hover:shadow-none transition-all">
                                再次复习课程 ↀ                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [currentStage, setCurrentStage] = useState('intro'); 

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">🎒</span>
                                <span className="font-bold text-gray-700 text-lg md:text-xl">AI启蒙绘本：第7课</span>
                            </div>
                            <div className="flex gap-2">
                                <span className={`w-3 h-3 rounded-full ${currentStage === 'intro' ? 'bg-orange-500' : 'bg-gray-300'}`}></span>
                                <span className={`w-3 h-3 rounded-full ${currentStage === 'game1' ? 'bg-orange-500' : 'bg-gray-300'}`}></span>
                                <span className={`w-3 h-3 rounded-full ${currentStage === 'game2' ? 'bg-orange-500' : 'bg-gray-300'}`}></span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden">
                        {currentStage === 'intro' && <Intro onNext={() => setCurrentStage('game1')} />}
                        {currentStage === 'game1' && <Game1 onNext={() => setCurrentStage('game2')} />}
                        {currentStage === 'game2' && <Game2 onRestart={() => setCurrentStage('intro')} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
