<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开关城的两兄弟 - 互动游成</title>
    <style>
        :root {
            --bg-color: #fcf4e6;
            --text-blue: #1c4b79;
            --card-black: #333333;
            --card-white: #ffffff;
            --accent-yellow: #fdf2c6;
        }

        body {
            font-family: 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 模拟背景隐约的电路纹理*/
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(136, 175, 204, 0.1) 10px, transparent 10px),
                linear-gradient(90deg, rgba(136, 175, 204, 0.1) 2px, transparent 2px),
                linear-gradient(rgba(136, 175, 204, 0.1) 2px, transparent 2px);
            background-size: 150px 150px, 50px 50px, 50px 50px;
        }

        h1, h2 {
            color: var(--text-blue);
            text-align: center;
            letter-spacing: 2px;
        }

        .tab-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background-color: var(--card-white);
            border: 2px solid var(--text-blue);
            color: var(--text-blue);
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--text-blue);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--text-blue);
            color: var(--card-white);
        }

        .game-section {
            display: none;
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
            border: 2px dashed #d1c0a5;
        }

        .game-section.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 黑白卡片样式 */
        .card-container {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .card {
            width: 70px;
            height: 80px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            box-shadow: 3px 4px 6px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }

        .card:active {
            transform: translateY(2px);
            box-shadow: 1px 2px 3px rgba(0,0,0,0.15);
        }

        .card.val-0 {
            background-color: var(--card-black);
            color: var(--card-white);
            border: 2px solid #222;
        }

        .card.val-1 {
            background-color: var(--card-white);
            color: var(--card-black);
            border: 2px solid #ddd;
        }

        /* 游成1：开关城点灯 */
        .light-bulb {
            font-size: 60px;
            margin: 20px;
            filter: grayscale(100%);
            transition: all 0.3s;
        }
        .light-bulb.on {
            filter: grayscale(0%);
            text-shadow: 0 0 20px #ffea00;
        }
        
        .target-box {
            background: var(--card-white);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            color: var(--card-black);
            border: 2px solid var(--text-blue);
            margin-bottom: 20px;
        }

        /* 游成2：表情对照表与输净*/
        .reference-table {
            background-color: var(--card-white);
            border: 2px solid #dcd0c0;
            border-radius: 15px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .ref-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 30px;
            padding: 10px;
            border-radius: 10px;
        }
        
        .ref-item.highlight {
            background-color: var(--accent-yellow);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .mini-cards {
            display: flex;
            gap: 5px;
        }

        .mini-card {
            width: 30px;
            height: 35px;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }

        .mini-card.val-0 { background: var(--card-black); color: white; }
        .mini-card.val-1 { background: var(--card-white); color: var(--card-black); border: 1px solid #ccc; }

        .result-display {
            font-size: 80px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .character-zone {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 150px;
            margin-top: 20px;
        }
        .character-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        .character-tag {
            font-size: 16px;
            background: #fff;
            padding: 5px 10px;
            border-radius: 20px;
            border: 2px solid var(--text-blue);
            font-weight: bold;
            color: var(--text-blue);
            text-align: center;
            transform: translateY(-10px);
        }

    </style>
</head>
<body>

    <h1>🤖 开关城的两兄弟 ⚪</h1>
    
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchGame(1)">游成 1：抢修开关城</button>
        <button class="tab-btn" onclick="switchGame(2)">游成 2：黑白卡片发消息</button>
    </div>

    <div id="game1" class="game-section active">
        <h2>点点提示：看到就亮，看到就灭：</h2>
        <div class="target-box" id="g1-target">目标指令： 0 1 1</div>
        
        <div class="light-bulb" id="g1-light">💡</div>
        
        <div class="card-container" id="g1-cards">
            </div>
        
        <p style="color: #666; font-weight:bold;" id="g1-message">点击卡片切换 0 和1，点亮正确的路灯吧！</p>
    </div>

    <div id="game2" class="game-section">
        <h2>动手：用4位卡片表示不同表情</h2>
        
        <div class="reference-table" id="ref-table">
            </div>

        <div class="result-display" id="g2-emoji">❌</div>

        <div class="card-container" id="g2-cards">
            <div class="card val-0" onclick="toggleCard(this, 2)">0</div>
            <div class="card val-0" onclick="toggleCard(this, 2)">0</div>
            <div class="card val-0" onclick="toggleCard(this, 2)">0</div>
            <div class="card val-0" onclick="toggleCard(this, 2)">0</div>
        </div>

        <div class="character-zone">
            <div>
                <div class="character-tag">团团 (0)</div>
                <img id="tuantuan-img" class="character-img" src="" alt="团团" />
            </div>
            <div>
                <div class="character-tag">点点 (1)</div>
                <img id="diandian-img" class="character-img" src="" alt="点点" />
            </div>
        </div>
    </div>

    <script>
        // --- 角色图片加载逻辑 ---
const tuantuanImages = [
            '../../characters/characters/tuantuan.png', '../../characters/characters/tuantuan01.png', '../../characters/characters/tuantuan02.png', '../../characters/characters/tuantuan03.png',
            '../../characters/characters/tuantuan04.png', '../../characters/characters/tuantuan05.png', '../../characters/characters/tuantuan06.png'
        ];
        const diandianImages = [
            '../../characters/characters/diandian.png', '../../characters/characters/diandian01.png', '../../characters/characters/diandian02.png', '../../characters/characters/diandian03.png',
            '../../characters/characters/diandian04.png', '../../characters/characters/diandian05.png', '../../characters/characters/diandian06.png'
        ];

        function getRandomImage(images) {
            return images[Math.floor(Math.random() * images.length)];
        }

        function initCharacters() {
            document.getElementById('tuantuan-img').src = getRandomImage(tuantuanImages);
            document.getElementById('diandian-img').src = getRandomImage(diandianImages);
        }

        // --- 通用与UI切换逻辑 ---
        function switchGame(gameNum) {
            document.querySelectorAll('.game-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`game${gameNum}`).classList.add('active');
            document.querySelectorAll('.tab-btn')[gameNum-1].classList.add('active');
            
            if(gameNum === 1) initGame1();
        }

        function toggleCard(element, gameNum) {
            if (element.classList.contains('val-0')) {
                element.classList.remove('val-0');
                element.classList.add('val-1');
                element.innerText = '1';
            } else {
                element.classList.remove('val-1');
                element.classList.add('val-0');
                element.innerText = '0';
            }
            
            if (gameNum === 1) checkGame1();
            if (gameNum === 2) checkGame2();
        }

        // --- 游成1：开关城点灯逻辑 (对应绘本第7-8页 ---
let currentTarget = "";
        
        function initGame1() {
            // 随机生成4位二进制
currentTarget = Array.from({length: 4}, () => Math.random() > 0.5 ? '1' : '0').join('');
            document.getElementById('g1-target').innerText = `目标修复指令：${currentTarget.split('').join(' ')}`;
            
            const container = document.getElementById('g1-cards');
            container.innerHTML = '';
            for(let i=0; i<4; i++) {
                const card = document.createElement('div');
                card.className = 'card val-0';
                card.innerText = '0';
                card.onclick = function() { toggleCard(this, 1); };
                container.appendChild(card);
            }
            document.getElementById('g1-light').classList.remove('on');
            document.getElementById('g1-message').innerText = "点击卡片切换 0 和1，点亮正确的路灯吧！";
            document.getElementById('g1-message').style.color = "#666";
        }

        function checkGame1() {
            const cards = document.getElementById('g1-cards').children;
            let currentVal = Array.from(cards).map(c => c.innerText).join('');
            
            if (currentVal === currentTarget) {
                document.getElementById('g1-light').classList.add('on');
                document.getElementById('g1-message').innerText = "太棒啦！信息连通，路灯亮起来了！🌈";
                document.getElementById('g1-message').style.color = "#d97706";
                setTimeout(initGame1, 3000); // 3秒后刷新下一题
} else {
                document.getElementById('g1-light').classList.remove('on');
                document.getElementById('g1-message').innerText = "信号还不匹配哦，继续调整~";
                document.getElementById('g1-message').style.color = "#666";
            }
        }

        // --- 游成2：表情对照逻辑 (对应图片第9-10页 ---
const emojiDict = {
            "0011": "😊",
            "0001": "😒",
            "1011": "😉",
            "0110": "😢",
            "0010": "😡"
        };

        function initGame2() {
            const table = document.getElementById('ref-table');
            table.innerHTML = '';
            
            for (const [code, emoji] of Object.entries(emojiDict)) {
                const item = document.createElement('div');
                item.className = 'ref-item';
                item.id = `ref-${code}`;
                
                let miniCardsHTML = code.split('').map(bit => 
                    `<div class="mini-card val-${bit}">${bit}</div>`
                ).join('');
                
                item.innerHTML = `<span>${emoji}</span> <div class="mini-cards">${miniCardsHTML}</div>`;
                table.appendChild(item);
            }
        }

        function checkGame2() {
            const cards = document.getElementById('g2-cards').children;
            let currentVal = Array.from(cards).map(c => c.innerText).join('');
            
            // 清除所有高亮
document.querySelectorAll('.ref-item').forEach(el => el.classList.remove('highlight'));
            
            const display = document.getElementById('g2-emoji');
            
            if (emojiDict[currentVal]) {
                display.innerText = emojiDict[currentVal];
                // 重新触发动画
display.style.animation = 'none';
                display.offsetHeight; // 触发重绘
display.style.animation = null;
                
                // 点亮对照表
document.getElementById(`ref-${currentVal}`).classList.add('highlight');
} else {
                display.innerText = "❌";
            }
        }

        // 初始化
initGame1();
        initGame2();
        initCharacters();

    </script>
</body>
</html>
