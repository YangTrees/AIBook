<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第10课：会数数的刷牙机器人- 循环大冒险</title>
    <style>
        :root {
            --bg-color: #f8f1e5; /* 更柔和的水彩底色 */
            --primary-blue: #7bc5f8; /* 点点主色 */
            --primary-orange: #f29c54; /* 团团外套色*/
            --btn-red: #ff6b6b;
            --btn-green: #4ecdc4;
            --btn-yellow: #ffe66d;
            --text-color: #5c4a4a;
            --bubble-color: rgba(173, 216, 230, 0.7);
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'PingFang SC', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,240,220,0.4) 0%, transparent 50%);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            color: #6a4c41;
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #8d6e63;
            margin-bottom: 20px;
        }

        h2 {
            color: var(--primary-blue);
            background: white;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
            border: 2px dashed var(--primary-blue);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 15px 35px rgba(123, 197, 248, 0.2);
            border: 4px solid white;
        }

        .game-section {
            margin-bottom: 40px;
            padding: 25px 15px;
            border-radius: 25px;
            background: linear-gradient(135deg, #ffffff 0%, #fdfbf7 100%);
            border: 3px solid #e0d8c8;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        /* --- 角色形象 CSS 绘制 (贴近插图) --- */
        .character-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            margin-bottom: 20px;
            min-height: 180px;
        }

        /* 团团 (小男子 */
        .tuantuan {
            position: relative;
            width: 90px;
            height: 140px;
            z-index: 2;
        }
        .tt-head {
            width: 70px; height: 65px;
            background: #ffe0cc; /* 肤色 */
            border-radius: 40% 40% 50% 50%;
            position: absolute; top: 0; left: 10px;
            border: 2px solid #e6b999;
            z-index: 3;
        }
        .tt-hair {
            width: 76px; height: 35px;
            background: #4a3b32;
            border-radius: 40px 40px 10px 10px;
            position: absolute; top: -5px; left: 7px;
            z-index: 4;
        }
        .tt-face {
            position: absolute; top: 30px; left: 0; width: 100%; text-align: center; z-index: 4;
        }
        .tt-eye { display: inline-block; width: 6px; height: 6px; background: #333; border-radius: 50%; margin: 0 8px; }
        .tt-blush { display: inline-block; width: 12px; height: 8px; background: rgba(255,100,100,0.3); border-radius: 50%; position: absolute; top: 8px; }
        .tt-blush.left { left: 10px; } .tt-blush.right { right: 10px; }
        .tt-mouth { width: 12px; height: 6px; border-bottom: 2px solid #d97777; border-radius: 0 0 10px 10px; margin: 2px auto 0; }
        
        .tt-body {
            width: 60px; height: 55px;
            background: var(--primary-orange); /* 外套 */
            border-radius: 15px 15px 0 0;
            position: absolute; top: 55px; left: 15px;
            border: 2px solid #d9823b;
            z-index: 2;
        }
        .tt-backpack {
            width: 25px; height: 50px;
            background: #5abcb3;
            border-radius: 10px 0 0 10px;
            position: absolute; top: 58px; left: -5px;
            z-index: 1;
            border: 2px solid #3c8a83;
        }
        .tt-pants {
            width: 50px; height: 35px;
            background: #5b8db5; /* 牛仔裀*/
            position: absolute; top: 110px; left: 20px;
            border-radius: 0 0 5px 5px;
            border: 2px solid #426b8e;
            display: flex; gap: 2px;
        }
        .tt-leg { width: 24px; height: 100%; background: #5b8db5; }
        .tt-shoes {
            width: 60px; height: 12px;
            position: absolute; top: 140px; left: 15px;
            display: flex; justify-content: space-between;
        }
        .tt-shoe { width: 26px; height: 12px; background: #fff; border: 2px solid #ccc; border-radius: 8px 8px 4px 4px; }
        .tt-arm {
            width: 15px; height: 40px;
            background: var(--primary-orange);
            position: absolute; top: 60px; border-radius: 8px;
            border: 2px solid #d9823b; z-index: 3;
        }
        .tt-arm-left { left: 5px; transform: rotate(15deg); }
        .tt-arm-right { right: 5px; transform: rotate(-20deg); transform-origin: top center; animation: pointArm 2s infinite alternate;}
        
        @keyframes pointArm {
            0% { transform: rotate(-20deg); }
            100% { transform: rotate(-45deg); }
        }

        /* 点点 (云朵机器人 */
        .diandian {
            position: relative;
            width: 130px;
            height: 120px;
            z-index: 2;
            animation: floatRobot 3s ease-in-out infinite;
        }
        @keyframes floatRobot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .dd-cloud {
            width: 100%; height: 90px;
            background: #fff;
            border-radius: 50px;
            position: absolute; bottom: 0;
            border: 3px solid var(--primary-blue);
            box-shadow: inset -10px -10px 20px rgba(123, 197, 248, 0.2);
            z-index: 2;
        }
        /* 云朵的凸起部别*/
        .dd-cloud::before {
            content: ''; position: absolute; top: -25px; left: 20px;
            width: 50px; height: 50px; background: #fff; border-radius: 50%;
            border: 3px solid var(--primary-blue); border-bottom: none; border-right: none;
            transform: rotate(45deg);
        }
        .dd-cloud::after {
            content: ''; position: absolute; top: -15px; right: 25px;
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
            border: 3px solid var(--primary-blue); border-bottom: none; border-left: none;
            transform: rotate(-45deg);
        }
        /* 遮挡多余边框的内部色址*/
        .dd-cloud-fill {
            position: absolute; top: 5px; left: 10px; width: 110px; height: 80px;
            background: #fff; border-radius: 40px; z-index: 3;
        }

        .dd-screen {
            width: 80px; height: 40px;
            background: #1a2530; /* 深色屏幕 */
            border-radius: 15px;
            position: absolute; top: 30px; left: 25px;
            z-index: 4;
            display: flex; justify-content: space-around; align-items: center; padding: 0 10px; box-sizing: border-box;
            border: 2px solid #555;
        }
        .dd-eye {
            width: 16px; height: 10px;
            background: #00ffff; /* 亮青色眼着*/
            border-radius: 50% 50% 10px 10px;
            box-shadow: 0 0 8px #00ffff;
            transition: all 0.2s;
        }
        .dd-mouth {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 6px; border-bottom: 2px solid #00ffff; border-radius: 0 0 10px 10px;
        }
        .dd-blush {
            width: 15px; height: 8px; background: rgba(255,150,150,0.6); border-radius: 50%;
            position: absolute; top: 50px; z-index: 4;
        }
        .dd-blush.left { left: 10px; } .dd-blush.right { right: 10px; }
        
        .dd-antenna {
            width: 6px; height: 25px; background: #ccc;
            position: absolute; top: -45px; left: 62px; z-index: 1;
            border: 1px solid #999;
        }
        .dd-bulb {
            width: 16px; height: 16px; background: #dcdcdc; border-radius: 50%;
            position: absolute; top: -55px; left: 57px; z-index: 2;
            border: 1px solid #999;
            transition: all 0.3s;
        }
        .dd-bulb.on { background: #ffea00; box-shadow: 0 0 15px #ffea00; border-color: #ffda00; }
        
        /* 机械臀*/
        .dd-arm {
            width: 60px; height: 8px; background: #ddd; border: 2px solid #aaa;
            position: absolute; z-index: 1; border-radius: 4px;
        }
        .dd-arm.left { top: 60px; left: -40px; transform: rotate(20deg); }
        .dd-arm.right { top: 60px; right: -40px; transform: rotate(-20deg); }

        /* --- 游成 UI 通用 --- */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            font-family: inherit;
            margin: 5px;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        .feedback {
            font-size: 1.1em;
            font-weight: bold;
            min-height: 30px;
            margin: 10px 0;
            color: #d35400;
        }

        /* --- 游成 1：点点的记忆雷达 --- */
        #g1-teeth-container {
            display: flex; justify-content: center; gap: 10px; margin: 20px 0;
        }
        .g1-tooth {
            width: 40px; height: 50px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 10px 10px 20px 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            box-shadow: inset 0 -5px 0 #eee;
        }
        .g1-tooth.active {
            background: #fffacd; /* 亮黄色*/
            border-color: #ffd700;
            box-shadow: 0 0 15px #ffd700, inset 0 -5px 0 #eed000;
            transform: scale(1.1);
        }
        .g1-tooth.error {
            background: #ffcccc;
            border-color: var(--btn-red);
            animation: shake 0.4s;
        }
        .g1-tooth.success {
            background: #ccffcc;
            border-color: var(--btn-green);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .g1-controls { margin-top: 15px; }

        /* --- 游成 2：循环打泡泡 --- */
        .g2-area {
            position: relative;
            width: 100%; max-width: 600px; height: 250px;
            margin: 0 auto 20px;
            background: #e0f7fa;
            border-radius: 20px;
            border: 3px solid #b2ebf2;
            overflow: hidden;
        }
        .g2-robot {
            position: absolute; bottom: 10px; left: 10px;
            transform: scale(0.6); transform-origin: bottom left;
        }
        .g2-target-area {
            position: absolute; right: 20px; top: 20px; bottom: 20px;
            width: 150px;
            display: flex; flex-direction: column; justify-content: center; gap: 15px;
        }
        .g2-bubble {
            width: 50px; height: 50px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), var(--bubble-color));
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5), 2px 2px 5px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px;
            transition: all 0.3s;
        }
        .g2-bubble.popped {
            transform: scale(1.5); opacity: 0;
        }
        .g2-water-jet {
            position: absolute; left: 120px; bottom: 50px;
            height: 10px; background: #00bfff;
            border-radius: 5px; opacity: 0;
            transform-origin: left center;
        }
        .g2-water-jet.shoot {
            animation: shootWater 0.3s linear;
        }
        @keyframes shootWater {
            0% { width: 0; opacity: 1; }
            50% { width: 300px; opacity: 1; }
            100% { width: 350px; opacity: 0; transform: translateX(50px); }
        }

        .loop-setter {
            display: inline-flex; align-items: center; background: #fff; padding: 5px 15px; border-radius: 20px; border: 2px solid #ccc;
        }
        .loop-btn {
            background: var(--btn-yellow); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .loop-val { margin: 0 15px; font-size: 24px; font-weight: bold; color: var(--primary-blue); width: 20px; text-align: center;}


        /* --- 游成 3：定制刷牙流水线 --- */
        .g3-pipeline {
            display: flex; justify-content: center; align-items: center; gap: 10px;
            margin: 20px 0; padding: 20px;
            background: #f0f0f0; border-radius: 40px; border: 3px dashed #ccc;
            position: relative;
        }
        /* 循环大箭天*/
        .g3-loop-arrow {
            position: absolute;
            width: calc(100% + 20px); height: calc(100% + 30px);
            border: 6px solid var(--btn-green);
            border-radius: 50px;
            border-top-color: transparent; border-right-color: transparent;
            opacity: 0.2; pointer-events: none;
            transform: rotate(-5deg);
        }
        .g3-slot {
            width: 70px; height: 70px;
            background: white; border: 2px dashed #999; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; color: #aaa;
            transition: all 0.2s;
        }
        .g3-slot.drag-over { background: #e0f7fa; border-color: var(--primary-blue); transform: scale(1.05); }
        
        .g3-action-item {
            width: 60px; height: 60px;
            background: var(--primary-blue); color: white;
            border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 14px; font-weight: bold;
            cursor: grab; box-shadow: 0 4px 0 #5ba8d8;
            user-select: none;
        }
        .g3-action-item:active { cursor: grabbing; }
        .g3-action-item .icon { font-size: 20px; margin-bottom: 2px; }
        
        .g3-library {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; padding: 10px; background: #fff; border-radius: 15px;
        }

        .g3-visualizer {
            display: flex; justify-content: center; gap: 5px; margin-top: 15px; min-height: 40px; flex-wrap: wrap;
        }
        .g3-dot {
            width: 20px; height: 20px; border-radius: 50%; background: #eee;
            border: 2px solid #ccc; display: flex; justify-content: center; align-items: center; font-size: 10px;
        }
        .g3-dot.done { background: var(--btn-green); border-color: #3b9e94; color: white; }
        .g3-dot.active { background: var(--btn-yellow); border-color: #c9a63a; animation: blink 0.5s infinite alternate; }
        
        @keyframes blink { from { opacity: 0.5; } to { opacity: 1; } }

    </style>
</head>
<body>

    <h1>会数数的刷牙机器人</h1>
    <div class="subtitle">和团团、点点一起玩转"循环"魔法！</div>

    <div class="container">
        
        <!-- 角色展示区-->
        <div class="character-container">
            <div class="tuantuan">
                <div class="tt-head">
                    <div class="tt-hair"></div>
                    <div class="tt-face">
                        <div class="tt-eye"></div><div class="tt-eye"></div>
                        <div class="tt-blush left"></div><div class="tt-blush right"></div>
                        <div class="tt-mouth"></div>
                    </div>
                </div>
                <div class="tt-body"></div>
                <div class="tt-backpack"></div>
                <div class="tt-arm tt-arm-left"></div>
                <div class="tt-arm tt-arm-right"></div>
                <div class="tt-pants">
                    <div class="tt-leg"></div><div class="tt-leg"></div>
                </div>
                <div class="tt-shoes">
                    <div class="tt-shoe"></div><div class="tt-shoe"></div>
                </div>
            </div>

            <div class="diandian">
                <div class="dd-bulb" id="main-bulb"></div>
                <div class="dd-antenna"></div>
                <div class="dd-arm left"></div>
                <div class="dd-arm right"></div>
                <div class="dd-cloud"></div>
                <div class="dd-cloud-fill"></div>
                <div class="dd-blush left"></div><div class="dd-blush right"></div>
                <div class="dd-screen">
                    <div class="dd-eye" id="eye-left"></div>
                    <div class="dd-eye" id="eye-right"></div>
                    <div class="dd-mouth"></div>
                </div>
            </div>
        </div>

        <!-- 游成一：点点的"刷牙雷达 -->
        <section class="game-section" id="game1">
            <h2>游成 1：点点的记忆雷达</h2>
            <p>点点扫描了牙齿！记住哪些牙齿亮起，按照顺序点击它们。感受一下"步骤序列"吧：</p>
            
            <div id="g1-teeth-container">
                <div class="g1-tooth" onclick="g1ClickTooth(0)"></div>
                <div class="g1-tooth" onclick="g1ClickTooth(1)"></div>
                <div class="g1-tooth" onclick="g1ClickTooth(2)"></div>
                <div class="g1-tooth" onclick="g1ClickTooth(3)"></div>
                <div class="g1-tooth" onclick="g1ClickTooth(4)"></div>
            </div>
            
            <div class="feedback" id="g1-feedback">点击"开始扫描"看点点的演示！</div>
            
            <div class="g1-controls">
                <button class="btn" style="background: var(--primary-blue); color:white;" onclick="g1StartLevel()">开始扫描</button>
                <span id="g1-level-disp" style="margin-left:10px; font-weight:bold; color:#777;">关卡: 1</span>
            </div>
        </section>


        <!-- 游成二：循环泡泡大作成-->
        <section class="game-section" id="game2">
            <h2>游成 2：循环清扫泡泡</h2>
            <p>发现了细菌泡泡！告诉点点需要*重复喷水几次**才能全部消灭它们：</p>
            
            <div class="g2-area">
                <!-- 缩小版的点点作为发射器-->
                <div class="diandian g2-robot">
                     <div class="dd-bulb"></div><div class="dd-antenna"></div>
                     <div class="dd-arm right" style="width:80px; transform:rotate(-10deg); top:40px;"></div>
                     <div class="dd-cloud"></div><div class="dd-cloud-fill"></div>
                     <div class="dd-screen"><div class="dd-eye"></div><div class="dd-eye"></div></div>
                </div>
                <div class="g2-water-jet" id="g2-jet"></div>
                
                <div class="g2-target-area" id="g2-targets">
                    <!-- 泡泡动态生成-->
                </div>
            </div>

            <div>
                <span>我需要循环（重复）喷水：</span>
                <div class="loop-setter">
                    <button class="loop-btn" onclick="g2ChangeLoop(-1)">-</button>
                    <span class="loop-val" id="g2-loop-val">3</span>
                    <button class="loop-btn" onclick="g2ChangeLoop(1)">+</button>
                </div>
                <span>次</span>
                <button class="btn" style="background: var(--btn-green); color:white; margin-left:20px;" onclick="g2Fire()">执行循环：</button>
            </div>
            <div class="feedback" id="g2-feedback">根据泡泡数量设置循环次数吧！</div>
            <button class="btn" style="font-size:12px; background:#eee;" onclick="g2ResetTargets()">换一批泡泡</button>
        </section>


        <!-- 游成三：定制刷牙流水线-->
        <section class="game-section" id="game3">
            <h2>游成 3：定制刷牙流水线</h2>
            <p>把动作拖入框中组合，设定循环轮数，点点就会像流水线一样自动工作啦：</p>

            <div class="g3-library">
                <div class="g3-action-item" draggable="true" ondragstart="g3Drag(event)" data-act="up"><span class="icon">⬆️</span>刷上面</div>
                <div class="g3-action-item" draggable="true" ondragstart="g3Drag(event)" data-act="up"><span class="icon">⬇️</span>刷下面</div>
                <div class="g3-action-item" draggable="true" ondragstart="g3Drag(event)" data-act="rotate"><span class="icon">🔄</span>刷里面</div>
                <div class="g3-action-item" draggable="true" ondragstart="g3Drag(event)" data-act="done"><span class="icon">✅</span>刷外面</div>
            </div>

            <div style="display: flex; justify-content: center; align-items: center; gap: 20px;">
                <div class="g3-pipeline">
                    <div class="g3-loop-arrow"></div>
                    <div class="g3-slot" ondrop="g3Drop(event)" ondragover="g3AllowDrop(event)">动作 1</div>
                    <span style="color:#aaa; font-weight:bold;">ↀ</span>
                    <div class="g3-slot" ondrop="g3Drop(event)" ondragover="g3AllowDrop(event)">动作 2</div>
                    <span style="color:#aaa; font-weight:bold;">ↀ</span>
                    <div class="g3-slot" ondrop="g3Drop(event)" ondragover="g3AllowDrop(event)">动作 3</div>
                </div>
                
                <div>
                    <div style="margin-bottom:5px; color:#666; font-size:14px;">重复几轮：</div>
                    <div class="loop-setter">
                        <button class="loop-btn" onclick="g3ChangeLoop(-1)">-</button>
                        <span class="loop-val" id="g3-loop-val">2</span>
                        <button class="loop-btn" onclick="g3ChangeLoop(1)">+</button>
                    </div>
                </div>
            </div>

            <button class="btn" style="background: var(--primary-orange); color:white; font-size: 1.2em; padding: 12px 30px;" onclick="g3Execute()">▀开始自动流水线</button>
            <button class="btn" style="background: #ccc; font-size: 0.9em;" onclick="g3Clear()">清空</button>
            
            <div class="feedback" id="g3-feedback">请拖拽动作并设置轮数 </div>
            <div class="g3-visualizer" id="g3-vis">
                <!-- 进度点动态生成-->
            </div>

        </section>

    </div>

    <script>
        // 通用辅助函数
const sleep = ms => new Promise(res => setTimeout(res, ms));
        const $ = id => document.getElementById(id);
        const $$ = selector => document.querySelectorAll(selector);

        // 机器人表情控别    
function setRobotExpression(type) {
const eyes = $$('.dd-eye');
            const bulb = $('main-bulb');
            if(type === 'happy') {
                eyes.forEach(e => { e.style.borderRadius = '50% 50% 0 0'; e.style.height = '6px'; e.style.marginTop='4px';});
                bulb.classList.add('on');
            } else if (type === 'focus') {
                eyes.forEach(e => { e.style.borderRadius = '50%'; e.style.height = '16px'; e.style.width='16px'; e.style.marginTop='0';});
                bulb.classList.remove('on');
            } else { // normal
                eyes.forEach(e => { e.style.borderRadius = '50% 50% 10px 10px'; e.style.height = '10px'; e.style.width='16px'; e.style.marginTop='0';});
                bulb.classList.remove('on');
            }
        }


        // --- 游成 1：记忆雷达逻辑 ---
let g1Sequence = [];
        let g1PlayerStep = 0;
        let g1Level = 1;
        let g1IsShowing = false;
        const g1Teeth = $$('.g1-tooth');

        async function g1StartLevel() {
            if(g1IsShowing) return;
            g1IsShowing = true;
            g1PlayerStep = 0;
            $('g1-feedback').innerText = "点点正在扫描，注意看...";
            $('g1-feedback').style.color = "var(--primary-blue)";
            setRobotExpression('focus');
            
            g1Sequence = [];
            // 生成序列，长度随关卡增加
for(let i=0; i < g1Level + 2; i++) {
                g1Sequence.push(Math.floor(Math.random() * 5));
            }

            await sleep(500);

            // 播放序列
for(let i=0; i < g1Sequence.length; i++) {
                let toothIndex = g1Sequence[i];
                g1Teeth[toothIndex].classList.add('active');
                // 模拟扫描声音提示
await sleep(500);
                g1Teeth[toothIndex].classList.remove('active');
                await sleep(300);
            }

            g1IsShowing = false;
            $('g1-feedback').innerText = "轮到你了！请按顺序点击" ;
            $('g1-feedback').style.color = "var(--text-color)";
            setRobotExpression('normal');
        }

        async function g1ClickTooth(index) {
            if(g1IsShowing || g1Sequence.length === 0) return;

            if(index === g1Sequence[g1PlayerStep]) {
                // 正确
g1Teeth[index].classList.add('success');
                setTimeout(() => g1Teeth[index].classList.remove('success'), 300);
                g1PlayerStep++;

                if(g1PlayerStep === g1Sequence.length) {
                    // 过关
$('g1-feedback').innerText = "太棒了！顺序完全正确！";
                    $('g1-feedback').style.color = "var(--btn-green)";
                    setRobotExpression('happy');
                    g1Level++;
                    $('g1-level-disp').innerText = `关卡: ${g1Level}`;
                    g1Sequence = []; // 防止重复点击
}
            } else {
                // 错误
g1Teeth[index].classList.add('error');
                setTimeout(() => g1Teeth[index].classList.remove('error'), 400);
                $('g1-feedback').innerText = "哎呀，顺序错了。点净开始扫描重试" ;
                $('g1-feedback').style.color = "var(--btn-red)";
                g1Sequence = [];
            }
        }

        // --- 游成 2：循环打泡泡 ---
let g2TargetCount = 0;
        let g2CurrentLoop = 3;
        let g2IsFiring = false;

        function g2InitTargets() {
            const container = $('g2-targets');
            container.innerHTML = '';
            // 随机生成 2-5 个泡泀        
g2TargetCount = Math.floor(Math.random() * 4) + 2; 
            for(let i=0; i<g2TargetCount; i++) {
                let b = document.createElement('div');
                b.className = 'g2-bubble';
                b.innerText = '🦠';
                container.appendChild(b);
            }
            $('g2-feedback').innerText = `发现 ${g2TargetCount} 个泡泡，设置循环次数吧！`;
            $('g2-feedback').style.color = "var(--text-color)";
        }

        function g2ResetTargets() {
            if(g2IsFiring) return;
            g2InitTargets();
        }

        function g2ChangeLoop(delta) {
            if(g2IsFiring) return;
            g2CurrentLoop += delta;
            if(g2CurrentLoop < 1) g2CurrentLoop = 1;
            if(g2CurrentLoop > 6) g2CurrentLoop = 6;
            $('g2-loop-val').innerText = g2CurrentLoop;
        }

        async function g2Fire() {
            if(g2IsFiring || g2TargetCount === 0) return;
            g2IsFiring = true;
            setRobotExpression('focus');
            
            const bubbles = $$('.g2-bubble:not(.popped)');
            const jet = $('g2-jet');
            const feedback = $('g2-feedback');

            feedback.innerText = `启动循环！目标执血${g2CurrentLoop} 次喷水。`;
            feedback.style.color = "var(--primary-blue)";

            let poppedCount = 0;

            for(let i = 1; i <= g2CurrentLoop; i++) {
                // 喷水动画
jet.classList.remove('shoot');
                void jet.offsetWidth; // trigger reflow
                jet.classList.add('shoot');
                
                await sleep(150); // 等待水流到达

                // 击破判定
if (poppedCount < bubbles.length) {
                    bubbles[poppedCount].classList.add('popped');
                    poppedCount++;
                }

                await sleep(400); // 喷水间隔
}

            // 结果判定
if (poppedCount === g2TargetCount && g2CurrentLoop === g2TargetCount) {
                 feedback.innerText = `完美：{g2CurrentLoop}次循环刚好消灭所有泡泡！`;
                 feedback.style.color = "var(--btn-green)";
                 setRobotExpression('happy');
            } else if (g2CurrentLoop > g2TargetCount) {
                 feedback.innerText = `泡泡消灭了，但循环次数设多了，浪费了水哦。`;
                 feedback.style.color = "#d35400";
            } else {
                 feedback.innerText = `哎呀，循环次数不够，还有泡泡没消灭！`;
                 feedback.style.color = "var(--btn-red)";
            }

            g2IsFiring = false;
            // 延迟后重罀
setTimeout(g2InitTargets, 3000);
        }

        // 初始化游成
window.addEventListener('DOMContentLoaded', g2InitTargets);

        // --- 游成 3：定制刷牙流水线 ---
let g3CurrentLoop = 2;
        let g3IsRunning = false;

        function g3Drag(ev) {
            ev.dataTransfer.setData("act", ev.target.getAttribute('data-act'));
            ev.dataTransfer.setData("html", ev.target.outerHTML);
        }

        function g3AllowDrop(ev) {
            ev.preventDefault();
            ev.target.closest('.g3-slot').classList.add('drag-over');
        }

        function g3Drop(ev) {
            ev.preventDefault();
            let slot = ev.target.closest('.g3-slot');
            slot.classList.remove('drag-over');
            if(g3IsRunning) return;

            let html = ev.dataTransfer.getData("html");
            // 提取数据并重新构建元素放兀slot，避免原元素被移劀
let tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            let newItem = tempDiv.firstChild;
            newItem.style.margin = "0";
            newItem.style.width = "100%";
            newItem.style.height = "100%";
            newItem.setAttribute('draggable', 'false'); // 放入后不可拖拽
slot.innerHTML = '';
            slot.appendChild(newItem);
            slot.style.borderStyle = "solid";
        }
        
        // 移除高亮
document.addEventListener('dragover', function(e){
            $$('.g3-slot').forEach(s => {
                if(e.target.closest('.g3-slot') !== s) s.classList.remove('drag-over');
            });
        });

        function g3ChangeLoop(delta) {
            if(g3IsRunning) return;
            g3CurrentLoop += delta;
            if(g3CurrentLoop < 1) g3CurrentLoop = 1;
            if(g3CurrentLoop > 5) g3CurrentLoop = 5;
            $('g3-loop-val').innerText = g3CurrentLoop;
        }

        function g3Clear() {
            if(g3IsRunning) return;
            $$('.g3-slot').forEach((slot, index) => {
                slot.innerHTML = `动作 ${index+1}`;
                slot.style.borderStyle = "dashed";
            });
            $('g3-vis').innerHTML = '';
            $('g3-feedback').innerText = "流水线已清空" ;
            $('g3-feedback').style.color = "var(--text-color)";
            setRobotExpression('normal');
        }

        async function g3Execute() {
            if(g3IsRunning) return;

            // 获取序列
const slots = $$('.g3-slot');
            let sequence = [];
            slots.forEach(slot => {
                let item = slot.querySelector('.g3-action-item');
                if(item) sequence.push(item.getAttribute('data-act'));
            });

            if(sequence.length === 0) {
                $('g3-feedback').innerText = "流水线上还没有动作哦，拖几个进去吧！";
                $('g3-feedback').style.color = "var(--btn-red)";
                return;
            }

            g3IsRunning = true;
            setRobotExpression('focus');
            const feedback = $('g3-feedback');
            const vis = $('g3-vis');
            vis.innerHTML = '';

            // 生成可视化进度点
let totalSteps = sequence.length * g3CurrentLoop;
            for(let i=0; i<totalSteps; i++) {
                let dot = document.createElement('div');
                dot.className = 'g3-dot';
                dot.innerText = i+1;
                vis.appendChild(dot);
            }
            const dots = $$('.g3-dot');
            let stepCounter = 0;

            feedback.innerText = "流水线启动！点点开始工体..";
            feedback.style.color = "var(--primary-blue)";

            // 外层：循环轮敀        
for(let round = 1; round <= g3CurrentLoop; round++) {
                
                // 内层：执行序别            
for(let i = 0; i < sequence.length; i++) {
let actName = sequence[i];
                    feedback.innerText = `第${round} 轮：正在执行 [别{actName}]`;
                    
                    // 高亮槽位和进度点
slots[i].style.transform = "scale(1.1)";
                    slots[i].style.borderColor = "var(--btn-green)";
                    dots[stepCounter].classList.add('active');

                    // 模拟机器人刷牙动体(这里用摇摆动画替什
const robot = document.querySelector('.character-container .diandian');
                    robot.style.animation = "shake 0.5s infinite";

                    await sleep(1000); // 动作执行时间

                    // 恢复状态                
robot.style.animation = "floatRobot 3s ease-in-out infinite";
                    slots[i].style.transform = "none";
                    slots[i].style.borderColor = "var(--primary-blue)";
                    dots[stepCounter].classList.remove('active');
                    dots[stepCounter].classList.add('done');
                    
                    stepCounter++;
                    await sleep(300); // 动作间隔
}
                
                if(round < g3CurrentLoop) {
                    feedback.innerText = `第${round} 轮完成，准备下一轀..`;
                    await sleep(600); // 轮次间隔
}
            }

            feedback.innerText = `流水线工作完成！成功循环了${g3CurrentLoop} 轮！`;
            feedback.style.color = "var(--btn-green)";
            setRobotExpression('happy');
            g3IsRunning = false;
        }

    </script>
</body>
</html>
