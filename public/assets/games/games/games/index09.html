<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI编程启蒙：如果..尀..互动游成</title>
    <script src="../../libs/libs/tailwind.min.js"></script>
    <link href="../../libs/libs/font-awesome.all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        body {
            font-family: 'ZCOOL KuaiLe', cursive, 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* 动画效果 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* 交通灯样式 */
        .traffic-light {
            background: #333;
            border-radius: 40px;
            padding: 10px;
            display: inline-flex;
            flex-direction: column;
            gap: 10px;
            border: 4px solid #555;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
        }
        .light {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #222;
            opacity: 0.3;
            transition: all 0.3s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .light.red.active { background-color: #ff3b30; opacity: 1; box-shadow: 0 0 30px #ff3b30, inset 0 0 10px rgba(255,255,255,0.5); }
        .light.yellow.active { background-color: #ffcc00; opacity: 1; box-shadow: 0 0 30px #ffcc00, inset 0 0 10px rgba(255,255,255,0.5); }
        .light.green.active { background-color: #34c759; opacity: 1; box-shadow: 0 0 30px #34c759, inset 0 0 10px rgba(255,255,255,0.5); }

        /* 雨滴动画 */
        .rain-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            display: none;
            z-index: 10;
        }
        .raindrop {
            position: absolute;
            width: 3px;
            height: 15px;
            background: rgba(255,255,255,0.8);
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh); } }

        /* 玻璃拟物态卡牀*/
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* 菱形(条件判断框 */
        .clip-rhombus {
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 滚动条美区*/
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        .hidden-screen { display: none !important; }
        .progress-bar { transition: width 0.5s ease-in-out; }
        
        /* 新增：节点被激活高亮的动画效果 */
        .node-active {
            box-shadow: 0 0 20px 8px rgba(59, 130, 246, 0.6) !important;
            transform: scale(1.15) !important;
            border-color: #3b82f6 !important;
            z-index: 50 !important;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col items-center justify-center p-2 sm:p-4">

    <script>
        const tuantuanImages = [
            '../../characters/characters/tuantuan.png', '../../characters/characters/tuantuan01.png', '../../characters/characters/tuantuan02.png', '../../characters/characters/tuantuan03.png',

        ];

        function getRandomImage(images) {
            return images[Math.floor(Math.random() * images.length)];
        }

        function initCharacters() {
            document.getElementById('tuantuan-img').src = getRandomImage(tuantuanImages);
        }

        const state = {
            currentGame: 1, currentRound: 1, maxRounds: 1,
            currentLight: '', currentWeather: '',
            g2Queue: [],
            flowchart: { 1: null, 2: null, 3: null, 4: null, 5: null },
            activeSlot: null
        };

        const els = {
            menu: document.getElementById('screen-menu'),
            game: document.getElementById('screen-game'),
            title: document.getElementById('game-title'),
            titleIcon: document.getElementById('game-title-icon'),
            roundIndicator: document.getElementById('round-indicator'),
            progressBar: document.getElementById('progress-bar'),
            sceneArea: document.getElementById('scene-area'),
            lightRed: document.getElementById('light-red'),
            lightYellow: document.getElementById('light-yellow'),
            lightGreen: document.getElementById('light-green'),
            weatherIcon: document.getElementById('weather-icon'),
            rainLayer: document.getElementById('rainLayer'),
            tuantuan: document.getElementById('tuantuan-player'),
            umbrella: document.getElementById('umbrella'),
            dialog: document.getElementById('dialog-box'),
            actionArea: document.getElementById('action-area'),
            flowchartArea: document.getElementById('flowchart-area'),
            feedbackModal: document.getElementById('feedback-modal'),
            feedbackIcon: document.getElementById('feedback-icon'),
            feedbackTitle: document.getElementById('feedback-title'),
            feedbackText: document.getElementById('feedback-text'),
            feedbackBtn: document.getElementById('feedback-btn'),
            optionsModal: document.getElementById('options-modal'),
            optionsContainer: document.getElementById('options-container'),
            btnCheckFlow: document.getElementById('btn-check-flowchart')
        };

        // 创建雨滴
function createRain() {
            els.rainLayer.innerHTML = '';
            for(let i=0; i<30; i++) {
                let drop = document.createElement('div');
                drop.className = 'raindrop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDuration = (Math.random() * 0.4 + 0.4) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                els.rainLayer.appendChild(drop);
            }
        }
        createRain();

        // 声音
const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'fail') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function showScreen(screenId) {
            els.menu.classList.add('hidden-screen');
            els.game.classList.add('hidden-screen');
            document.getElementById(screenId).classList.remove('hidden-screen');
        }

        function backToMenu() {
            showScreen('screen-menu');
            els.rainLayer.style.display = 'none';
        }

        function updateProgress() {
            els.roundIndicator.innerText = `第${state.currentRound} / ${state.maxRounds} 关`;
            els.progressBar.style.width = `${(state.currentRound / state.maxRounds) * 100}%`;
        }

        function resetTuantuan() {
            els.tuantuan.style.left = '10%';
            els.tuantuanEmoji.innerText = '🧍♂️';
            els.umbrella.classList.add('hidden-screen');
        }

        function startGame(level) {
            state.currentGame = level; state.currentRound = 1;
            showScreen('screen-game');
            els.feedbackModal.classList.add('hidden-screen');
            resetTuantuan();
            
            // 战战3展示场景和流程图，战成 展示场景和按销        
els.sceneArea.classList.remove('hidden-screen');
if (level === 1) {
                state.maxRounds = 5; els.title.innerText = "战战1：单条件"; els.titleIcon.innerText = "🚦";
                els.weatherIcon.classList.add('hidden-screen'); els.rainLayer.style.display = 'none';
                els.flowchartArea.classList.add('hidden-screen'); els.actionArea.classList.remove('hidden-screen');
                setupGame1Round();
            } else if (level === 2) {
                state.maxRounds = 4; els.title.innerText = "战战2：双条件"; els.titleIcon.innerText = "🌧️🚗";
                els.weatherIcon.classList.remove('hidden-screen');
                els.flowchartArea.classList.add('hidden-screen'); els.actionArea.classList.remove('hidden-screen');
                state.g2Queue = [{l:'red',w:'sun'}, {l:'green',w:'sun'}, {l:'red',w:'rain'}, {l:'green',w:'rain'}].sort(()=>Math.random()-0.5);
                setupGame2Round();
            } else if (level === 3) {
                state.maxRounds = 1; els.title.innerText = "战战3：拼装与测试"; els.titleIcon.innerText = "🧩";
                els.actionArea.classList.add('hidden-screen'); els.flowchartArea.classList.remove('hidden-screen');
                setupGame3Round();
            }
            updateProgress();
        }

        function setLight(color) {
            state.currentLight = color;
            els.lightRed.classList.remove('active'); els.lightYellow.classList.remove('active'); els.lightGreen.classList.remove('active');
            if (color === 'red') els.lightRed.classList.add('active');
            if (color === 'yellow') els.lightYellow.classList.add('active');
            if (color === 'green') els.lightGreen.classList.add('active');
        }

        function setWeather(weather) {
            state.currentWeather = weather;
            if (weather === 'sun') {
                els.weatherIcon.innerText = '☀️'; els.rainLayer.style.display = 'none';
            } else {
                els.weatherIcon.innerText = '⛈️'; els.rainLayer.style.display = 'block';
            }
        }

        /* ----- 游成 1 & 2 逻辑 ----- */
        function setupGame1Round() {
            updateProgress();
            const colors = ['red', 'yellow', 'green'];
            let newColor = colors[Math.floor(Math.random() * 3)];
            while(newColor === state.currentLight && state.currentRound > 1) newColor = colors[Math.floor(Math.random() * 3)];
            setLight(newColor);
            
            const colorName = newColor==='red'?'红':(newColor==='yellow'?'黄':'绿');
            els.dialog.innerHTML = `点点问：<span class="text-blue-600">"现在是<b>${colorName}灀</b>，该怎么做？ </span>`;
            
            els.actionArea.className = "w-full grid grid-cols-3 gap-2";
            els.actionArea.innerHTML = `
                <button onclick="checkAnswer1('stop')" class="bg-red-50 hover:bg-red-100 border-2 border-red-400 text-red-700 font-bold py-2 rounded-xl active:scale-95 shadow flex flex-col items-center text-sm"><span class="text-xl mb-1">🛑</span>停下</button>
                <button onclick="checkAnswer1('wait')" class="bg-yellow-50 hover:bg-yellow-100 border-2 border-yellow-400 text-yellow-700 font-bold py-2 rounded-xl active:scale-95 shadow flex flex-col items-center text-sm"><span class="text-xl mb-1">⏰</span>等待</button>
                <button onclick="checkAnswer1('go')" class="bg-green-50 hover:bg-green-100 border-2 border-green-400 text-green-700 font-bold py-2 rounded-xl active:scale-95 shadow flex flex-col items-center text-sm"><span class="text-xl mb-1">🚶</span>行走</button>
            `;
        }

        function checkAnswer1(action) {
            let isCorrect = (state.currentLight==='red'&&action==='stop') || (state.currentLight==='yellow'&&action==='wait') || (state.currentLight==='green'&&action==='go');
            if (isCorrect) {
                playSound('success');
                if (action === 'go') { els.tuantuan.style.left = '75%'; els.tuantuanEmoji.innerText = '🚶♂️'; }
                showFeedback(true, `正确！<br><b>如果</b>${state.currentLight==='red'?'红':(state.currentLight==='yellow'?'黄':'绿')}灯，<b>则</b>${action==='stop'?'停下':(action==='wait'?'等待':'行走')}。`);
            } else {
                playSound('fail'); showFeedback(false, `再想想！线灯停，练灯行，黄灯等。`);
            }
        }

        function setupGame2Round() {
            updateProgress();
            const config = state.g2Queue[state.currentRound - 1];
            setLight(config.l); setWeather(config.w);
            els.dialog.innerHTML = `点点问：<span class="text-blue-600">"现在是<b>${config.l==='red'?'线灯':'练灯'}</b>一b>${config.w==='sun'?'晴天':'下雨'}</b>，该怎么做？ </span>`;
            els.actionArea.className = "w-full grid grid-cols-2 gap-2";
            els.actionArea.innerHTML = `
                <button onclick="checkAnswer2('stop_sun')" class="bg-red-50 border-2 border-red-300 text-red-700 font-bold py-2 rounded-xl active:scale-95 shadow text-sm">🛑 停下</button>
                <button onclick="checkAnswer2('go_sun')" class="bg-green-50 border-2 border-green-300 text-green-700 font-bold py-2 rounded-xl active:scale-95 shadow text-sm">🚶 行走</button>
                <button onclick="checkAnswer2('stop_rain')" class="bg-indigo-50 border-2 border-indigo-300 text-indigo-700 font-bold py-2 rounded-xl active:scale-95 shadow text-sm">☂️🛑 撑伞停下</button>
                <button onclick="checkAnswer2('go_rain')" class="bg-teal-50 border-2 border-teal-300 text-teal-700 font-bold py-2 rounded-xl active:scale-95 shadow text-sm">☂️🚶 撑伞行走</button>
            `;
        }

        function checkAnswer2(action) {
            let correctAction = `${state.currentLight==='red'?'stop':'go'}_${state.currentWeather}`;
            if (action === correctAction) {
                playSound('success');
                if(action.includes('rain')) els.umbrella.classList.remove('hidden-screen');
                if(action.includes('go')) { els.tuantuan.style.left = '75%'; els.tuantuanEmoji.innerText = '🚶♂️'; }
                showFeedback(true, `太聪明了：br>符合两个条件做出了正确动作！`);
            } else {
                playSound('fail'); showFeedback(false, `不对哦，要同时看<b>线练灀</b>和b>天气</b>！`);
            }
        }

        /* ----- 游成 3 逻辑 (修改为支持自适应和演礀 ----- */
        const flowchartOptions = [
            { id: 'opt1', text: '🚦 交通灯颜色', type: 'condition', matchSlot: 1 },
            { id: 'opt2', text: '🛑 原地等待', type: 'action', matchSlot: 2 },
            { id: 'opt3', text: '🌧️下雨了吗', type: 'condition', matchSlot: 3 },
            { id: 'opt4', text: '☂️🚶 撑伞过路', type: 'action', matchSlot: 4 },
            { id: 'opt5', text: '🚶 正常过路', type: 'action', matchSlot: 5 }
        ];

        function setupGame3Round() {
            updateProgress();
            els.dialog.innerHTML = `把规则画在AI大脑里吧！`;
            setLight('red'); setWeather('sun'); // 初始默认场景
for(let i=1; i<=5; i++) {
                state.flowchart[i] = null;
                const slotEl = document.getElementById(`slot-${i}`);
                slotEl.innerHTML = `${i}. 点击填充`;
                slotEl.classList.remove('border-solid', 'bg-green-100', 'border-green-500', 'text-green-800');
                slotEl.classList.add('border-dashed', i%2!==0?'bg-yellow-50':'bg-gray-50', i%2!==0?'border-yellow-500':'border-gray-400');
            }
            els.btnCheckFlow.disabled = false;
            els.btnCheckFlow.innerText = "提交并测试运行";
            checkFlowchartComplete();
        }

        function openSlot(slotId) {
            if (els.btnCheckFlow.disabled) return; // 演示中禁止点净        
state.activeSlot = slotId; els.optionsModal.classList.remove('hidden-screen');
let html = '';
            const shuffled = [...flowchartOptions].sort(() => Math.random() - 0.5);
            shuffled.forEach(opt => {
                html += `<button onclick="selectFlowchartOption('${opt.id}')" class="bg-blue-50 border-2 border-blue-200 text-blue-800 font-bold py-2 px-1 rounded-xl text-[11px] sm:text-xs hover:bg-blue-100 active:scale-95 shadow-sm">${opt.text}</button>`;
            });
            els.optionsContainer.innerHTML = html;
        }

        function closeOptions() { els.optionsModal.classList.add('hidden-screen'); }

        function selectFlowchartOption(optId) {
            const opt = flowchartOptions.find(o => o.id === optId);
            const slotEl = document.getElementById(`slot-${state.activeSlot}`);
            if (opt.matchSlot === state.activeSlot) {
                playSound('success'); state.flowchart[state.activeSlot] = true;
                slotEl.innerHTML = opt.text;
                slotEl.classList.remove('border-dashed', 'bg-yellow-50', 'bg-gray-50', 'bg-red-50', 'bg-blue-50', 'border-yellow-500', 'border-gray-400', 'border-red-400', 'border-blue-400', 'text-yellow-700', 'text-red-600', 'text-blue-600');
                slotEl.classList.add('border-solid', 'bg-green-100', 'border-green-500', 'text-green-800');
            } else {
                playSound('fail'); slotEl.classList.add('animate-pulse');
                setTimeout(() => slotEl.classList.remove('animate-pulse'), 500);
            }
            closeOptions(); checkFlowchartComplete();
        }

        function checkFlowchartComplete() {
            const isComplete = Object.values(state.flowchart).every(val => val === true);
            if (isComplete && !els.btnCheckFlow.disabled) {
                els.btnCheckFlow.classList.remove('opacity-50', 'cursor-not-allowed');
                els.btnCheckFlow.classList.add('hover:bg-teal-600', 'animate-bounce');
            } else {
                els.btnCheckFlow.classList.add('opacity-50', 'cursor-not-allowed');
                els.btnCheckFlow.classList.remove('hover:bg-teal-600', 'animate-bounce');
            }
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        // 新增：自动运行演示逻辑 (支持动画同步高亮闪烁)
async function startFlowchartDemo() {
            const isComplete = Object.values(state.flowchart).every(val => val === true);
            if (!isComplete) return;

            playSound('success');
            els.btnCheckFlow.disabled = true; // 锁定按钮
els.btnCheckFlow.classList.remove('hover:bg-teal-600', 'animate-bounce');
            els.btnCheckFlow.innerText = "🤖 实机测试一..";

            // 为了让用户看清，流程图自动滚到左上角
els.flowchartArea.scrollTo({top: 0, left: 0, behavior: 'smooth'});
            resetTuantuan();

            // 封装一个等待并高亮对应节点的助手函敀
const highlight = async (slotId, ms) => {
                const el = document.getElementById(`slot-${slotId}`);
                if(!el) return;
                el.classList.add('node-active', 'ring-4', 'ring-blue-400');
                await delay(ms);
                el.classList.remove('node-active', 'ring-4', 'ring-blue-400');
            };

            // === 阶段 1：线灯演礀===
            els.dialog.innerHTML = `<span class="text-green-600 animate-pulse text-base font-bold">测试一：遇到线灯怎么办？</span>`;
            setLight('red'); setWeather('sun');
            await delay(1000);
            
            // 流程闪烁：判断灯
await highlight(1, 800);
            els.dialog.innerHTML = `<span class="text-red-600 text-base font-bold">判断是线灯，执行规则2：</span>`;
            
            // 流程闪烁：停下动体            highlight(2, 1500); 
await delay(1500); // 团团原地不动，维持动体
            // === 阶段 2：练灀下雨演示 ===
            resetTuantuan();
            els.dialog.innerHTML = `<span class="text-green-600 animate-pulse text-base font-bold">测试二：遇到练灯且下雀..</span>`;
            setLight('green'); setWeather('rain');
            await delay(1000);

            // 流程闪烁：判断灯 -> 判断天气
await highlight(1, 800);
            await highlight(3, 800);
            
            els.dialog.innerHTML = `<span class="text-blue-600 text-base font-bold">练灯且下雨，执行规则4：</span>`;
            
            // 流程闪烁：撑伞走动作
highlight(4, 2000);
            await delay(300); // 稍微延迟一下开始动体            
            // 团团执行对应动作
els.umbrella.classList.remove('hidden-screen');
            els.tuantuan.style.left = '75%';
            els.tuantuanEmoji.innerText = '🚶♂️';
            playSound('success');
            
            await delay(2500);
            
            // 结束并弹窗        
showFeedback(true, `太完美了：br>实机测试中，团团在过马路时，<br>AI大脑的b>流程图在同步闪烁</b>思考！<br>你真像个优秀的程序员！`);
            els.btnCheckFlow.innerText = "重新测试运行";
            els.btnCheckFlow.disabled = false;
            checkFlowchartComplete();
        }

        /* ----- 反馈控制 ----- */
        function showFeedback(isSuccess, message) {
            els.feedbackModal.classList.remove('hidden-screen');
            if (isSuccess) {
                els.feedbackIcon.innerText = ['🌟','🎉','🏆'][Math.floor(Math.random()*3)];
                els.feedbackTitle.innerText = "太棒啦！";
                els.feedbackTitle.className = "text-2xl sm:text-3xl font-bold text-green-600 mb-2";
                if (state.currentRound >= state.maxRounds) {
                    els.feedbackBtn.innerText = "完成战战返回菜单";
                    els.feedbackBtn.classList.replace('bg-blue-500', 'bg-purple-500');
                    els.feedbackBtn.classList.replace('hover:bg-blue-600', 'hover:bg-purple-600');
                } else {
                    els.feedbackBtn.innerText = "下一兀";
                    els.feedbackBtn.classList.replace('bg-purple-500', 'bg-blue-500');
                    els.feedbackBtn.classList.replace('hover:bg-purple-600', 'hover:bg-blue-600');
                }
            } else {
                els.feedbackIcon.innerText = "🤔"; els.feedbackTitle.innerText = "再想惀..";
                els.feedbackTitle.className = "text-2xl sm:text-3xl font-bold text-orange-500 mb-2";
                els.feedbackBtn.innerText = "重试本关";
                els.feedbackBtn.classList.replace('bg-purple-500', 'bg-blue-500');
                els.feedbackBtn.classList.replace('hover:bg-purple-600', 'hover:bg-blue-600');
            }
            els.feedbackText.innerHTML = message;
        }

        function nextRound() {
            els.feedbackModal.classList.add('hidden-screen');
            if (els.feedbackTitle.innerText === "再想惀..") { resetTuantuan(); return; }
            if (state.currentRound >= state.maxRounds) {
                alert("🎉 恭喜你完成了这个级别的战战！"); backToMenu();
            } else {
                state.currentRound++; resetTuantuan();
                if (state.currentGame === 1) setupGame1Round();
                if (state.currentGame === 2) setupGame2Round();
            }
        }
    </script>
</body>
</html>
