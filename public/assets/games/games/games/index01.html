<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小侦探找线索 - 定制IP版</title>
    
    <!-- 引入 Tailwind CSS 进行快速样式渲染-->
    <script src="../../libs/libs/tailwind.min.js"></script>
    
    <!-- 修复项1：更换更稳定的CDN 満(cdnjs) -->
    <!-- 引入 React 和ReactDOM -->
    <script crossorigin src="../../libs/libs/react.production.min.js"></script>
    <script crossorigin src="../../libs/libs/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 实时尀JSX 编译成浏览器认识的代砀-->
    <script crossorigin src="../../libs/libs/babel.min.js"></script>
    
    <!-- 自定义动画和样式 -->
    <style>
        body { margin: 0; padding: 0; background-color: #fdf8f0; }
        
        /* 弹跳动画 */
        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { transform: scale(0.6) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        /* 悬浮呼吸动画 */
        .bounce-custom { animation: bounceCustom 3s infinite ease-in-out; }
        @keyframes bounceCustom {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 加载页面的简单动画*/
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- 修复项2：添加加载占位提示。如果JS 没加载出来，用户能看到提示而不是白层-->
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #b45309;">
            <svg width="80" height="80" viewBox="0 0 100 100" class="loading-pulse" style="margin-bottom: 20px;">
                <circle cx="50" cy="50" r="40" fill="none" stroke="#fcd34d" stroke-width="8"/>
                <circle cx="50" cy="50" r="40" fill="none" stroke="#d97706" stroke-width="8" stroke-dasharray="80" stroke-dashoffset="0">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="1s" repeatCount="indefinite" />
                </circle>
            </svg>
            <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">正在加载小侦探游成..</h2>
            <p style="color: #92400e;">(首次加载可能需要几秒钟，请稍候🔍)</p>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState } = React;

        // ==========================================
        // 角色图片加载函数 (从形象文件夹随机选择)
        // ==========================================
const tuantuanImages = [
            '../../characters/characters/tuantuan.png', '../../characters/characters/tuantuan01.png', '../../characters/characters/tuantuan02.png', '../../characters/characters/tuantuan03.png',
            '../../characters/characters/tuantuan04.png', '../../characters/characters/tuantuan05.png', '../../characters/characters/tuantuan06.png'
        ];
        const diandianImages = [
            '../../characters/characters/diandian.png', '../../characters/characters/diandian01.png', '../../characters/characters/diandian02.png', '../../characters/characters/diandian03.png',
            '../../characters/characters/diandian04.png', '../../characters/characters/diandian05.png', '../../characters/characters/diandian06.png'
        ];

        const getRandomImage = (images) => {
            return images[Math.floor(Math.random() * images.length)];
        };

        const tuantuanImage = getRandomImage(tuantuanImages);
        const diandianImage = getRandomImage(diandianImages);

        const IconRobot = ({ className, style }) => (
            <img src={diandianImage} className={className} style={style} alt="点点" />
        );

        const IconBoy = ({ className, style }) => (
            <img src={tuantuanImage} className={className} style={style} alt="团团" />
        );

        /* 线索物品图标雀*/
        const IconApple = ({ className }) => (
            <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 50 25 C 20 20 10 55 25 85 C 35 105 65 105 75 85 C 90 55 80 20 50 25 Z" fill="#ef4444" stroke="#b91c1c" strokeWidth="2"/>
                <path d="M 30 45 C 35 30 45 35 50 40" stroke="#fca5a5" strokeWidth="4" strokeLinecap="round" fill="none"/>
                <path d="M 50 25 Q 45 10 55 8" stroke="#78350f" strokeWidth="4" strokeLinecap="round" fill="none"/>
                <path d="M 53 15 Q 70 10 75 25 Q 60 30 53 15 Z" fill="#22c55e" stroke="#15803d" strokeWidth="1"/>
            </svg>
        );

        const IconCar = ({ className }) => (
            <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 15 55 C 15 45 25 35 35 35 L 65 35 C 75 35 85 45 90 55 L 90 70 C 90 75 85 80 80 80 L 20 80 C 15 80 10 75 10 70 Z" fill="#fcd34d" stroke="#d97706" strokeWidth="2"/>
                <path d="M 35 40 L 48 40 L 48 55 L 25 55 Z" fill="#fef3c7" stroke="#b45309" strokeWidth="2"/>
                <path d="M 53 40 L 65 40 Q 72 40 75 55 L 53 55 Z" fill="#fef3c7" stroke="#b45309" strokeWidth="2"/>
                <circle cx="30" cy="80" r="14" fill="#451a03"/>
                <circle cx="70" cy="80" r="14" fill="#451a03"/>
                <circle cx="30" cy="80" r="4" fill="#d97706"/>
                <circle cx="70" cy="80" r="4" fill="#d97706"/>
            </svg>
        );

        const IconBall = ({ className }) => (
            <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="40" fill="#fcd34d" stroke="#eab308" strokeWidth="2"/>
                <path d="M 50 10 C 20 30 20 70 50 90" fill="#38bdf8"/>
                <path d="M 50 10 C 80 30 80 70 50 90" fill="#fb7185"/>
                <path d="M 50 10 C 35 30 35 70 50 90" fill="#4ade80"/>
                <circle cx="50" cy="50" r="10" fill="#ffffff" stroke="#cbd5e1" strokeWidth="2"/>
            </svg>
        );

        const IconBear = ({ className, style }) => (
            <svg className={className} style={style} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="30" cy="25" r="15" fill="#a16207"/>
                <circle cx="70" cy="25" r="15" fill="#a16207"/>
                <circle cx="30" cy="25" r="8" fill="#fef3c7"/>
                <circle cx="70" cy="25" r="8" fill="#fef3c7"/>
                <circle cx="50" cy="50" r="35" fill="#ca8a04"/>
                <ellipse cx="50" cy="60" rx="15" ry="12" fill="#fef3c7"/>
                <ellipse cx="50" cy="56" rx="5" ry="4" fill="#451a03"/>
                <path d="M 50 60 L 50 66" stroke="#451a03" strokeWidth="2"/>
                <path d="M 44 66 Q 50 70 56 66" stroke="#451a03" strokeWidth="2" fill="none"/>
                <circle cx="38" cy="42" r="4" fill="#451a03"/>
                <circle cx="62" cy="42" r="4" fill="#451a03"/>
                <path d="M 60 20 L 70 15" stroke="#451a03" strokeWidth="2"/>
                <path d="M 65 15 L 65 22" stroke="#451a03" strokeWidth="2"/>
            </svg>
        );

        const IconLocation = ({ emoji }) => (
            <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center text-4xl shadow-inner border-4 border-amber-100">
                {emoji}
            </div>
        );

        // ==========================================
        // 游成数据配置
        // ==========================================
const itemsToTag = [
            { id: 1, name: '苹果', IconComponent: IconApple, correctTags: ['线色', '圆的', '能吃'], allTags: ['线色', '蓝色', '圆的', '方的', '能吃', '很重', '软的'] },
            { id: 2, name: '小木车', IconComponent: IconCar, correctTags: ['木头的', '有轮子', '能跑'], allTags: ['木头的', '软的', '有轮子', '能吃', '能跑', '透明的'] },
            { id: 3, name: '皮球', IconComponent: IconBall, correctTags: ['圆的', '会弹', '彩色'], allTags: ['圆的', '方的', '会弹', '很尖', '彩色', '发光'] }
        ];

        const detectiveMissions = [
            { id: 1, clues: ['地上有小脚印', '有人拿着线气球经过', '有很多滑梯'], locations: [{ name: '旋转木马', emoji: '🎠', isCorrect: false }, { name: '滑梯区', emoji: '🛝', isCorrect: true }, { name: '沙坑', emoji: '🏖️', isCorrect: false }], targetName: '小熊抱抱', TargetIcon: IconBear },
            { id: 2, clues: ['听到了水花声', '看见了蓝色的帽子', '有长长的滑道'], locations: [{ name: '图书角', emoji: '📚', isCorrect: false }, { name: '积木区', emoji: '🧱', isCorrect: false }, { name: '游泳池', emoji: '🏊♂️', isCorrect: true }], targetName: '点点', TargetIcon: IconRobot }
        ];

        // ==========================================
        // 游成 1: 线索收集单组件
        // ==========================================
const GameClueCollector = ({ onComplete }) => {
            const [currentItemIndex, setCurrentItemIndex] = useState(0);
            const [selectedTags, setSelectedTags] = useState([]);
            const [message, setMessage] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);

            const currentItem = itemsToTag[currentItemIndex];
            const CurrentIcon = currentItem.IconComponent;

            const handleTagClick = (tag) => {
                if (selectedTags.includes(tag)) {
                    setSelectedTags(selectedTags.filter(t => t !== tag));
                } else {
                    if (selectedTags.length < 3) {
                        setSelectedTags([...selectedTags, tag]);
                    } else {
                        setMessage('提示：有多只能贴3个标签哦');
                        setTimeout(() => setMessage(''), 2000);
                    }
                }
            };

            const checkAnswers = () => {
                const isCorrect = currentItem.correctTags.every(tag => selectedTags.includes(tag)) && selectedTags.length === currentItem.correctTags.length;
                if (isCorrect) {
                    setMessage('✅太棒了！标签全对啦！');
                    setShowSuccess(true);
                    setTimeout(() => {
                        setShowSuccess(false);
                        setSelectedTags([]);
                        setMessage('');
                        if (currentItemIndex < itemsToTag.length - 1) { setCurrentItemIndex(currentItemIndex + 1); } else { onComplete(); }
                    }, 2000);
                } else {
                    setMessage('❌好像不太对哦，重新观察一下？');
                    setTimeout(() => setMessage(''), 2000);
                }
            };

            return (
                <div className="bg-white rounded-3xl shadow-xl p-8 max-w-3xl w-full mx-auto border-4 border-amber-200 relative overflow-hidden">
                    <h2 className="text-3xl font-bold text-amber-700 mb-6 text-center flex items-center justify-center gap-3">
                        <IconRobot className="w-14 h-14" /> 动动手：做一张线索收集卡
                    </h2>
                    <p className="text-gray-600 text-center mb-8 text-lg">
                        请帮机器人<span className="font-bold text-blue-500">点点</span>给下面的物品贴上正确的标签吧！                    </p>
                    <div className="flex flex-col md:flex-row gap-8 items-center justify-center bg-[#faf8f5] p-6 rounded-2xl border-2 border-amber-50">
                        <div className="flex-1 flex flex-col items-center">
                            <div className="w-56 h-56 bg-white rounded-2xl flex items-center justify-center border-2 border-amber-100 relative shadow-sm">
                                <CurrentIcon className="w-48 h-48 bounce-custom drop-shadow-md" />
                                {selectedTags.map((tag, idx) => {
                                    const positions = [{ top: '10%', left: '-10%' }, { top: '60%', left: '-5%' }, { top: '30%', right: '-15%' }];
                                    return <div key={idx} className="absolute bg-white px-3 py-1 rounded-full border-2 border-green-500 text-green-700 font-bold text-sm shadow-md pop-in" style={positions[idx]}>{tag}</div>;
                                })}
                                {showSuccess && <div className="absolute inset-0 bg-green-400 bg-opacity-20 rounded-2xl flex items-center justify-center pop-in"><span className="text-6xl">✅</span></div>}
                            </div>
                            <h3 className="text-2xl font-bold mt-6 text-gray-700">{currentItem.name}</h3>
                        </div>
                        <div className="flex-1 w-full">
                            <div className="bg-white p-6 rounded-2xl border-2 border-amber-100 shadow-sm relative">
                                <h4 className="font-bold text-amber-900 mb-4 text-lg border-b-2 border-amber-100 pb-2">线索选项 (建{currentItem.correctTags.length} 一</h4>
                                <div className="flex flex-wrap gap-3">
                                    {currentItem.allTags.map((tag, index) => (
                                        <button key={index} onClick={() => handleTagClick(tag)} className={`px-4 py-2 rounded-full text-lg font-bold transition-all transform hover:scale-105 active:scale-95 shadow-sm ${selectedTags.includes(tag) ? 'bg-amber-100 text-amber-800 shadow-inner border-2 border-amber-300 opacity-50' : 'bg-white text-gray-700 hover:bg-amber-50 border-2 border-gray-200'}`}>
                                            {tag}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="h-12 mt-4 flex items-center justify-center">
                                <p className={`text-lg font-bold ${message.includes('✅') ? 'text-green-500' : 'text-red-500'} pop-in`}>{message}</p>
                            </div>
                            <button onClick={checkAnswers} disabled={selectedTags.length === 0 || showSuccess} className={`w-full mt-2 py-4 rounded-2xl text-xl font-bold text-white transition-all shadow-md ${selectedTags.length > 0 && !showSuccess ? 'bg-green-500 hover:bg-green-600 hover:-translate-y-1' : 'bg-gray-300 cursor-not-allowed'}`}>
                                贴好了，确认：                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 游成 2: 综合推理找抱抱组件
        // ==========================================
const GameDetectivePuzzle = ({ onComplete }) => {
            const [currentMissionIndex, setCurrentMissionIndex] = useState(0);
            const [selectedLocation, setSelectedLocation] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            const mission = detectiveMissions[currentMissionIndex];
            const TargetIcon = mission.TargetIcon;

            const handleLocationSelect = (loc) => {
                if (showResult) return;
                setSelectedLocation(loc);
                setIsCorrect(loc.isCorrect);
                setShowResult(true);
                setTimeout(() => {
                    if (loc.isCorrect) {
                        if (currentMissionIndex < detectiveMissions.length - 1) {
                            setCurrentMissionIndex(currentMissionIndex + 1); setSelectedLocation(null); setShowResult(false);
                        } else { onComplete(); }
                    } else { setShowResult(false); setSelectedLocation(null); }
                }, 2500);
            };

            return (
                <div className="bg-white rounded-3xl shadow-xl p-8 max-w-4xl w-full mx-auto border-4 border-amber-200 relative overflow-hidden">
                    <div className="flex items-center gap-4 mb-6">
                        <IconBoy className="w-24 h-24" />
                        <div>
                            <h2 className="text-3xl font-bold text-amber-800">小侦探综合推理</h2>
                            <p className="text-gray-600 text-lg">团团说：'把线索拼在一起，就能做出决定！ </p>
                        </div>
                    </div>
                    <div className="bg-[#fefce8] p-6 rounded-2xl border-2 border-amber-100 mb-8 shadow-sm">
                        <h3 className="text-xl font-bold text-amber-900 mb-4 flex items-center gap-2"><span>📝</span> 收集到的线索本：</h3>
                        <ul className="space-y-3">
                            {mission.clues.map((clue, index) => (
                                <li key={index} className="flex items-center gap-4 text-lg text-gray-700 pop-in" style={{ animationDelay: `${index * 0.2}s` }}>
                                    <span className="w-8 h-8 rounded-full bg-amber-200 text-amber-900 flex items-center justify-center font-bold shadow-sm">{index + 1}</span>
                                    <span className="font-medium">{clue}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                    <h3 className="text-2xl font-bold text-center text-gray-800 mb-6 flex items-center justify-center gap-3">
                        根据线索，你认为 <TargetIcon className="w-12 h-12 inline-block align-middle bounce-custom" /> <span className="text-amber-600 font-extrabold">{mission.targetName}</span> 藏在哪里：                    </h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {mission.locations.map((loc, index) => (
                            <button key={index} onClick={() => handleLocationSelect(loc)} disabled={showResult} className={`flex flex-col items-center p-6 rounded-3xl border-4 transition-all transform hover:scale-105 shadow-md bg-white ${showResult && selectedLocation === loc ? (isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50') : 'border-gray-100 hover:border-amber-300 hover:shadow-xl'} ${showResult && selectedLocation !== loc ? 'opacity-40 grayscale' : ''}`}>
                                <IconLocation emoji={loc.emoji} />
                                <span className="text-2xl font-bold text-gray-700 mt-4">{loc.name}</span>
                                {showResult && selectedLocation === loc && (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-white/90 backdrop-blur-sm rounded-2xl pop-in z-10">
                                        {isCorrect ? <><TargetIcon className="w-24 h-24 mb-2 bounce-custom" /><span className="text-2xl font-extrabold text-green-600 drop-shadow-sm">找到 {mission.targetName} 啀</span></> : <><span className="text-6xl mb-2">🤔</span><span className="text-2xl font-bold text-red-500">好像不在这里哦</span></>}
                                    </div>
                                )}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主应用组件
        // ==========================================
const App = () => {
            const [gameState, setGameState] = useState('menu');

            const renderContent = () => {
                switch (gameState) {
                    case 'menu':
                        return (
                            <div className="text-center max-w-3xl mx-auto bg-white/95 backdrop-blur-md p-12 rounded-[3rem] shadow-2xl border-4 border-amber-100 pop-in relative z-10">
                                <div className="flex justify-center items-end gap-6 mb-8">
                                    <IconBoy className="w-48 h-48 bounce-custom drop-shadow-lg" />
                                    <IconRobot className="w-40 h-40 bounce-custom drop-shadow-lg" style={{ animationDelay: '0.5s' }} />
                                </div>
                                <h1 className="text-5xl font-black text-amber-800 mb-6 tracking-wider" style={{ textShadow: '2px 2px 0px #fef3c7' }}>小侦探训练营</h1>
                                <p className="text-2xl text-gray-700 mb-10 leading-relaxed font-medium">
                                    欢迎来到第31课！我是小侦探<strong className="text-amber-700">团团</strong>，旁边是我的助手<strong className="text-blue-500">点点</strong><br/>
                                    今天我们要学习：<span className="bg-amber-200 px-3 py-1 rounded-xl text-amber-900 font-bold mx-1 shadow-sm">用线索做决定：</span><br/>
                                    请选择你的战战任务吧：
                                </p>
                                <div className="flex flex-col sm:flex-row gap-6 justify-center">
                                    <button onClick={() => setGameState('game1')} className="group px-8 py-5 bg-gradient-to-b from-amber-400 to-amber-500 text-white rounded-3xl text-2xl font-bold shadow-[0_8px_0_#b45309] hover:shadow-[0_4px_0_#b45309] hover:translate-y-[4px] transition-all flex flex-col items-center justify-center gap-2 border-2 border-amber-300">
                                        <span className="text-4xl group-hover:scale-110 transition-transform">🏷︀</span>战战一：贴标签
                                    </button>
                                    <button onClick={() => setGameState('game2')} className="group px-8 py-5 bg-gradient-to-b from-blue-400 to-blue-500 text-white rounded-3xl text-2xl font-bold shadow-[0_8px_0_#1e40af] hover:shadow-[0_4px_0_#1e40af] hover:translate-y-[4px] transition-all flex flex-col items-center justify-center gap-2 border-2 border-blue-300">
                                        <span className="text-4xl group-hover:scale-110 transition-transform">🔍</span>战战二：找抱抱                                    </button>
                                </div>
                            </div>
                        );
                    case 'game1':
                        return (
                            <div className="w-full max-w-4xl flex flex-col items-center relative z-10">
                                <button onClick={() => setGameState('menu')} className="mb-6 px-6 py-3 bg-white/80 backdrop-blur-md text-amber-900 rounded-full hover:bg-white transition-all font-bold self-start flex items-center gap-2 shadow-sm border-2 border-transparent hover:border-amber-200"><span>⬅️</span> 返回主菜单</button>
                                <GameClueCollector onComplete={() => setGameState('end')} />
                            </div>
                        );
                    case 'game2':
                        return (
                            <div className="w-full max-w-4xl flex flex-col items-center relative z-10">
                                <button onClick={() => setGameState('menu')} className="mb-6 px-6 py-3 bg-white/80 backdrop-blur-md text-amber-900 rounded-full hover:bg-white transition-all font-bold self-start flex items-center gap-2 shadow-sm border-2 border-transparent hover:border-amber-200"><span>⬅️</span> 返回主菜单</button>
                                <GameDetectivePuzzle onComplete={() => setGameState('end')} />
                            </div>
                        );
                    case 'end':
                        return (
                            <div className="text-center max-w-xl mx-auto bg-white p-12 rounded-[3rem] shadow-2xl border-8 border-amber-300 pop-in relative z-10">
                                <div className="flex justify-center items-end gap-4 mb-8">
                                    <IconBoy className="w-28 h-28 bounce-custom" />
                                    <IconRobot className="w-24 h-24 bounce-custom" style={{ animationDelay: '0.2s' }} />
                                    <IconBear className="w-24 h-24 bounce-custom" style={{ animationDelay: '0.4s' }} />
                                </div>
                                <h2 className="text-4xl font-black text-green-600 mb-6 drop-shadow-sm">战战成功：</h2>
                                <p className="text-2xl text-gray-700 mb-10 leading-loose">
                                    你是一个非常出色的小侦探！<br/>记住：<strong className="text-amber-700 bg-amber-100 px-3 py-1 rounded-xl">线索就是信息</strong><br/>信息能帮我们做出聪明的决定！
                                </p>
                                <button onClick={() => setGameState('menu')} className="px-10 py-5 bg-amber-500 hover:bg-amber-600 text-white rounded-3xl text-2xl font-bold shadow-[0_8px_0_#b45309] hover:shadow-[0_4px_0_#b45309] hover:translate-y-[4px] transition-all">
                                    再次训练
                                </button>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 py-12 relative overflow-hidden" style={{ backgroundImage: 'radial-gradient(#fde68a 2px, transparent 2px)', backgroundSize: '40px 40px', fontFamily: "'Comic Sans MS', 'Chalkboard SE', 'Microsoft YaHei', sans-serif" }}>
                    <IconApple className="fixed top-10 left-10 w-24 h-24 opacity-30 transform -rotate-12 pointer-events-none" />
                    <IconCar className="fixed bottom-10 right-10 w-32 h-32 opacity-30 transform rotate-12 pointer-events-none" />
                    <IconBall className="fixed top-20 right-20 w-24 h-24 opacity-30 transform rotate-45 pointer-events-none" />
                    <IconBear className="fixed bottom-20 left-10 w-28 h-28 opacity-30 transform -rotate-12 pointer-events-none" />
                    {renderContent()}
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error("React 渲染失败:", error);
            document.getElementById('root').innerHTML = '<div style="color:red; text-align:center; margin-top:20vh;"><h3>游成加载失败</h3><p>可能是由于您的浏览器不支持某些特性。请尝试使用有新版的Chrome 成Edge 浏览器 </p></div>';
        }
    </script>
</body>
