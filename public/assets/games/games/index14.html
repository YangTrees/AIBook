<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第14课《特征放大镜》互动游戏</title>
    <script src="../../libs/libs/tailwind.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        body {
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            touch-action: manipulation;
            user-select: none;
        }

        /* 动画效果 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            animation: scan 2s linear infinite;
            z-index: 10;
            display: none;
        }

        .card-hover {
            transition: all 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* 自定义滤镜镜片效果*/
        .magnifying-glass {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 8px solid #4a90e2;
            border-radius: 50%;
            background: rgba(74, 144, 226, 0.2);
            backdrop-filter: blur(2px);
            pointer-events: none;
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.5), inset 0 0 20px rgba(255,255,255,0.5);
            display: none;
            z-index: 50;
            transform: translate(-50%, -50%);
        }
        .magnifying-glass::after {
            content: '';
            position: absolute;
            bottom: -25px;
            right: -25px;
            width: 40px;
            height: 15px;
            background: #4a90e2;
            transform: rotate(45deg);
            border-radius: 5px;
        }

        /* 隐藏滚动条*/
        ::-webkit-scrollbar { display: none; }
    </style>
</head>

    <script>
        /* ================= 角色与角色SVG生成器================= */
        
        // 团团 (小男子
const svgBoy = `
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <circle cx="50" cy="50" r="45" fill="#fef3c7" />
                <!-- 身体 -->
                <path d="M 20 100 Q 50 60 80 100" fill="#3b82f6" />
                <path d="M 35 100 L 35 80 L 65 80 L 65 100" fill="#f97316" />
                <!-- 头和头发 -->
                <circle cx="50" cy="40" r="25" fill="#fcd34d" />
                <path d="M 20 40 Q 50 10 80 40 Q 50 20 20 40" fill="#451a03" />
                <path d="M 25 35 Q 50 0 75 35 Z" fill="#451a03" />
                <!-- 脸-->
                <circle cx="42" cy="42" r="2" fill="#451a03" />
                <circle cx="58" cy="42" r="2" fill="#451a03" />
                <path d="M 45 50 Q 50 55 55 50" stroke="#f87171" stroke-width="2" fill="none" stroke-linecap="round"/>
                <circle cx="35" cy="45" r="4" fill="#fca5a5" opacity="0.6"/>
                <circle cx="65" cy="45" r="4" fill="#fca5a5" opacity="0.6"/>
            </svg>
        `;

        // 点点 (云朵机器人
const svgRobot = `
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <!-- 天线 -->
                <path d="M 50 25 L 50 10" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
                <circle cx="50" cy="8" r="4" fill="#a855f7">
                    <animate attributeName="fill" values="#a855f7;#d8b4fe;#a855f7" dur="1s" repeatCount="indefinite" />
                </circle>
                <!-- 云朵身体 -->
                <path d="M 30 70 Q 10 70 10 50 Q 10 30 30 30 Q 40 10 60 20 Q 80 10 90 30 Q 100 50 80 70 Z" fill="#ffffff" stroke="#e0e7ff" stroke-width="4"/>
                <!-- 屏幕脸-->
                <rect x="30" y="35" width="40" height="25" rx="10" fill="#1e293b" />
                <!-- 眼睛 (发光) -->
                <circle cx="40" cy="47" r="4" fill="#06b6d4" />
                <circle cx="60" cy="47" r="4" fill="#06b6d4" />
                <path d="M 46 52 Q 50 55 54 52" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round"/>
                <!-- 身体细节 -->
                <path d="M 40 70 L 40 85 M 60 70 L 60 85" stroke="#9ca3af" stroke-width="6" stroke-linecap="round"/>
            </svg>
        `;

        // 动态生成猫咪的SVG
function generateCatSVG(options) {
            const { 
                eyes = 2, 
                earColor = '#b45309', // 默认棕色
tailType = 'normal', // normal | mech
                bodyColor = '#d97706', // 默认橘棕色            
hasAntenna = false // 增加天线特征
} = options;

            let eyeHTML = '';
            if (eyes === 3) {
                eyeHTML = `
                    <circle cx="50" cy="35" r="4" fill="#06b6d4" />
                    <circle cx="50" cy="35" r="1.5" fill="#fff" />
                    <circle cx="38" cy="45" r="4" fill="#06b6d4" />
                    <circle cx="38" cy="45" r="1.5" fill="#fff" />
                    <circle cx="62" cy="45" r="4" fill="#06b6d4" />
                    <circle cx="62" cy="45" r="1.5" fill="#fff" />
                `;
            } else {
                eyeHTML = `
                    <circle cx="40" cy="45" r="3.5" fill="#111" />
                    <circle cx="60" cy="45" r="3.5" fill="#111" />
                    <circle cx="39" cy="44" r="1" fill="#fff" />
                    <circle cx="59" cy="44" r="1" fill="#fff" />
                `;
            }

            let tailHTML = '';
            if (tailType === 'mech') {
                tailHTML = `
                    <path d="M 65 75 L 85 75 L 85 55 L 95 55" stroke="#71717a" stroke-width="6" fill="none" stroke-linejoin="round"/>
                    <circle cx="95" cy="55" r="4" fill="#22d3ee" />
                `;
            } else {
                tailHTML = `
                    <path d="M 65 75 Q 90 85 90 55" stroke="${bodyColor}" stroke-width="8" fill="none" stroke-linecap="round"/>
                    <path d="M 75 76 Q 80 78 85 73" stroke="#b45309" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>
                `;
            }

            let antennaHTML = '';
            if (hasAntenna) {
                // 外星猫的天线特征，顶在头上，非常明显
antennaHTML = `
                    <path d="M 50 20 L 50 5" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="50" cy="5" r="5" fill="#a855f7" />
                    <circle cx="50" cy="5" r="2" fill="#fff" />
                    <path d="M 45 5 Q 50 0 55 5" stroke="#d8b4fe" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                `;
            }

            const earsHTML = `
                <polygon points="30,45 20,15 45,35" fill="${earColor}" />
                <polygon points="70,45 80,15 55,35" fill="${earColor}" />
                <polygon points="30,42 24,22 41,36" fill="#fcd34d" opacity="0.8"/>
                <polygon points="70,42 76,22 59,36" fill="#fcd34d" opacity="0.8"/>
            `;

            return `
                <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg">
                    ${tailHTML}
                    <!-- 身体 -->
                    <rect x="25" y="40" width="50" height="45" rx="20" fill="${bodyColor}" />
                    ${earsHTML}
                    <!-- 头部 -->
                    <circle cx="50" cy="45" r="24" fill="${bodyColor}" />
                    <!-- 脸部白色区域 -->
                    <path d="M 30 50 Q 50 65 70 50 Q 70 65 50 65 Q 30 65 30 50" fill="#fff" opacity="0.6"/>
                    <!-- 鼻子和嘴 -->
                    <polygon points="48,52 52,52 50,55" fill="#f87171" />
                    <path d="M 45 58 Q 50 62 50 55 M 55 58 Q 50 62 50 55" stroke="#444" stroke-width="1" fill="none"/>
                    ${eyeHTML}
                    ${antennaHTML}
                </svg>
            `;
        }

        // 混淆项 花朵
const svgFlower = `
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <path d="M 50 50 L 50 90" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/>
                <path d="M 50 70 Q 30 60 25 80" stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round"/>
                <circle cx="50" cy="50" r="15" fill="#facc15" />
                <circle cx="30" cy="50" r="12" fill="#f472b6" />
                <circle cx="70" cy="50" r="12" fill="#f472b6" />
                <circle cx="50" cy="30" r="12" fill="#f472b6" />
                <circle cx="50" cy="70" r="12" fill="#f472b6" />
                <circle cx="36" cy="36" r="12" fill="#f472b6" />
                <circle cx="64" cy="36" r="12" fill="#f472b6" />
                <circle cx="36" cy="64" r="12" fill="#f472b6" />
                <circle cx="64" cy="64" r="12" fill="#f472b6" />
            </svg>
        `;

        // 混淆项 石头
const svgRock = `
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <path d="M 20 70 Q 10 40 40 30 Q 70 20 85 45 Q 95 70 70 85 Q 40 95 20 70" fill="#9ca3af" />
                <path d="M 30 65 Q 25 45 45 40" stroke="#6b7280" stroke-width="3" fill="none" stroke-linecap="round"/>
                <circle cx="60" cy="50" r="3" fill="#6b7280" />
                <circle cx="75" cy="60" r="2" fill="#6b7280" />
                <circle cx="45" cy="70" r="4" fill="#6b7280" />
            </svg>
        `;

        // 混淆项 机器狀(迷惑性强)
const svgDog = `
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <rect x="20" y="45" width="60" height="35" rx="10" fill="#cbd5e1" stroke="#94a3b8" stroke-width="4"/>
                <!-- 腀-->
                <rect x="25" y="80" width="10" height="15" fill="#94a3b8" />
                <rect x="65" y="80" width="10" height="15" fill="#94a3b8" />
                <!-- 狗头 -->
                <rect x="70" y="25" width="25" height="25" rx="5" fill="#cbd5e1" />
                <!-- 耳朵 (下垂) -->
                <path d="M 75 25 L 65 40 L 75 40 Z" fill="#64748b" />
                <!-- 眼睛和鼻子-->
                <circle cx="85" cy="35" r="3" fill="#ef4444" />
                <circle cx="95" cy="35" r="2" fill="#333" />
                <!-- 短尾巴-->
                <path d="M 20 50 L 5 45" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
            </svg>
        `;

        // 混淆项 云朵 (类似机器人但不是)
const svgCloudItem = `
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <path d="M 30 70 Q 10 70 10 50 Q 10 30 30 30 Q 40 10 60 20 Q 80 10 90 30 Q 100 50 80 70 Z" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
                <circle cx="40" cy="45" r="5" fill="#38bdf8" opacity="0.6"/>
                <circle cx="60" cy="45" r="5" fill="#38bdf8" opacity="0.6"/>
                <path d="M 45 55 Q 50 60 55 55" stroke="#38bdf8" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
            </svg>
        `;

        /* ================= 游戏逻辑与关卡数据================= */
        let gameState = {
            g1Round: 0,
            g1Levels: [
                { prompt: '三只眼睛', check: (c) => c.eyes === 3, cats: [
                    { eyes: 2, bodyColor: '#d97706' }, { eyes: 2, bodyColor: '#b45309', earColor: '#78350f' },
                    { eyes: 3, bodyColor: '#94a3b8', hasAntenna: true, tailType: 'mech' }, { eyes: 2, bodyColor: '#f59e0b' }
                ]},
                { prompt: '机械尾巴', check: (c) => c.tailType === 'mech', cats: [
                    { tailType: 'normal', bodyColor: '#d97706' }, { tailType: 'mech', bodyColor: '#cbd5e1', earColor: '#64748b' },
                    { tailType: 'normal', bodyColor: '#94a3b8' }, { tailType: 'normal', bodyColor: '#f59e0b' }
                ]},
                { prompt: '头顶天线', check: (c) => c.hasAntenna === true, cats: [
                    { hasAntenna: false, bodyColor: '#d97706' }, { hasAntenna: false, bodyColor: '#b45309' },
                    { hasAntenna: false, bodyColor: '#94a3b8' }, { hasAntenna: true, bodyColor: '#0ea5e9', tailType: 'mech', eyes:3 }
                ]}
            ],
            
            g2Round: 0,
            g2Levels: [
                { 
                    f1Name: '绿耳朵', f1Svg: '<svg viewBox="0 0 100 100" class="w-8 h-8"><polygon points="20,80 50,20 80,80" fill="#a3e635"/></svg>',
                    f2Name: '机械尾巴', f2Svg: '<svg viewBox="0 0 100 100" class="w-8 h-8"><path d="M 20 80 L 50 80 L 50 40 L 80 40" stroke="#71717a" stroke-width="15" fill="none"/></svg>',
                    check: (c) => c.earColor === '#a3e635' && c.tailType === 'mech',
                    cats: [
                        { earColor: '#b45309', tailType: 'mech', bodyColor: '#cbd5e1', desc: '棕耳朵+机械尾巴' },
                        { earColor: '#a3e635', tailType: 'normal', bodyColor: '#d97706', desc: '绿耳朵+普通尾巴' },
                        { earColor: '#a3e635', tailType: 'mech', bodyColor: '#94a3b8', eyes: 3, desc: '绿耳朵+机械尾巴' },
                        { earColor: '#b45309', tailType: 'normal', bodyColor: '#f59e0b', desc: '棕耳朵+普通尾巴' }
                    ]
                },
                { 
                    f1Name: '三只眼', f1Svg: '<svg viewBox="0 0 100 100" class="w-8 h-8"><circle cx="30" cy="50" r="10" fill="#06b6d4"/><circle cx="50" cy="30" r="10" fill="#06b6d4"/><circle cx="70" cy="50" r="10" fill="#06b6d4"/></svg>',
                    f2Name: '蓝身体', f2Svg: '<svg viewBox="0 0 100 100" class="w-8 h-8"><rect x="20" y="20" width="60" height="60" rx="10" fill="#3b82f6"/></svg>',
                    check: (c) => c.eyes === 3 && c.bodyColor === '#3b82f6',
                    cats: [
                        { eyes: 2, bodyColor: '#3b82f6', desc: '两只眼蓝身体' },
                        { eyes: 3, bodyColor: '#d97706', desc: '三只眼橘身体' },
                        { eyes: 2, bodyColor: '#d97706', desc: '两只眼橘身体' },
                        { eyes: 3, bodyColor: '#3b82f6', tailType: 'mech', desc: '三只眼蓝身体' }
                    ]
                },
                { 
                    f1Name: '头顶天线', f1Svg: '<svg viewBox="0 0 100 100" class="w-8 h-8"><path d="M 50 70 L 50 30" stroke="#9ca3af" stroke-width="10" stroke-linecap="round"/><circle cx="50" cy="20" r="15" fill="#a855f7"/></svg>',
                    f2Name: '棕耳朵', f2Svg: '<svg viewBox="0 0 100 100" class="w-8 h-8"><polygon points="20,80 50,20 80,80" fill="#b45309"/></svg>',
                    check: (c) => c.hasAntenna === true && c.earColor === '#b45309',
                    cats: [
                        { hasAntenna: true, earColor: '#b45309', bodyColor: '#64748b', desc: '有天线棕耳朵' },
                        { hasAntenna: true, earColor: '#a3e635', bodyColor: '#64748b', desc: '有天线绿耳朵' },
                        { hasAntenna: false, earColor: '#b45309', bodyColor: '#d97706', desc: '无天线棕耳朵' },
                        { hasAntenna: false, earColor: '#a3e635', bodyColor: '#d97706', desc: '无天线绿耳朵' }
                    ]
                }
            ],

            g3Items: [],
            g3CurrentIndex: 0
        };

        const dialogText = document.getElementById('dialogue-text');
        const characterAvatar = document.getElementById('character-avatar');
        const btnHome = document.getElementById('btn-home');

        // 更新UI辅助函数
function setDialogue(character, text) {
            dialogText.innerHTML = text;
            if (character === 'robot') {
                characterAvatar.innerHTML = '<img src="../../characters/characters/diandian.png" alt="点点" class="w-full h-full object-contain" />';
                document.getElementById('dialogue-box').className = "bg-blue-50 p-4 border-b-2 border-blue-100 flex items-end gap-4 relative z-10 shrink-0 min-h-[120px]";
            } else {
                characterAvatar.innerHTML = '<img src="../../characters/characters/tuantuan.png" alt="团团" class="w-full h-full object-contain" />';
                document.getElementById('dialogue-box').className = "bg-orange-50 p-4 border-b-2 border-orange-100 flex items-end gap-4 relative z-10 shrink-0 min-h-[120px]";
            }
        }

        function switchView(viewId) {
            ['view-menu', 'view-game1', 'view-game2', 'view-game3'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('flex');
            });
            const target = document.getElementById(viewId);
            target.classList.remove('hidden');
            if(viewId !== 'view-menu') {
                target.classList.add('flex');
                btnHome.classList.remove('hidden');
            } else {
                btnHome.classList.add('hidden');
            }
        }

        function showModal(msg) {
            document.getElementById('success-msg').innerText = msg;
            document.getElementById('success-modal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('success-modal').classList.add('hidden');
        }

        btnHome.addEventListener('click', () => {
            initMenu();
        });

        // 渲染进度圈    
function renderProgress(containerId, currentRound, totalRounds) {
const container = document.getElementById(containerId);
            let html = '';
            for(let i=0; i<totalRounds; i++) {
                if(i < currentRound) html += '<span class="text-green-500">🟢</span>';
                else if (i === currentRound) html += '<span class="animate-pulse">🟡</span>';
                else html += '<span class="text-gray-300">⚪</span>';
            }
            container.innerHTML = html;
        }

        /* ================= 场景控制器================= */

        // 初始化主菜单
function initMenu() {
            hideModal();
            switchView('view-menu');
            setDialogue('robot', '欢迎来到第14课！<br>外星猫和地球猫太像了，我们要用<strong class="text-blue-600">特征放大镜</strong>找出它们的不同。你想先从哪个关卡开始？');
        }

        // 路由到对应游戏
        function startGame(level) {
if(level === 1) initGame1();
            if(level === 2) initGame2();
            if(level === 3) initGame3();
        }

        /* ------------- 游戏 1 ------------- */
        function initGame1() {
            gameState.g1Round = 0;
            switchView('view-game1');
            setDialogue('robot', '我们来试一试！找出画面中有特别的那个特征 <br>仔细看，目标是什么？');
            loadG1Level();
        }

        function loadG1Level() {
            const levelData = gameState.g1Levels[gameState.g1Round];
            document.getElementById('g1-target-text').innerText = ` ${levelData.prompt}`;
            renderProgress('g1-progress', gameState.g1Round, 3);
            
            const grid = document.getElementById('g1-grid');
            grid.innerHTML = '';
            
            let cats = [...levelData.cats];
            cats.sort(() => Math.random() - 0.5); // 打乱顺序
let isProcessing = false;

            cats.forEach((catProps) => {
                const isTarget = levelData.check(catProps);
                const btn = document.createElement('div');
                btn.className = 'bg-white border-4 border-gray-200 rounded-3xl p-4 cursor-pointer card-hover relative overflow-hidden h-36 md:h-48 flex items-center justify-center transition-all duration-300';
                btn.innerHTML = generateCatSVG(catProps);
                
                btn.onclick = () => {
                    if(isProcessing) return;
                    if (isTarget) {
                        isProcessing = true;
                        btn.classList.add('border-green-500', 'bg-green-100', 'scale-105');
                        
                        if (gameState.g1Round < 2) {
                            setDialogue('boy', '找对啦！进入下一关，看看新特征是什么！');
                            setTimeout(() => {
                                gameState.g1Round++;
                                loadG1Level();
                            }, 1200);
                        } else {
                            renderProgress('g1-progress', 3, 3);
                            setTimeout(() => {
                                showModal('太棒了！你已经能熟练抓住物品的关键特征了！');
                                setDialogue('robot', '特征放大镜用得越来越好啦！');
                            }, 500);
                        }
                    } else {
                        btn.classList.add('animate-shake', 'border-red-400', 'bg-red-50');
                        setDialogue('robot', '不对哦，仔细观察它的特征，和目标不一样。再找找！');
                        setTimeout(() => {
                            btn.classList.remove('animate-shake', 'border-red-400', 'bg-red-50');
                        }, 500);
                    }
                };
                grid.appendChild(btn);
            });
        }

        /* ------------- 游戏 2 ------------- */
        function initGame2() {
            gameState.g2Round = 0;
            switchView('view-game2');
            setDialogue('boy', '团团说：有时候一个特征不够准。这次我们要看【双特征组合】，两个条件都要满足哦！');
            loadG2Level();
        }

        function loadG2Level() {
            const levelData = gameState.g2Levels[gameState.g2Round];
            document.getElementById('g2-f1-name').innerText = `特征1：${levelData.f1Name}`;
            document.getElementById('g2-f1-img').innerHTML = levelData.f1Svg;
            document.getElementById('g2-f2-name').innerText = `特征2：${levelData.f2Name}`;
            document.getElementById('g2-f2-img').innerHTML = levelData.f2Svg;
            renderProgress('g2-progress', gameState.g2Round, 3);
            
            const grid = document.getElementById('g2-grid');
            grid.innerHTML = '';
            
            let cats = [...levelData.cats];
            cats.sort(() => Math.random() - 0.5);

            let isProcessing = false;

            cats.forEach(catProps => {
                const isTarget = levelData.check(catProps);
                const btn = document.createElement('div');
                btn.className = 'bg-white border-4 border-blue-100 rounded-3xl p-4 cursor-pointer card-hover h-36 md:h-48 flex items-center justify-center transition-all duration-300';
                btn.innerHTML = generateCatSVG(catProps);
                
                btn.onclick = () => {
                    if(isProcessing) return;
                    if (isTarget) {
                        isProcessing = true;
                        btn.classList.add('border-green-500', 'bg-green-100', 'scale-105');
                        
                        if (gameState.g2Round < 2) {
                            setDialogue('robot', '完美匹配！两个特征都对上了，准备下一关！');
                            setTimeout(() => {
                                gameState.g2Round++;
                                loadG2Level();
                            }, 1200);
                        } else {
                            renderProgress('g2-progress', 3, 3);
                            setTimeout(() => {
                                showModal('闯关成功！你学会了 两个特征一起看 的秘诀，再也不会认错了！');
                                setDialogue('boy', '团团说：越来越像样了！');
                            }, 500);
                        }
                    } else {
                        btn.classList.add('animate-shake', 'border-red-400', 'bg-red-50');
                        setDialogue('boy', `哎呀不对！这只是 ${catProps.desc}】。需要两个特征同时满足！`);
                        setTimeout(() => {
                            btn.classList.remove('animate-shake', 'border-red-400', 'bg-red-50');
                        }, 800);
                    }
                };
                grid.appendChild(btn);
            });
        }

        /* ------------- 游戏 3 ------------- */
        function initGame3() {
            switchView('view-game3');
            setDialogue('robot', '终极关卡！观察扫描仪上的物品，对照上面的 特征清单 ，它是地球猫、外星猫，还是混淆项？');
            
            // 准备更丰富的8个物品列队，将外星猫的发光改为天线        
gameState.g3Items = [
                { type: 'earth', svg: generateCatSVG({eyes: 2, tailType: 'normal', bodyColor: '#d97706'}), name: '正常的猫' },
                { type: 'alien', svg: generateCatSVG({eyes: 3, tailType: 'mech', bodyColor: '#64748b', hasAntenna: true}), name: '三眼天线猫' },
                { type: 'none', svg: svgDog, name: '机器狗' }, // 机器狗'], // 干扰项
                { type: 'none', svg: svgFlower, name: '一朵小花' },
                { type: 'alien', svg: generateCatSVG({eyes: 3, tailType: 'mech', bodyColor: '#0ea5e9', hasAntenna: true}), name: '蓝色外星猫' },
                { type: 'none', svg: svgCloudItem, name: '云朵' },
                { type: 'none', svg: svgRock, name: '一块石头' }
            ];
            gameState.g3CurrentIndex = 0;
            
            renderG3Item();
        }

        function renderG3Item() {
            const targetContainer = document.getElementById('g3-target');
            const scanner = document.getElementById('scanner');
            const counter = document.getElementById('g3-counter');
            
            counter.innerText = `${gameState.g3CurrentIndex} / 8`;

            if(gameState.g3CurrentIndex >= gameState.g3Items.length) {
                showModal('太厉害了！8个物品全都正确分类了，连狡猾的机器狗都没有骗到你！');
                setDialogue('boy', '团团把今天的小作品收进档案袋：特征放大镜，任务圆满完成！');
                return;
            }

            const currentItem = gameState.g3Items[gameState.g3CurrentIndex];
            
            // 进场动画
targetContainer.innerHTML = currentItem.svg;
            targetContainer.classList.remove('scale-0');
            targetContainer.classList.add('scale-100');
            targetContainer.parentElement.classList.add('animate-pop');
            scanner.style.display = 'block';
            
            setTimeout(() => {
                targetContainer.parentElement.classList.remove('animate-pop');
            }, 500);
        }

        let isG3Processing = false;
        function checkG3(answerType) {
            if(isG3Processing) return;
            const currentItem = gameState.g3Items[gameState.g3CurrentIndex];
            const targetContainer = document.getElementById('g3-target');

            if (answerType === currentItem.type) {
                isG3Processing = true;
                targetContainer.parentElement.classList.remove('border-gray-400');
                targetContainer.parentElement.classList.add('border-green-500', 'bg-green-100');
                
                if(answerType === 'none') {
                    setDialogue('robot', '火眼金睛！这确实不是我们要找的猫，它是混淆项！');
                } else {
                    setDialogue('robot', '分类正确！特征完全吻合清单！');
                }
                
                // 建场动画
setTimeout(() => {
                    targetContainer.classList.remove('scale-100');
                    targetContainer.classList.add('scale-0');
                }, 800);

                setTimeout(() => {
                    targetContainer.parentElement.classList.remove('border-green-500', 'bg-green-100');
                    targetContainer.parentElement.classList.add('border-gray-400');
                    gameState.g3CurrentIndex++;
                    isG3Processing = false;
                    renderG3Item();
                }, 1100);
            } else {
                targetContainer.parentElement.classList.add('animate-shake', 'border-red-400', 'bg-red-50');
                setDialogue('boy', '等等，我们再仔细对照一下清单。它的眼睛、尾巴和天线对得上吗？');
                
                setTimeout(() => {
                    targetContainer.parentElement.classList.remove('animate-shake', 'border-red-400', 'bg-red-50');
                }, 500);
            }
        }

        /* 模态框下一步回调*/
        function nextStep() {
            hideModal();
            initMenu();
        }

        /* 放大镜特效(仅在游戏1和展示) */
        const gameContainer = document.getElementById('game-container');
        const magGlass = document.getElementById('mag-glass');

        gameContainer.addEventListener('mousemove', (e) => {
            const rect = gameContainer.getBoundingClientRect();
            // 如果在主菜单或游戏隐藏
if(document.getElementById('view-menu').classList.contains('hidden') === false || 
               document.getElementById('view-game3').classList.contains('hidden') === false) {
                magGlass.style.display = 'none';
                return;
            }

            magGlass.style.display = 'block';
            magGlass.style.left = (e.clientX - rect.left) + 'px';
            magGlass.style.top = (e.clientY - rect.top) + 'px';
        });

        gameContainer.addEventListener('mouseleave', () => {
            magGlass.style.display = 'none';
        });

        // 启动应用
window.onload = initMenu;

    </script>
</body>
</html>
