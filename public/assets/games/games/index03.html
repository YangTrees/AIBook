<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小邮差的密码信：编码与解砀</title>
    <script src="../../libs/libs/tailwind.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 核心主题与材质变量*/
        :root {
            --desk-color: #f3dfc1;
            --paper-color: #fffdf5;
            --wood-dark: #c49a6c;
            --robot-blue: #a3d9f9;
            --robot-face: #1e3a5f;
            --boy-orange: #f59e0b;
            --postman-green: #4ade80;
        }

        body {
            font-family: 'Nunito', 'ZCOOL KuaiLe', sans-serif;
            background-color: #e8d5c4;
            /* 模拟图片中的木质桌面背景 */
            background-image: 
                linear-gradient(90deg, rgba(200, 160, 120, 0.1) 0%, rgba(200, 160, 120, 0.1) 50%, transparent 50%, transparent 100%),
                linear-gradient(rgba(200, 160, 120, 0.05) 0px, transparent 1px);
            background-size: 100px 100px, 100% 20px;
            color: #4a3b32;
            overflow-x: hidden;
        }

        /* 纸张质感卡片 */
        .paper-card {
            background-color: var(--paper-color);
            border: 2px solid #d1bfae;
            border-radius: 8px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.05), inset 0 0 20px rgba(0,0,0,0.02);
            position: relative;
        }

        /* 木质图标址*/
        .wood-block {
            background: linear-gradient(135deg, #fef3e2 0%, #f0d5b1 100%);
            border: 3px solid #dcae78;
            border-radius: 12px;
            box-shadow: 2px 4px 0px #b88655;
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            user-select: none;
        }
        .wood-block:hover { transform: translateY(-4px); box-shadow: 2px 8px 0px #b88655; }
        .wood-block:active { cursor: grabbing; transform: translateY(2px); box-shadow: 1px 2px 0px #b88655; }
        
        /* 接收槽位 */
        .drop-zone {
            background-color: rgba(255, 255, 255, 0.5);
            border: 3px dashed #c49a6c;
            border-radius: 12px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .drop-zone.drag-over {
            background-color: rgba(255, 220, 150, 0.4);
            border-color: #f59e0b;
            transform: scale(1.05);
        }

        /* 对照表格样式 */
        .lookup-table {
            border-collapse: collapse;
            width: 100%;
            background: white;
            border: 2px solid #8c6b4a;
        }
        .lookup-table td, .lookup-table th {
            border: 2px solid #8c6b4a;
            padding: 10px;
            text-align: center;
            height: 70px;
        }

        /* 动画库*/
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake-error { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; border-color: #ef4444 !important; background-color: #fee2e2 !important; }

        @keyframes tada {
            0% { transform: scale(1); }
            10%, 20% { transform: scale(0.9) rotate(-3deg); }
            30%, 50%, 70%, 90% { transform: scale(1.1) rotate(3deg); }
            40%, 60%, 80% { transform: scale(1.1) rotate(-3deg); }
            100% { transform: scale(1) rotate(0); }
        }
        .tada-success { animation: tada 1s ease-in-out; border-color: #22c55e !important; background-color: #dcfce7 !important; }

        /* 按钮样式 */
        .game-btn {
            background: linear-gradient(to bottom, #4ade80, #22c55e);
            border: 3px solid #166534;
            box-shadow: 0 4px 0 #15803d;
            border-radius: 99px;
            color: white;
            font-weight: bold;
            transition: all 0.1s;
        }
        .game-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #15803d; }
        
        /* 隐藏游成二，直到游成一完成 */
        #game2-section { display: none; opacity: 0; transition: opacity 0.5s; }

        /* 五彩纸屑画布 */
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen relative flex flex-col items-center">

    <canvas id="confetti-canvas"></canvas>

    <!-- 主容器，模拟一张大桌子 -->
    <div class="max-w-5xl w-full bg-[#fceecf] rounded-3xl p-6 shadow-2xl relative" style="border: 12px solid #e1c09f;">
        
        <header class="text-center mb-8 relative">
            <h1 class="text-4xl md:text-5xl font-black text-amber-800 drop-shadow-md tracking-wider" style="font-family: 'ZCOOL KuaiLe', sans-serif;">
                ✉️ 动手：图标编码游成            </h1>
            <p class="text-xl md:text-2xl text-amber-700 mt-2 font-bold">用星/有云组合发消息</p>
        </header>

        <section id="game1-section" class="relative">
            
            <!-- 角色：团团(小男子 和点点 (机器人 -->
            <div class="flex justify-between items-end mb-4 px-4">
                <div class="flex flex-col items-center z-10">
                    <img id="tuantuan-img" src="" alt="团团" class="w-32 h-32 drop-shadow-lg object-contain" />
                    <div class="bg-white px-3 py-1 rounded-full text-sm font-bold text-orange-600 shadow-md -mt-2 border-2 border-orange-200">编码呀 团团</div>
                </div>

                <div class="flex flex-col items-center floating z-10">
                    <img id="diandian-img" src="" alt="点点" class="w-28 h-28 drop-shadow-lg object-contain" />
                    <div class="bg-white px-3 py-1 rounded-full text-sm font-bold text-blue-600 shadow-md mt-2 border-2 border-blue-200">小助所 点点</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-0">
                <!-- 左侧：对照表设定区-->
                <div class="paper-card p-4">
                    <div class="text-center font-bold text-xl mb-4 border-b-2 border-dashed border-gray-300 pb-2">📋 对照表（空白：</div>
                    <p class="text-sm text-gray-500 mb-2">第一步：将右侧的物品拖入表格，建立密码规则！</p>
                    
                    <table class="lookup-table">
                        <tr>
                            <td class="w-1/3"><div class="text-4xl">⭕</div></td>
                            <td class="w-2/3"><div id="dict-star" class="drop-zone w-full h-16" data-accept="item">拖入物品</div></td>
                        </tr>
                        <tr>
                            <td><div class="text-4xl">🌙</div></td>
                            <td><div id="dict-moon" class="drop-zone w-full h-16" data-accept="item">拖入物品</div></td>
                        </tr>
                        <tr>
                            <td><div class="text-4xl">☁️</div></td>
                            <td><div id="dict-cloud" class="drop-zone w-full h-16" data-accept="item">拖入物品</div></td>
                        </tr>
                    </table>
                </div>

                <!-- 右侧：物品池与消息编辑区 -->
                <div class="flex flex-col gap-4">
                    <!-- 物品池-->
                    <div class="paper-card p-4 bg-orange-50">
                        <p class="font-bold mb-2 text-center text-orange-800">🍎 物品仓库 (拖拽到左侧</p>
                        <div class="flex justify-around flex-wrap gap-2" id="item-pool">
                            <!-- Draggable Items -->
                            <div class="wood-block w-16 h-16 text-4xl bg-white" draggable="true" id="item-apple" data-type="item" data-value="🍎">🍎</div>
                            <div class="wood-block w-16 h-16 text-4xl bg-white" draggable="true" id="item-car" data-type="item" data-value="🚗">🚗</div>
                            <div class="wood-block w-16 h-16 text-4xl bg-white" draggable="true" id="item-key" data-type="item" data-value="🔑">🔑</div>
                            <div class="wood-block w-16 h-16 text-4xl bg-white" draggable="true" id="item-flower" data-type="item" data-value="🌸">🌸</div>
                        </div>
                    </div>

                    <!-- 消息条-->
                    <div class="paper-card p-4 bg-blue-50 flex-grow">
                        <p class="font-bold mb-2 text-center text-blue-800">✉️ 空白消息条</p>
                        <p class="text-sm text-gray-500 text-center mb-4">第二步：拖拽下方密码块，组成一条秘密消恀</p>
                        
                        <!-- 消息槽位 -->
                        <div class="flex justify-center gap-2 md:gap-4 mb-6 bg-white p-3 border-2 border-blue-200 rounded-xl shadow-inner">
                            <div id="msg-slot-1" class="drop-zone w-20 h-20 bg-gray-50" data-accept="symbol"></div>
                            <div id="msg-slot-2" class="drop-zone w-20 h-20 bg-gray-50" data-accept="symbol"></div>
                            <div id="msg-slot-3" class="drop-zone w-20 h-20 bg-gray-50" data-accept="symbol"></div>
                        </div>

                        <!-- 密码块池 -->
                        <div class="flex justify-center gap-4">
                            <div class="wood-block w-20 h-20" draggable="true" id="sym-star" data-type="symbol" data-value="⭕">⭕</div>
                            <div class="wood-block w-20 h-20" draggable="true" id="sym-moon" data-type="symbol" data-value="🌙">🌙</div>
                            <div class="wood-block w-20 h-20" draggable="true" id="sym-cloud" data-type="symbol" data-value="☁️">☁️</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 提交按钮 -->
            <div class="text-center mt-8">
                <button id="send-btn" class="game-btn px-8 py-3 text-xl opacity-50 cursor-not-allowed" disabled>
                    交给小邮差送信 🏁
                </button>
                <p id="send-tip" class="text-red-500 text-sm mt-2 font-bold h-6"></p>
            </div>
        </section>

        <section id="game2-section" class="mt-8 pt-8 border-t-4 border-dashed border-orange-300 relative">
            
            <div class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-yellow-100 px-4 py-1 rounded-full border-2 border-yellow-400 font-bold text-yellow-800 shadow-md">
                信件送达：            </div>

            <div class="flex justify-center mb-6">
                 <!-- SVG 小邮差-->
                 <svg width="100" height="120" viewBox="0 0 100 120" class="drop-shadow-lg floating">
                    <!-- 身体 -->
                    <rect x="35" y="50" width="30" height="40" rx="5" fill="var(--postman-green)" stroke="#166534" stroke-width="2"/>
                    <!-- 邮差包-->
                    <rect x="30" y="60" width="20" height="20" rx="3" fill="#8b5a2b" transform="rotate(15 30 60)"/>
                    <line x1="60" y1="50" x2="30" y2="70" stroke="#8b5a2b" stroke-width="3"/>
                    <!-- 天-->
                    <circle cx="50" cy="35" r="18" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
                    <!-- 脸部细节 -->
                    <circle cx="44" cy="35" r="2" fill="#333"/>
                    <circle cx="56" cy="35" r="2" fill="#333"/>
                    <path d="M 47 40 Q 50 43 53 40" fill="none" stroke="#333" stroke-width="1.5"/>
                    <!-- 练色帽子 -->
                    <path d="M 30 25 Q 50 10 70 25 Z" fill="var(--postman-green)" stroke="#166534" stroke-width="2"/>
                    <path d="M 25 25 L 75 25" stroke="var(--postman-green)" stroke-width="4" stroke-linecap="round"/>
                    <!-- 小旗子-->
                    <line x1="75" y1="50" x2="85" y2="90" stroke="#8b5a2b" stroke-width="3"/>
                    <polygon points="75,50 95,55 75,65" fill="#a3e635" stroke="#4d7c0f" stroke-width="1"/>
                </svg>
                <div class="ml-4 flex flex-col justify-center">
                    <h2 class="text-2xl font-bold text-green-800">游成二：我是小小解码呀</h2>
                    <p class="text-gray-700">小邮差送来了你刚才写的密码信，看看你还能读懂它吗？</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 收到的消息与解码区-->
                <div class="paper-card p-6 bg-green-50 border-green-300">
                    <p class="font-bold text-center text-green-800 mb-2">📩 收到的密码信</p>
                    <div id="received-msg" class="flex justify-center gap-4 text-5xl mb-6 bg-white p-4 rounded-xl shadow-inner border-2 border-gray-200">
                        <!-- 动态填兀-->
                    </div>

                    <p class="text-center font-bold text-gray-700 mb-2">把代表它们真实含义的物品拖到下面：</p>
                    <div class="flex justify-center gap-2 md:gap-4 mb-4">
                        <div id="decode-slot-1" class="drop-zone w-20 h-20 bg-white shadow-inner" data-accept="item"></div>
                        <div id="decode-slot-2" class="drop-zone w-20 h-20 bg-white shadow-inner" data-accept="item"></div>
                        <div id="decode-slot-3" class="drop-zone w-20 h-20 bg-white shadow-inner" data-accept="item"></div>
                    </div>
                </div>

                <!-- 回顾对照表-->
                <div class="paper-card p-6 border-gray-300 relative">
                    <!-- 锁定标记 -->
                    <div class="absolute top-2 right-2 text-2xl" title="已经约定好，不可修改">🔒</div>
                    <p class="font-bold text-center text-gray-800 mb-4">📝 我们约定的对照表</p>
                    <div class="flex flex-col gap-3" id="locked-dict">
                        <!-- 动态填充回顾-->
                    </div>
                    
                    <p class="font-bold text-center text-gray-800 mt-6 mb-2">🍎 物品选择区</p>
                    <div class="flex justify-around bg-orange-50 p-3 rounded-xl border-2 border-orange-200" id="decode-item-pool">
                        <!-- 动态复制物品-->
                    </div>
                </div>
            </div>

            <div class="text-center mt-8 flex justify-center gap-4">
                <button id="verify-btn" class="game-btn px-8 py-3 text-xl bg-gradient-to-b from-blue-400 to-blue-600 border-blue-800 shadow-[0_4px_0_#1e3a8a]">
                    点点，帮我棕查！ 🔍
                </button>
            </div>
            
            <!-- 反馈提示区-->
            <div id="feedback-area" class="mt-4 text-center text-2xl font-bold h-10 transition-all duration-300 opacity-0">
                <!-- 动态文本-->
            </div>

        </section>
    </div>

    <script>
        // --- 角色图片加载逻辑 ---
const tuantuanImages = [
            '../../characters/characters/tuantuan.png', '../../characters/characters/tuantuan01.png', '../../characters/characters/tuantuan02.png', '../../characters/characters/tuantuan03.png',
            '../../characters/characters/tuantuan04.png', '../../characters/characters/tuantuan05.png', '../../characters/characters/tuantuan06.png'
        ];
        const diandianImages = [
            '../../characters/characters/diandian.png', '../../characters/characters/diandian01.png', '../../characters/characters/diandian02.png', '../../characters/characters/diandian03.png',
            '../../characters/characters/diandian04.png', '../../characters/characters/diandian05.png', '../../characters/characters/diandian06.png'
        ];

        function getRandomImage(images) {
            return images[Math.floor(Math.random() * images.length)];
        }

        function initCharacters() {
            document.getElementById('tuantuan-img').src = getRandomImage(tuantuanImages);
            document.getElementById('diandian-img').src = getRandomImage(diandianImages);
        }

        // --- 游成状态数据---
const gameState = {
            dictionary: { '⭕': null, '🌙': null, '☁️': null }, // 对照表        
encodedMessage: [null, null, null], // 编码后的消息
decodeAnswers: [null, null, null] // 玩家解码填入的答案
};

        // --- 工具函数：音效与特效 ---
        function triggerShake(elementId) {
            const el = document.getElementById(elementId);
            el.classList.remove('shake-error');
            void el.offsetWidth; // 触发重绘
el.classList.add('shake-error');
            setTimeout(() => el.classList.remove('shake-error'), 600);
        }

        function triggerTada(elementId) {
            const el = document.getElementById(elementId);
            el.classList.remove('tada-success');
            void el.offsetWidth; 
            el.classList.add('tada-success');
            setTimeout(() => el.classList.remove('tada-success'), 1000);
        }

        // 简易五彩纸屑特效    
function throwConfetti() {
const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            const colors = ['#f59e0b', '#4ade80', '#3b82f6', '#ef4444', '#a855f7'];
            
            for(let i=0; i<100; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 1) * 20 - 5,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 10
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                particles.forEach(p => {
                    p.x += p.vx;
                    p.vy += 0.5; // 重力
p.y += p.vy;
                    p.rot += p.rotSpeed;
                    
                    if (p.y < canvas.height) active = true;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                });

                if (active) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            animate();
        }

        // --- 拖拽系统通用逻辑 ---
let draggedElement = null;

        function initDragAndDrop() {
            const draggables = document.querySelectorAll('[draggable="true"]');
            const dropZones = document.querySelectorAll('.drop-zone');

            draggables.forEach(draggable => {
                draggable.addEventListener('dragstart', (e) => {
                    draggedElement = draggable;
                    // 克隆效果：原物体变半透明
setTimeout(() => draggable.classList.add('opacity-50'), 0);
                    e.dataTransfer.setData('text/plain', draggable.dataset.value);
                    e.dataTransfer.setData('type', draggable.dataset.type);
                });

                draggable.addEventListener('dragend', () => {
                    draggable.classList.remove('opacity-50');
                    draggedElement = null;
                });
            });

            dropZones.forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    // 棕查类型是否匹酀(字典槽收item, 消息槽收symbol)
const acceptedType = zone.dataset.accept;
                    if (draggedElement && draggedElement.dataset.type === acceptedType) {
                        zone.classList.add('drag-over');
                    }
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    
                    const type = e.dataTransfer.getData('type');
                    const value = e.dataTransfer.getData('text/plain');
                    const acceptedType = zone.dataset.accept;

                    if (type === acceptedType) {
                        // 视觉上更新槽位                    
zone.innerHTML = `<div class="text-4xl filter drop-shadow-md">${value}</div>`;
                        zone.classList.add('bg-white'); // 填入后背景变亮                        
                        // 数据层更新                    
updateGameState(zone.id, value);
} else {
                        triggerShake(zone.id); // 类型不对，抖动提示
}
                });
            });
        }

        function updateGameState(zoneId, value) {
            // 更新字典
if (zoneId === 'dict-star') gameState.dictionary['⭕'] = value;
            if (zoneId === 'dict-moon') gameState.dictionary['🌙'] = value;
            if (zoneId === 'dict-cloud') gameState.dictionary['☁️'] = value;

            // 更新消息
if (zoneId === 'msg-slot-1') gameState.encodedMessage[0] = value;
            if (zoneId === 'msg-slot-2') gameState.encodedMessage[1] = value;
            if (zoneId === 'msg-slot-3') gameState.encodedMessage[2] = value;

            checkGame1Progress();
        }

        function checkGame1Progress() {
            const isDictFull = Object.values(gameState.dictionary).every(v => v !== null);
            const isMsgFull = gameState.encodedMessage.every(v => v !== null);
            
            const btn = document.getElementById('send-btn');
            const tip = document.getElementById('send-tip');

            if (isDictFull && isMsgFull) {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('animate-pulse');
                tip.innerText = "";
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('animate-pulse');
                if (!isDictFull) tip.innerText = "请先填满左侧对照表哦";
                else if (!isMsgFull) tip.innerText = "请把三个密码块填入消息条";
            }
        }

        // 发送给小邮差-> 进入游成二
document.getElementById('send-btn').addEventListener('click', () => {
            document.getElementById('send-btn').classList.remove('animate-pulse');
            document.getElementById('send-btn').innerText = "✅已发送！看下面👦";
            
            // 初始化并显示游成二
initGame2();
        });

        function initGame2() {
            const g2 = document.getElementById('game2-section');
            g2.style.display = 'block';
            setTimeout(() => g2.style.opacity = '1', 10);

            // 1. 渲染收到的密码信
const msgContainer = document.getElementById('received-msg');
            msgContainer.innerHTML = gameState.encodedMessage.map(sym => `<div>${sym}</div>`).join('');

            // 2. 渲染锁定的对照表 (回顾)
const dictContainer = document.getElementById('locked-dict');
            dictContainer.innerHTML = Object.entries(gameState.dictionary).map(([sym, item]) => `
                <div class="flex justify-between items-center bg-white p-2 rounded border border-gray-200 shadow-sm">
                    <span class="text-3xl">${sym}</span>
                    <span class="text-gray-400 font-bold">=</span>
                    <span class="text-3xl">${item}</span>
                </div>
            `).join('');

            // 3. 准备解码物品池            // 获取所有使用过的和没使用过的物品
const allItems = ['🍎', '🚗', '🔑', '🌸'];
            const poolContainer = document.getElementById('decode-item-pool');
            poolContainer.innerHTML = allItems.map(item => `
                <div class="wood-block w-14 h-14 text-3xl bg-white" draggable="true" data-type="item" data-value="${item}">${item}</div>
            `).join('');

            // 4. 为游成二重新绑定拖拽事件 (因为DOM更新了
initDragAndDropGame2();
            
            // 平滑滚动到游成二
g2.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function initDragAndDropGame2() {
            const draggables = document.getElementById('game2-section').querySelectorAll('[draggable="true"]');
            const dropZones = [document.getElementById('decode-slot-1'), document.getElementById('decode-slot-2'), document.getElementById('decode-slot-3')];

            draggables.forEach(draggable => {
                draggable.addEventListener('dragstart', (e) => {
                    draggedElement = draggable;
                    e.dataTransfer.setData('text/plain', draggable.dataset.value);
                    e.dataTransfer.setData('type', draggable.dataset.type);
                });
                draggable.addEventListener('dragend', () => { draggedElement = null; });
            });

            dropZones.forEach((zone, index) => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (draggedElement && draggedElement.dataset.type === 'item') zone.classList.add('drag-over');
                });
                zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    const value = e.dataTransfer.getData('text/plain');
                    if (e.dataTransfer.getData('type') === 'item') {
                        zone.innerHTML = `<div class="text-4xl">${value}</div>`;
                        gameState.decodeAnswers[index] = value;
                    }
                });
            });
        }

        // 验证解码结果
document.getElementById('verify-btn').addEventListener('click', () => {
            const feedback = document.getElementById('feedback-area');
            
            // 棕查是否全填满
if (gameState.decodeAnswers.includes(null)) {
                feedback.innerText = "❌哎呀，还有空格没有解码呢";
                feedback.className = "mt-4 text-center text-2xl font-bold h-10 transition-all duration-300 opacity-100 text-red-600";
                triggerShake('game2-section');
                return;
            }

            // 对比答案
let isCorrect = true;
            for (let i = 0; i < 3; i++) {
                const symbolInMsg = gameState.encodedMessage[i];
                const expectedItem = gameState.dictionary[symbolInMsg];
                
                if (gameState.decodeAnswers[i] !== expectedItem) {
                    isCorrect = false;
                    // 让错的那个槽位抖动                
triggerShake(`decode-slot-${i+1}`);
} else {
                    // 正确的槽位弹跳                
triggerTada(`decode-slot-${i+1}`);
}
            }

            if (isCorrect) {
                feedback.innerText = "🎉 解码完全正确！点点为你点赞！";
                feedback.className = "mt-4 text-center text-2xl font-bold h-10 transition-all duration-300 opacity-100 text-green-600";
                throwConfetti();
                // 按钮变练
const btn = document.getElementById('verify-btn');
                btn.className = "game-btn px-8 py-3 text-xl bg-gradient-to-b from-green-400 to-green-600 border-green-800 shadow-[0_4px_0_#166534] pointer-events-none";
                btn.innerText = "✅战战成功！";
            } else {
                feedback.innerText = "🤔 有点不对哦，再仔细看看对照表！";
                feedback.className = "mt-4 text-center text-2xl font-bold h-10 transition-all duration-300 opacity-100 text-red-600";
            }
        });

        // 页面加载完成后初始化
window.addEventListener('DOMContentLoaded', () => {
            initDragAndDrop();
            initCharacters();
        });

    </script>
</body>
</html>
