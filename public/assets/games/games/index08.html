<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第28课《雾气里的照片》互动游成</title>
    <!-- Tailwind CSS -->
    <script src="../../libs/libs/tailwind.min.js"></script>
    <!-- React & ReactDOM -->
    <script src="../../libs/libs/react.production.min.js"></script>
    <script src="../../libs/libs/react-dom.production.min.js"></script>
    <!-- Babel (锁定版本 7.21.4 以默认使用经典的 React.createElement 模式) -->
    <script src="../../libs/libs/babel.min.js"></script>
    
    <style>
        body { font-family: 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #fdf6e3; touch-action: manipulation; }
        .cloud-border { border-radius: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .noise-bg {
            background-image: radial-gradient(#666 10%, transparent 11%), radial-gradient(#666 10%, transparent 11%);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
            opacity: 0.5;
            pointer-events: none;
        }
        .fog-canvas { touch-action: none; } /* 阻止刮雾气时屏幕滚动 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const tuantuanImages = [
            '../../characters/characters/tuantuan.png', '../../characters/characters/tuantuan01.png', '../../characters/characters/tuantuan02.png', '../../characters/characters/tuantuan03.png',
            '../../characters/characters/tuantuan04.png', '../../characters/characters/tuantuan05.png', '../../characters/characters/tuantuan06.png'
        ];
        const diandianImages = [
            '../../characters/characters/diandian.png', '../../characters/characters/diandian01.png', '../../characters/characters/diandian02.png', '../../characters/characters/diandian03.png',
            '../../characters/characters/diandian04.png', '../../characters/characters/diandian05.png', '../../characters/characters/diandian06.png'
        ];

        function getRandomImage(images) {
            return images[Math.floor(Math.random() * images.length)];
        }

        const DianDian = ({ mood = "normal", className = "" }) => (
            <img src={getRandomImage(diandianImages)} className={`w-24 h-24 ${className}`} style={{ objectFit: 'contain' }} alt="点点" />
        );

        const TuanTuan = ({ mood = "normal", className = "" }) => (
            <img src={getRandomImage(tuantuanImages)} className={`w-24 h-24 ${className}`} style={{ objectFit: 'contain' }} alt="团团" />
        );

        // --- 游成 1：让照片更清晰---
const Game1 = ({ onBack }) => {
            const [lightOn, setLightOn] = useState(false);
            const [isClose, setIsClose] = useState(false);
            const [goodAngle, setGoodAngle] = useState(false);
            const isAllClear = lightOn && isClose && goodAngle;

            return (
                <div className="flex flex-col items-center w-full animate-pop max-w-2xl mx-auto">
                    <div className="flex justify-between items-center w-full mb-4">
                        <button onClick={onBack} className="px-4 py-2 bg-white rounded-full text-gray-600 shadow font-bold hover:bg-gray-50">&larr; 返回主菜单</button>
                        <h2 className="text-2xl font-bold text-amber-700">关卡1：让照片更清晰</h2>
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-lg w-full mb-6 relative overflow-hidden">
                        {/* 场景对话 */}
                        <div className="flex justify-between items-end mb-4 h-32">
                            <div className="flex items-end">
                                <DianDian mood={isAllClear ? "happy" : "normal"} className="animate-float" />
                                <div className="bg-blue-100 p-3 rounded-2xl rounded-bl-none ml-2 mb-4 text-blue-800 text-sm md:text-base">
                                    {isAllClear ? "太棒了！现在我看得很清楚了！" : "啊哦，有噪点小怪，环境太暗，还有东西挡住了..."}
                                </div>
                            </div>
                            <div className="flex items-end hidden sm:flex">
                                <div className="bg-orange-100 p-3 rounded-2xl rounded-br-none mr-2 mb-4 text-orange-800 text-sm md:text-base">
                                    {isAllClear ? "清晰的线索更靠谱！" : "点点，我们想办法让它变清楚吧！"}
                                </div>
                                <TuanTuan mood={isAllClear ? "happy" : "normal"} />
                            </div>
                        </div>

                        {/* 照片显示区域 */}
                        <div className="relative w-full h-64 bg-green-50 rounded-xl overflow-hidden border-4 border-gray-200 shadow-inner flex items-center justify-center">
                            {/* 目标物体：花朵和木马 (SVG示意) */}
                            <div className={`transition-all duration-700 ease-in-out flex items-center gap-4
                                ${isClose ? "scale-125" : "scale-75"}
                                ${goodAngle ? "translate-x-0" : "translate-x-12"}
                            `}>
                                {/* 芀(参考图牀6：橘色花瓣、黄色花心、两片练叀 */}
                                <svg width="60" height="80" viewBox="0 0 100 120" className="drop-shadow-md">
                                    {/* 茎叶 */}
                                    <path d="M50 60 Q55 90 50 120" stroke="#4ade80" strokeWidth="6" fill="none" strokeLinecap="round"/>
                                    <path d="M50 90 Q75 100 65 75 Q55 80 50 90 Z" fill="#4ade80"/>
                                    <path d="M50 100 Q25 105 35 85 Q45 90 50 100 Z" fill="#4ade80"/>
                                    {/* 花瓣 */}
                                    <g fill="#f97316">
                                        <circle cx="50" cy="25" r="16" />
                                        <circle cx="75" cy="40" r="16" />
                                        <circle cx="65" cy="65" r="16" />
                                        <circle cx="35" cy="65" r="16" />
                                        <circle cx="25" cy="40" r="16" />
                                    </g>
                                    {/* 花心 */}
                                    <circle cx="50" cy="45" r="16" fill="#fde047" />
                                </svg>
                                {/* 木马/游乐园背晀(参考图牀6：线白相间的顶棚，黄色柱子，白色木马) */}
                                <svg width="120" height="100" viewBox="0 0 120 100" className="drop-shadow-md">
                                    {/* 底部 */}
                                    <path d="M10 85 L110 85 L105 95 L15 95 Z" fill="#fcd34d"/>
                                    <rect x="20" y="45" width="80" height="40" fill="#fef3c7" />
                                    {/* 柱子 */}
                                    <rect x="30" y="45" width="4" height="40" fill="#fbbf24"/>
                                    <rect x="60" y="45" width="4" height="40" fill="#fbbf24"/>
                                    <rect x="86" y="45" width="4" height="40" fill="#fbbf24"/>
                                    {/* 白色木马什*/}
                                    {/* 驀 */}
                                    <g transform="translate(20, 55)">
                                        <path d="M5 15 Q15 5 20 15 L20 20 L5 20 Z" fill="#fff"/>
                                        <circle cx="17" cy="12" r="1.5" fill="#27272a"/>
                                    </g>
                                    {/* 驀 */}
                                    <g transform="translate(50, 50)">
                                        <path d="M5 15 Q15 5 20 15 L20 20 L5 20 Z" fill="#fff"/>
                                        <circle cx="17" cy="12" r="1.5" fill="#27272a"/>
                                    </g>
                                    {/* 驀 */}
                                    <g transform="translate(76, 58)">
                                        <path d="M5 15 Q15 5 20 15 L20 20 L5 20 Z" fill="#fff"/>
                                        <circle cx="17" cy="12" r="1.5" fill="#27272a"/>
                                    </g>
                                    {/* 顶棚主体线白 */}
                                    <path d="M10 45 L60 10 L110 45 Z" fill="#ef4444"/>
                                    <path d="M30 33 L60 10 L90 33 L60 45 Z" fill="#fef2f2"/>
                                    {/* 顶棚花边 */}
                                    <path d="M10 45 Q22 52 35 45 Q47 52 60 45 Q72 52 85 45 Q97 52 110 45" fill="none" stroke="#ef4444" strokeWidth="4" strokeLinecap="round"/>
                                    {/* 顶端的圆球装饰*/}
                                    <circle cx="60" cy="8" r="5" fill="#fbbf24" />
                                </svg>
                            </div>

                            {/* 障碍物：树叶遮挡 (换角色) */}
                            <div className={`absolute top-0 right-0 w-3/4 h-full bg-green-800 transition-all duration-700 origin-top-right
                                ${goodAngle ? "rotate-90 opacity-0" : "rotate-0 opacity-80"}
                            `} style={{ clipPath: "polygon(100% 0, 100% 100%, 0 100%, 30% 60%, 10% 40%, 40% 20%)" }}></div>

                            {/* 噪点小怪特效(靠近) */}
                            {!isClose && (
                                <div className="absolute inset-0 noise-bg flex items-center justify-center gap-10 opacity-70">
                                    {/* 噪点小怪SVG */}
                                    <svg width="30" height="30" viewBox="0 0 50 50" className="animate-bounce">
                                        <circle cx="25" cy="25" r="20" fill="#71717a" />
                                        <path d="M 0 25 L 10 25 M 40 25 L 50 25 M 25 0 L 25 10 M 25 40 L 25 50 M 8 8 L 15 15 M 42 42 L 35 35 M 42 8 L 35 15 M 8 42 L 15 35" stroke="#71717a" strokeWidth="4" />
                                        <circle cx="18" cy="22" r="3" fill="#fff" /><circle cx="32" cy="22" r="3" fill="#fff" />
                                        <path d="M 20 32 Q 25 28 30 32" stroke="#fff" strokeWidth="2" fill="none"/>
                                    </svg>
                                    <svg width="40" height="40" viewBox="0 0 50 50" className="animate-bounce" style={{animationDelay: "0.2s"}}>
                                        <circle cx="25" cy="25" r="20" fill="#71717a" />
                                        <circle cx="18" cy="22" r="3" fill="#fff" /><circle cx="32" cy="22" r="3" fill="#fff" />
                                        <path d="M 20 32 Q 25 28 30 32" stroke="#fff" strokeWidth="2" fill="none"/>
                                    </svg>
                                </div>
                            )}

                            {/* 环境光线遮罩 (开灯 */}
                            <div className={`absolute inset-0 bg-black transition-opacity duration-700 pointer-events-none
                                ${lightOn ? "opacity-0" : "opacity-60"}
                            `}></div>
                        </div>
                    </div>

                    {/* 操作按钮区*/}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 w-full">
                        <button 
                            onClick={() => setLightOn(!lightOn)}
                            className={`p-4 rounded-2xl border-4 font-bold text-lg flex flex-col items-center transition-transform hover:scale-105
                                ${lightOn ? "bg-yellow-100 border-yellow-400 text-yellow-700" : "bg-gray-100 border-gray-300 text-gray-600"}
                            `}
                        >
                            <span className="text-3xl mb-2">💡</span>
                            开灯                            <span className="text-xs font-normal mt-1 opacity-80">让光线更足</span>
                        </button>
                        
                        <button 
                            onClick={() => setIsClose(!isClose)}
                            className={`p-4 rounded-2xl border-4 font-bold text-lg flex flex-col items-center transition-transform hover:scale-105
                                ${isClose ? "bg-blue-100 border-blue-400 text-blue-700" : "bg-gray-100 border-gray-300 text-gray-600"}
                            `}
                        >
                            <span className="text-3xl mb-2">🔍</span>
                            靠近
                            <span className="text-xs font-normal mt-1 opacity-80">减少噪点小怀</span>
                        </button>

                        <button 
                            onClick={() => setGoodAngle(!goodAngle)}
                            className={`p-4 rounded-2xl border-4 font-bold text-lg flex flex-col items-center transition-transform hover:scale-105
                                ${goodAngle ? "bg-green-100 border-green-400 text-green-700" : "bg-gray-100 border-gray-300 text-gray-600"}
                            `}
                        >
                            <span className="text-3xl mb-2">🔄</span>
                            换角色                            <span className="text-xs font-normal mt-1 opacity-80">寻找清晰视线</span>
                        </button>
                    </div>

                    {isAllClear && (
                        <button onClick={onBack} className="mt-8 bg-green-500 text-white px-8 py-4 rounded-full font-bold text-xl animate-bounce shadow-lg cursor-pointer">
                            🌟 成功啦！清晰的照片更可靠🌟
                        </button>
                    )}
                </div>
            );
        };

        // --- 游成 2：雾气遮一遮(刮刮乀 ---
const Game2 = ({ onBack }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [scratchedArea, setScratchedArea] = useState(0);
            const [message, setMessage] = useState("用手擦掉雾气，看看里面是什么？");
            const [hasGuessed, setHasGuessed] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext("2d");
                
                // 填充雾气（灰色半透明遮罩：            
ctx.fillStyle = "#cbd5e1"; // 雾灰色            
ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 添加一些"雾气"纹理文子            
ctx.font = "20px Comic Sans MS";
                ctx.fillStyle = "#94a3b8";
                for(let i=0; i<10; i++){
                    ctx.fillText("雀雀", Math.random()*250, Math.random()*250);
                }
            }, []);

            const handleScratch = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext("2d");
                const rect = canvas.getBoundingClientRect();
                
                let x, y;
                if (e.touches) {
                    x = e.touches[0].clientX - rect.left;
                    y = e.touches[0].clientY - rect.top;
                } else {
                    x = e.clientX - rect.left;
                    y = e.clientY - rect.top;
                }

                ctx.globalCompositeOperation = "destination-out";
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.fill();

                // 粗略模拟刮开面积（真实计算比较耗性能，这里简单用计数器模拟进度反馈）
setScratchedArea(prev => Math.min(prev + 1, 100));
            };

            const guessNotSure = () => {
                setMessage("团团说：我不确定，我要再看看。点点说：说出来也很聪明！");
                setHasGuessed(true);
            };

            const guessSure = () => {
                if (scratchedArea < 20) {
                    setMessage("现在还看不清哦，容易认错，再擦擦雾气吧！");
                } else {
                    setMessage("答对了！是一只可爱的小猫！清晰的线索更靠谱！");
                    setHasGuessed(true);
                    // 自动刮开全部
const canvas = canvasRef.current;
                    const ctx = canvas.getContext("2d");
                    ctx.globalCompositeOperation = "destination-out";
                    ctx.fillRect(0,0,canvas.width, canvas.height);
                }
            };

            return (
                <div className="flex flex-col items-center w-full animate-pop max-w-2xl mx-auto">
                    <div className="flex justify-between items-center w-full mb-4">
                        <button onClick={onBack} className="px-4 py-2 bg-white rounded-full text-gray-600 shadow font-bold hover:bg-gray-50">&larr; 返回主菜单</button>
                        <h2 className="text-2xl font-bold text-blue-700">关卡2：雾气遮一遮</h2>
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-lg w-full mb-6 relative">
                        <div className="text-center font-bold text-lg text-gray-700 mb-4 h-12">
                            {message}
                        </div>

                        <div className="flex flex-col items-center">
                            {/* 刮刮乐区埀*/}
                            <div className="relative w-[300px] h-[300px] border-8 border-white rounded-2xl shadow-md overflow-hidden bg-white mb-6">
                                {/* 底图：猫和(参考图牀8：橘白相间的可爱小猫，坐在草地上) */}
                                <div className="absolute inset-0 bg-sky-100 flex flex-col items-center justify-center border-b-8 border-green-300">
                                    <svg viewBox="0 0 100 100" className="w-56 h-56 mt-4 drop-shadow-md">
                                        {/* 尾巴 */}
                                        <path d="M30 85 Q10 85 10 65 Q10 55 20 55 Q28 55 28 65 Q28 75 35 75 Z" fill="#fba74a" />
                                        <path d="M15 60 Q20 55 25 60" stroke="#ea580c" strokeWidth="2" fill="none"/>
                                        <path d="M12 68 Q18 64 22 68" stroke="#ea580c" strokeWidth="2" fill="none"/>
                                        {/* 身体后部（橘色） */}
                                        <path d="M25 80 Q20 40 50 40 Q80 40 75 80 Z" fill="#fba74a" />
                                        {/* 身体前部胸毛（白色） */}
                                        <path d="M35 80 Q35 45 50 45 Q65 45 65 80 Z" fill="#ffffff" />
                                        {/* 后爪 */}
                                        <circle cx="28" cy="82" r="6" fill="#fba74a" />
                                        <circle cx="72" cy="82" r="6" fill="#fba74a" />
                                        {/* 前爪 */}
                                        <circle cx="42" cy="84" r="6" fill="#ffffff" />
                                        <circle cx="58" cy="84" r="6" fill="#ffffff" />
                                        {/* 猫头轮廓（下半部白色，上半部橘色：*/}
                                        <circle cx="50" cy="35" r="22" fill="#ffffff" />
                                        <path d="M28.5 30 Q35 8 50 8 Q65 8 71.5 30 Q70 45 50 45 Q30 45 28.5 30 Z" fill="#fba74a" />
                                        {/* 脸部白色区域(口鼻) */}
                                        <path d="M40 30 Q50 25 60 30 Q65 45 50 45 Q35 45 40 30 Z" fill="#ffffff" />
                                        {/* 额头橘色条纹 */}
                                        <path d="M45 10 L45 20 M50 9 L50 20 M55 10 L55 20" stroke="#ea580c" strokeWidth="2" strokeLinecap="round" />
                                        <path d="M30 25 L38 25 M62 25 L70 25" stroke="#ea580c" strokeWidth="2" strokeLinecap="round" />
                                        {/* 耳朵 */}
                                        <path d="M32 15 L20 2 L40 8 Z" fill="#fba74a" />
                                        <path d="M29 11 L23 5 L35 9 Z" fill="#fca5a5" />
                                        <path d="M68 15 L80 2 L60 8 Z" fill="#fba74a" />
                                        <path d="M71 11 L77 5 L65 9 Z" fill="#fca5a5" />
                                        {/* 眼睛 */}
                                        <circle cx="40" cy="30" r="3.5" fill="#27272a" />
                                        <circle cx="60" cy="30" r="3.5" fill="#27272a" />
                                        <circle cx="39" cy="29" r="1.5" fill="#ffffff" />
                                        <circle cx="59" cy="29" r="1.5" fill="#ffffff" />
                                        {/* 鼻子和嘴巴*/}
                                        <polygon points="48,35 52,35 50,37" fill="#fca5a5" />
                                        <path d="M45 40 Q50 43 50 37 Q50 43 55 40" stroke="#27272a" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                                        {/* 胡须 */}
                                        <path d="M32 32 L20 28 M30 35 L18 35 M32 38 L20 42" stroke="#27272a" strokeWidth="1" strokeLinecap="round" />
                                        <path d="M68 32 L80 28 M70 35 L82 35 M68 38 L80 42" stroke="#27272a" strokeWidth="1" strokeLinecap="round" />
                                    </svg>
                                </div>
                                
                                {/* 雾气 Canvas */}
                                <canvas 
                                    ref={canvasRef}
                                    width="300" 
                                    height="300" 
                                    className="absolute inset-0 fog-canvas cursor-crosshair"
                                    onMouseDown={(e) => {setIsDrawing(true); handleScratch(e);}}
                                    onMouseUp={() => setIsDrawing(false)}
                                    onMouseLeave={() => setIsDrawing(false)}
                                    onMouseMove={handleScratch}
                                    onTouchStart={(e) => {setIsDrawing(true); handleScratch(e);}}
                                    onTouchEnd={() => setIsDrawing(false)}
                                    onTouchMove={handleScratch}
                                />
                            </div>

                            {/* 互动选项 */}
                            {!hasGuessed ? (
                                <div className="flex gap-4 w-full px-4">
                                    <button 
                                        onClick={guessNotSure}
                                        className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl shadow-sm border-2 border-gray-300"
                                    >
                                        🤷♂︀我不确定
                                    </button>
                                    <button 
                                        onClick={guessSure}
                                        className="flex-1 bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 px-4 rounded-xl shadow-sm border-2 border-orange-500"
                                    >
                                        🐱 我确定是猫！
                                    </button>
                                </div>
                            ) : (
                                <button onClick={onBack} className="flex gap-4 text-green-600 font-bold text-xl items-center bg-green-50 px-6 py-3 rounded-full cursor-pointer">
                                    <TuanTuan mood="happy" className="w-12 h-12" />
                                    <span>太棒了！我们完成了关卡！</span>
                                    <DianDian mood="happy" className="w-12 h-12" />
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主应用组什---
const App = () => {
            const [activeGame, setActiveGame] = useState(null);

            if (activeGame === 'game1') return <Game1 onBack={() => setActiveGame(null)} />;
            if (activeGame === 'game2') return <Game2 onBack={() => setActiveGame(null)} />;

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 max-w-3xl mx-auto text-center">
                    
                    <h1 className="text-4xl md:text-5xl font-extrabold text-blue-900 mb-2 drop-shadow-sm">
                        第8课：雾气里的照片
                    </h1>
                    <p className="text-xl text-gray-600 mb-8 font-bold">— 互动关卡游戏 — </p>

                    <div className="flex justify-center items-end gap-4 mb-10">
                        <DianDian mood="normal" className="w-32 h-32 animate-float" style={{animationDelay: "0s"}} />
                        <TuanTuan mood="happy" className="w-32 h-32 animate-float" style={{animationDelay: "1.5s"}} />
                    </div>

                    <div className="bg-white/80 backdrop-blur-md p-8 rounded-[40px] shadow-xl border-4 border-white w-full">
                        <p className="text-xl text-gray-700 mb-8 font-bold">
                            请选择你要体验的环节：
                        </p>
                        
                        <div className="flex flex-col md:flex-row gap-6 justify-center">
                            <button 
                                onClick={() => setActiveGame('game1')}
                                className="group relative bg-orange-100 hover:bg-orange-200 border-4 border-orange-300 text-orange-800 p-6 rounded-3xl transition-all duration-300 transform hover:-translate-y-2 flex-1"
                            >
                                <div className="text-4xl mb-3 group-hover:animate-bounce">📸</div>
                                <h3 className="text-2xl font-bold mb-2">驱散噪点小块</h3>
                                <p className="text-sm opacity-80">开灯、靠近、换角度，让照片变清楚！</p>
                            </button>

                            <button 
                                onClick={() => setActiveGame('game2')}
                                className="group relative bg-blue-100 hover:bg-blue-200 border-4 border-blue-300 text-blue-800 p-6 rounded-3xl transition-all duration-300 transform hover:-translate-y-2 flex-1"
                            >
                                <div className="text-4xl mb-3 group-hover:animate-bounce">🌫︀</div>

                    <div className="mt-8 text-gray-500 font-bold text-sm">
