<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第13课《袜子大整理》</title>
    <script src="../../libs/libs/tailwind.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        body {
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', cursive, sans-serif;
            background-color: #FFF9E6; /* 温暖的绘本底色*/
            overflow: hidden;
            touch-action: none; /* 防止移动端拖拽时滚动页面 */
        }

        .game-title-shadow {
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px rgba(0,0,0,0.1);
        }

        .draggable {
            position: absolute;
            cursor: grab;
            transition: transform 0.1s;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            z-index: 10;
        }

        .draggable:active, .is-dragging {
            cursor: grabbing;
            transform: scale(1.1);
            z-index: 100;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
        }

        .bin-hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }

        .modal-enter {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-float-delay { animation: float 3s ease-in-out infinite 1.5s; }
    </style>
</head>
<body class="w-screen h-screen flex flex-col relative select-none">

    <!-- 首页选关界面 -->
    <div id="home-screen" class="absolute inset-0 flex flex-col items-center justify-center z-20 bg-[#FFF9E6]">
        <h1 class="text-4xl md:text-6xl text-[#2C5282] font-bold mb-2 game-title-shadow text-center px-4">袜子大整理</h1>
        <p class="text-xl text-gray-600 mb-8 font-bold">今天我们来学：分类！</p>
        
        <div class="flex justify-center items-end mb-8 space-x-4">
            <!-- 团团 SVG -->
            <img src="../../characters/characters/tuantuan.png" alt="团团" class="w-32 h-40 object-contain animate-float-delay" />
            <!-- 点点 SVG -->
            <img src="../../characters/characters/diandian.png" alt="点点" class="w-32 h-40 object-contain animate-float" />
        </div>

        <div class="flex flex-col md:flex-row gap-4 w-full max-w-3xl px-6">
            <button onclick="startGame(1)" class="flex-1 bg-red-400 hover:bg-red-500 text-white rounded-2xl p-4 shadow-lg border-b-4 border-red-600 transition transform hover:-translate-y-1">
                <div class="text-2xl mb-1">颜色大本营</div>
                <div class="text-sm opacity-90">难度：⭐ (3-5岁)</div>
            </button>
            <button onclick="startGame(2)" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 rounded-2xl p-4 shadow-lg border-b-4 border-yellow-600 transition transform hover:-translate-y-1">
                <div class="text-2xl mb-1">规则大侦探</div>
                <div class="text-sm opacity-90">难度：⭐⭕(6-7岁)</div>
            </button>
            <button onclick="startGame(3)" class="flex-1 bg-blue-400 hover:bg-blue-500 text-white rounded-2xl p-4 shadow-lg border-b-4 border-blue-600 transition transform hover:-translate-y-1">
                <div class="text-2xl mb-1">物品分类层</div>
                <div class="text-sm opacity-90">难度：⭐⭐⭐ (8-9岁)</div>
            </button>
        </div>
    </div>

    <!-- 游戏主界面-->
    <div id="game-screen" class="hidden absolute inset-0 flex flex-col bg-[#FFF9E6]">
        <!-- 顶部导航 -->
        <div class="h-16 bg-white/50 backdrop-blur-sm shadow-sm flex items-center justify-between px-4 z-10">
            <button onclick="showHome()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-full font-bold shadow-sm">
                返回
            </button>
            <div class="text-xl md:text-2xl text-[#2C5282] font-bold" id="game-title">关卡名称</div>
            <div class="w-20 text-right text-lg text-green-600 font-bold" id="score-display">0/0</div>
        </div>

        <!-- 游戏提示 -->
        <div class="text-center py-2 text-gray-600 font-bold text-lg px-4" id="game-desc">
            点点说：把相同的放在一起！
        </div>

        <!-- 拖拽区域 (散落的物品 -->
        <div id="play-area" class="flex-1 relative w-full max-w-4xl mx-auto">
            <!-- 物品将通过JS动态生成在这里 -->
        </div>

        <!-- 目标箱子区域 -->
        <div id="bins-area" class="h-48 md:h-64 bg-yellow-100/50 border-t-4 border-yellow-200 flex justify-center items-end pb-4 md:pb-8 gap-4 md:gap-12 px-4 z-0">
            <!-- 箱子将通过JS动态生成在这里 -->
        </div>
        
        <!-- 装饰点点 -->
        <img src="../../characters/characters/diandian.png" alt="点点" class="absolute bottom-4 right-4 w-20 h-24 object-contain opacity-80 pointer-events-none" />
    </div>

    <!-- 成功弹窗 -->
    <div id="success-modal" class="hidden absolute inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl border-8 border-yellow-400 modal-enter relative">
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 text-6xl">🌟</div>
            <h2 class="text-3xl text-green-600 font-bold mb-4 mt-4">太棒啦！分类完成：</h2>
            <p class="text-xl text-gray-700 mb-6">点点胸口亮起了一颗小星星：<br>你学会了新本领！</p>
            <div class="flex justify-center gap-4">
                <button onclick="showHome()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-3 rounded-full font-bold text-lg shadow-md transition">
                    返回首页                </button>
                <button onclick="nextLevel()" id="next-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-full font-bold text-lg shadow-md shadow-blue-500/50 transition">
                    下一关                </button>
            </div>
        </div>
    </div>

    <!-- 粒子特效画布 -->
    <canvas id="confetti" class="absolute inset-0 pointer-events-none z-50 hidden"></canvas>

<script>
    // --- SVG 资产生成器---
const SVGs = {
        diandian: `
            <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <!-- 天线 -->
                <line x1="50" y1="30" x2="50" y2="10" stroke="#A0AEC0" stroke-width="3" stroke-linecap="round"/>
                <circle cx="50" cy="10" r="6" fill="#D6BCFA">
                    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
                </circle>
                <!-- 云朵身体 -->
                <path d="M 30 50 Q 15 50 15 65 Q 15 80 30 80 L 70 80 Q 85 80 85 65 Q 85 50 70 50 Q 65 35 50 35 Q 35 35 30 50 Z" fill="white" stroke="#E2E8F0" stroke-width="3"/>
                <!-- 屏幕脸-->
                <rect x="30" y="55" width="40" height="16" rx="8" fill="#1A202C"/>
                <!-- 眼睛 -->
                <line x1="38" y1="63" x2="44" y2="63" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
                <line x1="56" y1="63" x2="62" y2="63" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
                <!-- 腮线 -->
                <circle cx="25" cy="68" r="4" fill="#FED7E2"/>
                <circle cx="75" cy="68" r="4" fill="#FED7E2"/>
                <!-- 胸口星星 -->
                <polygon points="50,85 53,92 60,92 54,97 56,104 50,100 44,104 46,97 40,92 47,92" fill="#F6E05E"/>
                <!-- 手臂 -->
                <path d="M 20 70 Q 10 80 15 90" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
                <path d="M 80 70 Q 90 80 85 90" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
            </svg>`,
        tuantuan: `
            <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <!-- 头发 -->
                <path d="M 30 40 Q 50 20 70 40 Q 80 50 75 60 L 25 60 Q 20 50 30 40 Z" fill="#5D4037"/>
                <path d="M 40 30 Q 50 20 60 30" fill="none" stroke="#4E342E" stroke-width="4" stroke-linecap="round"/>
                <!-- 脸-->
                <circle cx="50" cy="55" r="22" fill="#FFE0B2"/>
                <!-- 眼睛 -->
                <circle cx="42" cy="52" r="2.5" fill="#3E2723"/>
                <circle cx="58" cy="52" r="2.5" fill="#3E2723"/>
                <!-- 腮线 -->
                <circle cx="35" cy="58" r="3" fill="#FFCDD2"/>
                <circle cx="65" cy="58" r="3" fill="#FFCDD2"/>
                <!-- 嘴巴 (第 -->
                <path d="M 46 62 Q 50 66 54 62" fill="none" stroke="#3E2723" stroke-width="2" stroke-linecap="round"/>
                <!-- 身体 (橙色外套，蓝色背带裤) -->
                <path d="M 35 75 L 65 75 L 70 110 L 30 110 Z" fill="#FF9800"/>
                <path d="M 40 85 L 60 85 L 65 110 L 35 110 Z" fill="#4FC3F7"/>
                <!-- 手臂 -->
                <path d="M 35 80 Q 25 90 28 100" fill="none" stroke="#FF9800" stroke-width="8" stroke-linecap="round"/>
                <path d="M 65 80 Q 75 90 72 100" fill="none" stroke="#FF9800" stroke-width="8" stroke-linecap="round"/>
            </svg>`,
        box: (color, label) => `
            <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-md">
                <!-- 箱子后壁 -->
                <path d="M 10 20 L 90 20 L 85 70 L 15 70 Z" fill="${shadeColor(color, -20)}"/>
                <!-- 标签背景 -->
                <rect x="25" y="35" width="50" height="20" rx="2" fill="white" stroke="#CBD5E1" stroke-width="2"/>
                <!-- 箱子前壁 -->
                <path d="M 5 25 L 95 25 L 90 75 L 10 75 Z" fill="${color}" stroke="${shadeColor(color, -10)}" stroke-width="2"/>
                <rect x="25" y="40" width="50" height="20" rx="2" fill="white" />
                <text x="50" y="54" font-family="sans-serif" font-weight="bold" font-size="12" fill="#333" text-anchor="middle">${label}</text>
                <!-- 边缘高光 -->
                <path d="M 5 25 L 95 25" stroke="white" stroke-width="2" opacity="0.5"/>
            </svg>`,
        sock: (color, patternType) => {
            // 确保颜色是有效的六位十六进制
const safeColor = color || '#EF4444';
            const pId = Math.random().toString(36).substring(2, 9); // 生成随机ID防冲突
let defs = '';
            let patternFill = '';
            
            // 独立为每个袜子生成高亮加粗图框
if (patternType === 'stripe') {
                defs = `
                <defs>
                    <pattern id="p-stripe-${pId}" width="16" height="16" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
                        <line x1="0" y1="0" x2="0" y2="16" stroke="rgba(255,255,255,0.9)" stroke-width="6"/>
                    </pattern>
                </defs>`;
                patternFill = `fill="url(#p-stripe-${pId})"`;
            } else if (patternType === 'dot') {
                defs = `
                <defs>
                    <pattern id="p-dot-${pId}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
                        <circle cx="8" cy="8" r="4.5" fill="rgba(255,255,255,0.9)"/>
                    </pattern>
                </defs>`;
                patternFill = `fill="url(#p-dot-${pId})"`;
            }
            
            return `
            <svg viewBox="0 0 40 50" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                ${defs}
                <!-- 阴影 -->
                <path d="M 12 12 Q 12 25 22 28 Q 28 30 28 42 Q 28 48 20 48 Q 10 48 8 38 Q 6 25 12 12 Z" fill="rgba(0,0,0,0.1)" transform="translate(2,2)"/>
                <!-- 袜子主体 -->
                <path id="sock-body" d="M 12 10 L 26 10 Q 28 10 28 15 L 28 25 Q 28 32 32 35 Q 36 38 35 45 Q 34 50 25 50 L 15 50 Q 8 50 6 42 Q 4 30 12 25 Z" fill="${safeColor}"/>
                <!-- 花纹图层 -->
                ${patternFill ? `<path d="M 12 10 L 26 10 Q 28 10 28 15 L 28 25 Q 28 32 32 35 Q 36 38 35 45 Q 34 50 25 50 L 15 50 Q 8 50 6 42 Q 4 30 12 25 Z" ${patternFill}/>` : ''}
                <!-- 袜口和脚跟脚尖装饰(半透明白色) -->
                <rect x="11" y="8" width="16" height="6" rx="2" fill="rgba(255,255,255,0.6)"/>
                <path d="M 28 25 Q 25 28 28 32 Z" fill="rgba(255,255,255,0.3)"/>
                <path d="M 35 45 Q 30 45 25 50 Q 32 50 35 45 Z" fill="rgba(255,255,255,0.3)"/>
            </svg>`;
        },
        toyCar: `
            <svg viewBox="0 0 50 30" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                <path d="M 10 15 L 15 5 L 35 5 L 40 15 L 48 15 L 48 25 L 2 25 L 2 15 Z" fill="#3B82F6" stroke="#2563EB" stroke-width="2"/>
                <rect x="18" y="7" width="14" height="8" fill="#DBEAFE"/>
                <circle cx="12" cy="25" r="5" fill="#1F2937"/>
                <circle cx="12" cy="25" r="2" fill="#D1D5DB"/>
                <circle cx="38" cy="25" r="5" fill="#1F2937"/>
                <circle cx="38" cy="25" r="2" fill="#D1D5DB"/>
            </svg>`
    };

    // 辅助函数：计算深浅色
function shadeColor(color, percent) {
        var R = parseInt(color.substring(1,3),16);
        var G = parseInt(color.substring(3,5),16);
        var B = parseInt(color.substring(5,7),16);
        R = parseInt(R * (100 + percent) / 100);
        G = parseInt(G * (100 + percent) / 100);
        B = parseInt(B * (100 + percent) / 100);
        R = (R<255)?R:255;  G = (G<255)?G:255;  B = (B<255)?B:255;
        var RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
        var GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
        var BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
        return "#"+RR+GG+BB;
    }

    // 初始化固定SVG

    
    

    // --- 游戏数据配置 ---
const LEVELS = {
        1: {
            title: "颜色大本营",
            desc: "3-5岁：把相同颜色的袜子放到对应的箱子里！",
            bins: [
                { id: 'red', label: '红色袜子', color: '#FCA5A5' },
                { id: 'blue', label: '蓝色袜子', color: '#93C5FD' }
            ],
            generateItems: () => {
                let items = [];
                // 生成纯色袜子，无图案
for(let i=0; i<4; i++) items.push({ id:`r${i}`, matchId: 'red', svg: SVGs.sock('#EF4444', '') });
                for(let i=0; i<4; i++) items.push({ id:`b${i}`, matchId: 'blue', svg: SVGs.sock('#3B82F6', '') });
                return items.sort(() => Math.random() - 0.5);
            }
        },
        2: {
            title: "规则大侦探",
            desc: "6-7岁：按花纹分类！条纹去一边，波点去另一边" ,
            bins: [
                { id: 'stripe', label: '条纹袜子', color: '#FCD34D' },
                { id: 'dot', label: '波点袜子', color: '#6EE7B7' }
            ],
            generateItems: () => {
                let items = [];
                // 使用不同的底色，但强调图框
const colors = ['#EF4444', '#3B82F6', '#F59E0B', '#8B5CF6'];
                for(let i=0; i<4; i++) items.push({ id:`s${i}`, matchId: 'stripe', svg: SVGs.sock(colors[i%4], 'stripe') });
                for(let i=0; i<4; i++) items.push({ id:`d${i}`, matchId: 'dot', svg: SVGs.sock(colors[(i+1)%4], 'dot') });
                return items.sort(() => Math.random() - 0.5);
            }
        },
        3: {
            title: "物品分类层",
            desc: "8-9岁：不仅是袜子，把不同种类的物品分开吧！",
            bins: [
                { id: 'sock', label: '袜子', color: '#FDBA74' },
                { id: 'toy', label: '玩具车', color: '#A7F3D0' }
            ],
            generateItems: () => {
                let items = [];
                const colors = ['#EF4444', '#F59E0B', '#10B981', '#8B5CF6'];
                // 袜子可以有各种颜色和图案
for(let i=0; i<5; i++) items.push({ id:`sock${i}`, matchId: 'sock', svg: SVGs.sock(colors[i%4], i%2===0?'stripe':'') });
                for(let i=0; i<5; i++) items.push({ id:`toy${i}`, matchId: 'toy', svg: SVGs.toyCar });
                return items.sort(() => Math.random() - 0.5);
            }
        }
    };

    // --- 游戏状态 ---
let currentLevel = 1;
    let totalItems = 0;
    let placedItems = 0;
    
    // 拖拽状态
let draggedElement = null;
    let offsetX = 0;
    let offsetY = 0;
    let initialX = 0;
    let initialY = 0;

    // --- 核心逻辑 ---

    function showHome() {
        document.getElementById('home-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('success-modal').classList.add('hidden');
        stopConfetti();
    }

    function startGame(level) {
        currentLevel = level;
        const config = LEVELS[level];
        
        document.getElementById('game-title').innerText = config.title;
        document.getElementById('game-desc').innerText = config.desc;
        
        // 更新按钮
const nextBtn = document.getElementById('next-btn');
        if(level === 3) {
            nextBtn.innerText = "再玩一次";
            nextBtn.onclick = () => startGame(1);
        } else {
            nextBtn.innerText = "下一关";
            nextBtn.onclick = () => nextLevel();
        }

        // 渲染箱子
const binsArea = document.getElementById('bins-area');
        binsArea.innerHTML = '';
        config.bins.forEach(bin => {
            const binDiv = document.createElement('div');
            binDiv.className = 'w-32 h-24 md:w-40 md:h-32 relative flex-shrink-0 transition-transform duration-200 bin-target';
            binDiv.dataset.matchId = bin.id;
            binDiv.innerHTML = SVGs.box(bin.color, bin.label);
            binsArea.appendChild(binDiv);
        });

        // 渲染物品
const playArea = document.getElementById('play-area');
        playArea.innerHTML = '';
        const items = config.generateItems();
        totalItems = items.length;
        placedItems = 0;
        updateScore();

        // 获取游玩区域的实际尺寸来分散物品
setTimeout(() => {
            const areaRect = playArea.getBoundingClientRect();
            const margin = 20;
            const itemSize = 60; // 线0px宀
items.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'draggable w-16 h-20 md:w-20 md:h-24';
                el.dataset.matchId = item.matchId;
                el.innerHTML = item.svg;
                
                // 随机分布在中上部
const randomX = margin + Math.random() * (areaRect.width - itemSize - margin*2);
                const randomY = margin + Math.random() * (areaRect.height * 0.6 - itemSize); // 留出底部给箱子
const randomRot = (Math.random() - 0.5) * 60; // -30 to 30 deg

                el.style.left = `${randomX}px`;
                el.style.top = `${randomY}px`;
                el.style.transform = `rotate(${randomRot}deg)`;
                
                // 保存初始变换用于归位
el.dataset.initRot = randomRot;

                // 绑定事件
el.addEventListener('mousedown', dragStart);
                el.addEventListener('touchstart', dragStart, {passive: false});

                playArea.appendChild(el);
            });
        }, 50);

        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('success-modal').classList.add('hidden');
        stopConfetti();
    }

    function nextLevel() {
        startGame(currentLevel + 1);
    }

    function updateScore() {
        document.getElementById('score-display').innerText = `${placedItems}/${totalItems}`;
        if(placedItems === totalItems) {
            setTimeout(showSuccess, 500);
        }
    }

    function showSuccess() {
        document.getElementById('success-modal').classList.remove('hidden');
        startConfetti();
    }

    // --- 拖拽交互逻辑 (支持鼠标和触摀 ---

    function dragStart(e) {
        if (e.type === 'touchstart') e.preventDefault();
        
        draggedElement = e.currentTarget;
        draggedElement.classList.add('is-dragging');
        
        // 移除原有的旋转，方便拖拽
draggedElement.style.transform = `scale(1.1) rotate(0deg)`;

        const rect = draggedElement.getBoundingClientRect();
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

        offsetX = clientX - rect.left;
        offsetY = clientY - rect.top;
        
        // 记录在play-area中的相对初始位置
initialX = parseFloat(draggedElement.style.left);
        initialY = parseFloat(draggedElement.style.top);

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('touchmove', dragMove, {passive: false});
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);
    }

    function dragMove(e) {
        if (!draggedElement) return;
        if (e.type === 'touchmove') e.preventDefault();

        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

        // 相对于play-area定位
const playAreaRect = document.getElementById('play-area').getBoundingClientRect();
        
        let newX = clientX - playAreaRect.left - offsetX;
        let newY = clientY - playAreaRect.top - offsetY;

        draggedElement.style.left = `${newX}px`;
        draggedElement.style.top = `${newY}px`;

        // 检测悬停    
checkBinHover(clientX, clientY);
}

    function checkBinHover(x, y) {
        const bins = document.querySelectorAll('.bin-target');
        let hoverFound = false;
        
        bins.forEach(bin => {
            const rect = bin.getBoundingClientRect();
            // 扩大一点检测范围
if (x > rect.left - 20 && x < rect.right + 20 && y > rect.top - 20 && y < rect.bottom + 20) {
                bin.classList.add('bin-hover');
                hoverFound = true;
            } else {
                bin.classList.remove('bin-hover');
            }
        });
    }

    function dragEnd(e) {
        if (!draggedElement) return;

        const clientX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
        const clientY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY;

        const bins = document.querySelectorAll('.bin-target');
        let droppedInBin = null;

        bins.forEach(bin => {
            bin.classList.remove('bin-hover');
            const rect = bin.getBoundingClientRect();
            if (clientX > rect.left - 20 && clientX < rect.right + 20 && clientY > rect.top - 20 && clientY < rect.bottom + 20) {
                droppedInBin = bin;
            }
        });

        if (droppedInBin) {
            const requiredMatch = draggedElement.dataset.matchId;
            const binMatch = droppedInBin.dataset.matchId;

            if (requiredMatch === binMatch) {
                // 正确放入
                // 视觉上缩小并消失，或者吸附到箱子旁边
draggedElement.style.transition = 'all 0.3s ease-out';
                
                // 计算箱子中心在play-area的相对坐标
const playAreaRect = document.getElementById('play-area').getBoundingClientRect();
                const binRect = droppedInBin.getBoundingClientRect();
                
                const targetX = binRect.left - playAreaRect.left + (binRect.width/2) - (draggedElement.offsetWidth/2);
                const targetY = binRect.top - playAreaRect.top + 20;

                draggedElement.style.left = `${targetX}px`;
                draggedElement.style.top = `${targetY}px`;
                draggedElement.style.transform = 'scale(0.2) translateY(50px)';
                draggedElement.style.opacity = '0';
                
                // 移除事件防止再次拖拽
draggedElement.removeEventListener('mousedown', dragStart);
                draggedElement.removeEventListener('touchstart', dragStart);
                
                placedItems++;
                updateScore();
                
                // 箱子跳动反馈
droppedInBin.style.transform = 'scale(1.1) translateY(-10px)';
                setTimeout(() => droppedInBin.style.transform = '', 200);

            } else {
                // 错误，弹回原体            
returnToStart();
                // 错误提示动画
droppedInBin.style.transform = 'translateX(-10px)';
                setTimeout(() => droppedInBin.style.transform = 'translateX(10px)', 100);
                setTimeout(() => droppedInBin.style.transform = '', 200);
            }
        } else {
            // 未放入任何箱子，弹回原位
returnToStart();
        }

        draggedElement.classList.remove('is-dragging');
        draggedElement = null;
        
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
        document.removeEventListener('touchend', dragEnd);
    }

    function returnToStart() {
        draggedElement.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        draggedElement.style.left = `${initialX}px`;
        draggedElement.style.top = `${initialY}px`;
        draggedElement.style.transform = `rotate(${draggedElement.dataset.initRot}deg)`;
        
        // 动画结束后移除transition，否则后续拖拽会卡顿
const el = draggedElement;
        setTimeout(() => {
            el.style.transition = 'transform 0.1s';
        }, 300);
    }

    // --- 简单的粒子撒花特效 ---
let confettiInterval;
    function startConfetti() {
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.classList.remove('hidden');

        let particles = [];
        const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d'];

        for (let i = 0; i < 100; i++) {
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2 + 100,
                r: Math.random() * 6 + 4,
                dx: Math.random() * 10 - 5,
                dy: Math.random() * -10 - 5,
                color: colors[Math.floor(Math.random() * colors.length)],
                tilt: Math.floor(Math.random() * 10) - 10,
                tiltAngle: 0,
                tiltAngleInc: (Math.random() * 0.07) + 0.05
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.tiltAngle += p.tiltAngleInc;
                p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle) * 2 + p.dx;
                p.dy += 0.1; // gravity
                p.y += p.dy;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();

                if (p.y > canvas.height) {
                    particles.splice(index, 1);
                }
            });

            if (particles.length > 0) {
                confettiInterval = requestAnimationFrame(draw);
            }
        }
        draw();
    }

    function stopConfetti() {
        cancelAnimationFrame(confettiInterval);
        document.getElementById('confetti').classList.add('hidden');
    }

    // 禁用双指缩放和默认拖拽
document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
</script>
