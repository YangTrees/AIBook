<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第19课：贴标签的老师</title>
    <script src="../../libs/libs/tailwind.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', sans-serif;
            background-color: #FFF9E6;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* 防止拖拽时屏幕滚劀*/
            user-select: none;
        }

        /* 温暖的水彩纹理背晀*/
        .watercolor-bg {
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 200, 150, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(150, 200, 255, 0.2) 0%, transparent 50%);
            background-color: #FFF2D1;
        }

        /* 动画效果 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            75% { transform: translateX(5px) rotate(5deg); }
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .animate-bounce-slow { animation: bounce 3s infinite ease-in-out; }
        .animate-float { animation: float 4s infinite ease-in-out; }
        .animate-pop { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .shake-error { animation: shake 0.4s ease-in-out; }

        /* 卡片和掉落区样式 */
        .game-card {
            box-shadow: 0 8px 16px rgba(139, 90, 43, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            background: white;
            border: 3px solid #E5D3B3;
            border-radius: 16px;
            touch-action: none; /* 关键：确保触摸事件完全交给JS */
        }
        .game-card.dragging {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 15px 25px rgba(139, 90, 43, 0.2);
            z-index: 50;
        }
        
        .drop-zone {
            border: 4px dashed #D4C3A3;
            transition: all 0.3s;
            background: rgba(255,255,255,0.5);
        }
        .drop-zone.highlight {
            border-color: #4A90E2;
            background: rgba(74, 144, 226, 0.1);
            transform: scale(1.05);
        }

        /* ==== 角色气泡新样式：底部中央对话框==== */
        #dialogue-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1.5em;
            border: 4px solid #8B5A2B;
            padding: 15px 20px;
            color: #8B5A2B;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 8px 16px rgba(139,90,43,0.2);
            z-index: 60;
            pointer-events: none; /* 防止阻挡点击 */
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        /* 气泡显示时的动画 */
        #dialogue-box.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }

        /* 指向角色的彩色小三角指示器*/
        #dialogue-box:after {
            content: '';
            position: absolute;
            bottom: -12px;
            border: 12px solid transparent;
            border-top-color: white;
            border-bottom: 0;
            transition: all 0.3s;
        }
        #dialogue-box:before {
            content: '';
            position: absolute;
            bottom: -18px;
            border: 18px solid transparent;
            border-top-color: #8B5A2B;
            border-bottom: 0;
            transition: all 0.3s;
        }

        /* 指向团团（左侧） */
        #dialogue-box.tuantuan-speaking:after { left: 20%; border-top-color: #FDE68A; }
        #dialogue-box.tuantuan-speaking:before { left: calc(20% - 6px); }
        #dialogue-box.tuantuan-speaking { background: #FEF3C7; border-color: #D97706; color: #92400E; }

        /* 指向点点（右侧） */
        #dialogue-box.diandian-speaking:after { left: 80%; border-top-color: #E0F2FE; }
        #dialogue-box.diandian-speaking:before { left: calc(80% - 6px); }
        #dialogue-box.diandian-speaking { background: #F0F9FF; border-color: #0284C7; color: #075985; }

        .detective-card {
            cursor: pointer;
            transition: all 0.2s;
        }
        .detective-card:hover {
            transform: translateY(-5px);
        }

        /* 粒子效果容器 */
        #confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 50%;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body class="watercolor-bg w-full h-screen text-gray-800 flex flex-col">

    <div id="app" class="relative w-full h-full flex flex-col items-center max-w-4xl mx-auto">
        
        <!-- Header -->
        <header class="w-full flex justify-between items-center p-4 z-20">
            <button id="btn-back" class="hidden bg-white border-2 border-[#8B5A2B] text-[#8B5A2B] px-4 py-2 rounded-full font-bold shadow-[2px_4px_0_#8B5A2B] active:translate-y-[2px] active:shadow-[0_2px_0_#8B5A2B] transition-all" onclick="goHome()">
                🏠 返回主页
            </button>
            <div id="score-display" class="hidden text-2xl font-bold text-[#8B5A2B] bg-white px-6 py-2 rounded-full border-2 border-[#8B5A2B] shadow-sm">
                🌟 <span id="score-val">0</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 w-full flex flex-col items-center justify-center p-4 z-10 relative">
            <!-- 动态注入内宀-->
        </main>

        <!-- Characters Area (Bottom) -->
        <div id="characters-container" class="absolute bottom-[-20px] w-full flex justify-between items-end px-4 md:px-10 pointer-events-none z-20 hidden">
            <!-- 团团 (男孩) -->
            <div class="relative animate-float" style="animation-delay: 0s;">
                <img src="../../characters/characters/tuantuan.png" alt="团团" style="width:140px;height:180px;" class="md:w-[180px] md:h-[220px]"/>
            </div>

            <!-- 统一的底部对话框 -->
            <div id="dialogue-box">
                <!-- 对话文本在这里动态插兀-->
                <span id="dialogue-text">加载一..</span>
            </div>

            <!-- 点点 (云朵机器人 -->
            <div class="relative animate-float" style="animation-delay: 1s;">
                <img src="../../characters/characters/diandian.png" alt="点点" style="width:150px;height:170px;" class="md:w-[200px] md:h-[220px]"/>
            </div>
        </div>

        <div id="confetti-container"></div>
    </div>

    <script>
        // --- 游戏数据 ---
        // 扩充素材庀(增加多样性，体现AI学习特征)
const ASSETS = {
            cat: ['🐱', '🐈', '😹', '😻'],
            dog: ['🐶', '🐕', '🦮', '🐩'],
            rabbit: ['🐰', '🐇'],
            apple: ['🍎', '🍏'],
            banana: ['🍌']
        };

        const ITEMS = {
            cat: { id: 'cat', name: '猫咪', type: 'animal' },
            dog: { id: 'dog', name: '小狗', type: 'animal' },
            rabbit: { id: 'rabbit', name: '兔子', type: 'animal' },
            apple: { id: 'apple', name: '苹果', type: 'fruit' },
            banana: { id: 'banana', name: '香蕉', type: 'fruit' }
        };

        const LEVELS = {
            1: { title: "猫狗对对碰", age: "3-5岁", desc: "教点点认识动物", targets: ['cat', 'dog'], trainCount: 5, testCount: 3 },
            2: { title: "动物大集合", age: "6-7岁", desc: "认识更多小动物", targets: ['cat', 'dog', 'rabbit'], trainCount: 6, testCount: 3 },
            3: { title: "标签小侦探", age: "8-9岁", desc: "找出贴错标签的卡片！", type: 'detective' }
        };

        // --- 状态管琀---
let currentLevel = 0;
        let score = 0;
        let currentQueue = [];
        let isDragging = false;
        let draggedItemData = null;
        let gameState = 'intro'; // 'intro' -> 'training' -> 'testing' -> 'end'
let testQueue = [];

        // --- DOM 元素 ---
const mainContent = document.getElementById('main-content');
        const btnBack = document.getElementById('btn-back');
        const scoreDisplay = document.getElementById('score-display');
        const scoreVal = document.getElementById('score-val');
        const charContainer = document.getElementById('characters-container');
        
        // 统一对话框元紀
const dialogueBox = document.getElementById('dialogue-box');
        const dialogueText = document.getElementById('dialogue-text');
        
        const dEyes = document.getElementById('diandian-eyes');
        const dScreen = document.getElementById('diandian-screen-icon');
        const tMouth = document.getElementById('tuantuan-mouth');

        // --- 核心流程 ---
        
        function init() {
            goHome();
        }

        function goHome() {
            currentLevel = 0;
            btnBack.classList.add('hidden');
            scoreDisplay.classList.add('hidden');
            charContainer.classList.add('hidden');
            
            mainContent.innerHTML = `
                <div class="text-center animate-pop max-w-2xl">
                    <h1 class="text-5xl md:text-6xl text-[#8B5A2B] font-bold mb-4 drop-shadow-md">贴标签的老师</h1>
                    <h2 class="text-2xl text-[#D97706] mb-8 bg-white/70 inline-block px-6 py-2 rounded-full border border-[#D97706]">监督学习：提出问题➡️ 训练 ➡️ 验证</h2>
                    
                    <div class="bg-white/90 p-8 rounded-3xl shadow-xl border-4 border-[#FDE047] mb-8 relative">
                        <div class="absolute -top-6 left-1/2 transform -translate-x-1/2 bg-[#F5A623] text-white px-6 py-2 rounded-full font-bold shadow-md">
                            选择分龄关卡
                        </div>
                        <div class="flex flex-col md:flex-row gap-4 mt-4">
                            <button onclick="startGame(1)" class="flex-1 bg-[#FEF3C7] hover:bg-[#FDE68A] border-4 border-[#F5A623] text-[#8B5A2B] p-4 rounded-2xl transition-transform hover:-translate-y-2 shadow-[0_6px_0_#F5A623] active:translate-y-0 active:shadow-none">
                                <div class="text-lg font-bold mb-1">3-5页</div>
                                <div class="text-2xl mb-2">🐱 🐶</div>
                                <div class="font-bold">猫狗对对碀</div>
                            </button>
                            <button onclick="startGame(2)" class="flex-1 bg-[#E0F2FE] hover:bg-[#BAE6FD] border-4 border-[#38BDF8] text-[#1E3A8A] p-4 rounded-2xl transition-transform hover:-translate-y-2 shadow-[0_6px_0_#38BDF8] active:translate-y-0 active:shadow-none">
                                <div class="text-lg font-bold mb-1">6-7页</div>
                                <div class="text-2xl mb-2">🐱 🐶 🐰</div>
                                <div class="font-bold">动物大集合</div>
                            </button>
                            <button onclick="startGame(3)" class="flex-1 bg-[#FCE7F3] hover:bg-[#FBCFE8] border-4 border-[#EC4899] text-[#831843] p-4 rounded-2xl transition-transform hover:-translate-y-2 shadow-[0_6px_0_#EC4899] active:translate-y-0 active:shadow-none">
                                <div class="text-lg font-bold mb-1">8-9页</div>
                                <div class="text-2xl mb-2">🔍 ❌</div>
                                <div class="font-bold">标签小侦探</div>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function startGame(level) {
            currentLevel = level;
            score = 0;
            scoreVal.innerText = score;

            btnBack.classList.remove('hidden');
            scoreDisplay.classList.remove('hidden');
            charContainer.classList.remove('hidden');

            // 统一使用侦探游戏
            initDetectiveGame();
        }

        // ==========================================
        // 关卡 3：标签小侦探 (多轮寻找错误数据)
        // ==========================================
let detectiveRounds = [
            { totalCards: 4, minWrongs: 2 }, // 第一轮：4张卡：张错
            { totalCards: 6, minWrongs: 3 }, // 第二轮：6张卡：张错
            { totalCards: 8, minWrongs: 4 }  // 第三轮：8张卡：张错
        ];
        let currentDetectiveRound = 0;
        let detectiveTimer = null;

        function initDetectiveGame() {
            gameState = 'detective';
            currentDetectiveRound = 0;
            score = 0;
            scoreVal.innerText = score;
            startDetectiveRound();
        }

        function startDetectiveRound() {
            if (currentDetectiveRound >= detectiveRounds.length) {
                // 所有轮次结条
setTimeout(() => showSuccessScreen("复盘成功：<br/>贴错标签就会学错：<br/>纠正后点点变得更准啦！"), 1000);
                return;
            }

            const roundConfig = detectiveRounds[currentDetectiveRound];
            
            // 生成包含错误标签的数据池
const allTargetKeys = Object.keys(ITEMS);
            let gameData = [];
            
            // 确保生成足够数量的错误数据
let wrongCount = 0;
            while (wrongCount < roundConfig.minWrongs) {
                const realKey = allTargetKeys[Math.floor(Math.random() * allTargetKeys.length)];
                let fakeKey = allTargetKeys[Math.floor(Math.random() * allTargetKeys.length)];
                while (fakeKey === realKey) {
                    fakeKey = allTargetKeys[Math.floor(Math.random() * allTargetKeys.length)];
                }
                const icon = ASSETS[realKey][Math.floor(Math.random() * ASSETS[realKey].length)];
                
                gameData.push({ real: realKey, icon: icon, label: fakeKey, isWrong: true, id: `card-${gameData.length}` });
                wrongCount++;
            }

            // 补充剩余的正确卡片
while (gameData.length < roundConfig.totalCards) {
                const realKey = allTargetKeys[Math.floor(Math.random() * allTargetKeys.length)];
                const icon = ASSETS[realKey][Math.floor(Math.random() * ASSETS[realKey].length)];
                gameData.push({ real: realKey, icon: icon, label: realKey, isWrong: false, id: `card-${gameData.length}` });
            }

            // 打乱顺序
gameData.sort(() => 0.5 - Math.random());
            currentQueue = gameData; // 记录当前轮次数据用于判断

            // 决定网格列数 (根据卡片数量动态调整
const gridCols = roundConfig.totalCards <= 4 ? 'grid-cols-2' : (roundConfig.totalCards <= 6 ? 'grid-cols-2 md:grid-cols-3' : 'grid-cols-2 md:grid-cols-4');

            mainContent.innerHTML = `
                <div class="w-full max-w-4xl flex flex-col items-center h-full pb-32 pt-2">
                    <h2 class="text-2xl md:text-3xl text-[#8B5A2B] font-bold mb-2 animate-pop">第${currentDetectiveRound + 1} 轮：找出错误标签：</h2>
                    
                    <div class="w-full max-w-md bg-gray-200 rounded-full h-3 mb-4 overflow-hidden border-2 border-gray-300 relative">
                        <div id="detective-time-bar" class="bg-red-400 h-full w-full transition-all duration-1000 linear"></div>
                        <div class="absolute inset-0 flex items-center justify-center text-xs text-gray-700 font-bold mix-blend-color-burn">侦探倒计时</div>
                    </div>

                    <p class="text-[#D97706] mb-2 font-bold bg-white/60 px-4 py-1 rounded-full text-sm md:text-base">找出迀${roundConfig.totalCards} 张卡片中，所有【图文不符】的错卡片！</p>
                    
                    <div id="detective-grid" class="grid ${gridCols} gap-3 md:gap-6 w-full px-2 mt-2">
                        ${gameData.map((d, index) => `
                            <div class="detective-card bg-white p-3 rounded-2xl border-4 border-[#E5D3B3] flex flex-col items-center justify-center animate-pop shadow-md relative" 
                                 style="animation-delay: ${index * 0.1}s"
                                 onclick="handleDetectiveClick(this, ${!!d.isWrong}, '${d.id}')">
                                <div class="text-4xl md:text-5xl mb-2">${d.icon}</div>
                                <div class="w-full border-t-2 border-dashed border-gray-300 pt-2 text-center relative">
                                    <span class="bg-yellow-200 px-2 py-1 rounded text-base md:text-lg font-bold text-gray-800 label-text line-clamp-1">${ITEMS[d.label].name}</span>
                                    <div class="status-icon absolute -top-4 -right-2 text-2xl hidden drop-shadow-md"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            setCharEmotion('sad');
            charSpeak('tuantuan', `第${currentDetectiveRound + 1} 轮开始了，仔细甄别！`);
            
            // 启动软倒计时(每轮基确时间 + 卡片数附加时间
startDetectiveTimer(15 + roundConfig.totalCards * 2);
        }

        function startDetectiveTimer(seconds) {
            if (detectiveTimer) clearInterval(detectiveTimer);
            const timeBar = document.getElementById('detective-time-bar');
            let timeLeft = seconds;
            
            detectiveTimer = setInterval(() => {
                timeLeft--;
                if(timeBar) {
                    const pct = (timeLeft / seconds) * 100;
                    timeBar.style.width = `${pct}%`;
                    if (pct < 30) timeBar.classList.replace('bg-red-400', 'bg-red-600');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(detectiveTimer);
                    // 时间到，直接显示剩余的错误并进入下一轮                
revealRemainingWrongsAndNextRound();
}
            }, 1000);
        }

        function revealRemainingWrongsAndNextRound() {
            setCharEmotion('confused');
            charSpeak('diandian', '哎呀，时间到了，我还是学到了错误数据...');
            
            const cards = document.querySelectorAll('.detective-card');
            cards.forEach((card, index) => {
                const data = currentQueue[index];
                if (data.isWrong && !card.classList.contains('resolved')) {
                    card.classList.add('border-red-500', 'bg-red-50', 'shake-error');
                    card.querySelector('.status-icon').innerHTML = '❌';
                    card.querySelector('.status-icon').classList.remove('hidden');
                }
            });

            setTimeout(() => {
                currentDetectiveRound++;
                startDetectiveRound();
            }, 3000);
        }

        function handleDetectiveClick(card, isWrong, cardId) {
            if (card.classList.contains('resolved')) return;

            const statusIcon = card.querySelector('.status-icon');
            const labelText = card.querySelector('.label-text');

            if (isWrong) {
                // 找对错误了            
card.classList.add('resolved');
                card.classList.remove('border-[#E5D3B3]');
                card.classList.add('border-green-500', 'bg-green-50');
                labelText.classList.add('line-through', 'text-gray-400');
                statusIcon.innerHTML = '✅';
                statusIcon.classList.remove('hidden');
                
                score += 20;
                scoreVal.innerText = score;
                createConfetti(card.getBoundingClientRect(), 5); // 减少单次找对的撒花量，以免遮挡视线                
setCharEmotion('happy');
                charSpeak('diandian', '哦！原来这张是错的！');

                // 棕查当前轮次是否找完所有错误的卡片
const remainingWrongs = currentQueue.filter(d => d.isWrong && !document.querySelectorAll('.detective-card')[currentQueue.indexOf(d)].classList.contains('resolved')).length;
                
                if (remainingWrongs === 0) {
                    if (detectiveTimer) clearInterval(detectiveTimer);
                    
                    setCharEmotion('happy');
                    charSpeak('tuantuan', `太棒了！第${currentDetectiveRound + 1} 轮的所有错误都被清除了！`);
                    createConfetti(document.getElementById('detective-grid').getBoundingClientRect(), 30); // 轮次结束大撒花
setTimeout(() => {
                        currentDetectiveRound++;
                        startDetectiveRound();
                    }, 2500);
                }

            } else {
                // 点错了（点到了正确的卡片：            
card.classList.add('shake-error');
setTimeout(() => card.classList.remove('shake-error'), 400);
                
                setCharEmotion('sad');
                charSpeak('tuantuan', '哎呀，这张标签没贴错，再仔细看看！');
                
                // 扣除一点时间作为惩罀            
if(detectiveTimer) {
const timeBar = document.getElementById('detective-time-bar');
                   let currentWidth = parseFloat(timeBar.style.width) || 100;
                   timeBar.style.width = `${Math.max(0, currentWidth - 10)}%`;
                }
            }
        }

        // ==========================================
        // 游戏通关结算
        // ==========================================
        function showSuccessScreen(msg) {
            gameState = 'end';
            mainContent.innerHTML = `
                <div class="text-center animate-pop bg-white p-6 md:p-10 rounded-3xl border-4 border-yellow-400 shadow-xl max-w-xl w-11/12 mt-10">
                    <div class="text-6xl md:text-7xl mb-4">🌟🌟🌟</div>
                    <h2 class="text-2xl md:text-3xl text-[#8B5A2B] font-bold mb-6">${msg}</h2>
                    <div class="bg-blue-50 p-4 rounded-xl text-left mb-8 border border-blue-200 text-sm md:text-base">
                        <h3 class="font-bold text-blue-800 mb-2">📌 监督学习复盘：</h3>
                        <p class="text-gray-700 mb-2">1. 机器本身不认识事物，需要人类提供带有正确标签的<strong>数据</strong>进行训练 </p>
                        <p class="text-gray-700 mb-2">2. 如果给的数据标签的<strong>错误</strong>的，AI也会学错（垃圾进，垃圾出） </p>
                        <p class="text-gray-700">3. 训练完成后，我们可以用新数据<strong>测试验证</strong>它学得准不准 </p>
                    </div>
                    <button onclick="goHome()" class="bg-[#F5A623] text-white px-8 py-3 rounded-full font-bold text-xl shadow-[0_6px_0_#D97706] hover:-translate-y-1 active:translate-y-2 active:shadow-none transition-all">
                        完成本课，回到首页                    </button>
                </div>
            `;
            setCharEmotion('happy');
            charSpeak('tuantuan', '今天的小作品收进档案袋啦！');
            setTimeout(() => {
                charSpeak('diandian', '我又学会了新本领！谢谢老师！');
            }, 3000);
            
            // 全屏撒花
createConfetti(document.body.getBoundingClientRect(), 50);
        }

        // ==========================================
        // 统一角色对话框系练        // ==========================================
let dialogueTimeout;
        function charSpeak(charId, text) {
            // 清除之前的对话定时器
if(dialogueTimeout) clearTimeout(dialogueTimeout);
            
            dialogueBox.classList.remove('show', 'tuantuan-speaking', 'diandian-speaking');
            
            // 短暂延迟确保过渡动画重新触发
setTimeout(() => {
                dialogueText.innerText = text;
                
                if (charId === 'tuantuan') {
                    dialogueBox.classList.add('tuantuan-speaking');
                } else {
                    dialogueBox.classList.add('diandian-speaking');
                }
                
                dialogueBox.classList.add('show');
                
                // 3.5秒后自动隐藏
                dialogueTimeout = setTimeout(() => {
                    dialogueBox.classList.remove('show');
                }, 3500);
            }, 50);
        }

        function setCharEmotion(emotion) {
            if (emotion === 'happy') {
                tMouth.setAttribute('d', 'M85 105 Q100 120 115 105 L115 110 Q100 125 85 110 Z'); // 大笑
tMouth.setAttribute('fill', '#EF4444');
                
                dEyes.innerHTML = `
                    <path d="M75 105 Q85 95 95 105" stroke="#38BDF8" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M125 105 Q135 95 145 105" stroke="#38BDF8" stroke-width="4" fill="none" stroke-linecap="round"/>
                `; // 开心眼 ^^
dScreen.setAttribute('d', 'M95 170 L105 180 L125 160'); // 屏幕变勾
dScreen.setAttribute('stroke', '#10B981');
                
            } else if (emotion === 'sad' || emotion === 'confused') {
                tMouth.setAttribute('d', 'M90 115 Q100 105 110 115'); // 撇嘴
tMouth.setAttribute('fill', 'none');
                
                dEyes.innerHTML = `
                    <circle cx="85" cy="105" r="8" fill="#38BDF8"/>
                    <circle cx="135" cy="105" r="8" fill="#38BDF8"/>
                    <path d="M75 95 L95 100" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
                    <path d="M125 100 L145 95" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
                `; // 皱眉眼            
dScreen.setAttribute('d', 'M110 155 V175 M110 185 V188'); // 屏幕变问叀感叹叀            
dScreen.setAttribute('stroke', '#EF4444');
} else {
                tMouth.setAttribute('d', 'M90 105 Q100 115 110 105'); // 微笑
tMouth.setAttribute('fill', 'none');
                
                dEyes.innerHTML = `
                    <circle cx="85" cy="105" r="8" fill="#38BDF8"/>
                    <circle cx="135" cy="105" r="8" fill="#38BDF8"/>
                `; // 正常圆眼
dScreen.setAttribute('d', 'M95 175 L110 160 L125 175'); // 屏幕书本图标
dScreen.setAttribute('stroke', '#10B981');
            }
        }

        function createConfetti(rect, count = 20) {
            const container = document.getElementById('confetti-container');
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#66bb6a'];
            
            for (let i = 0; i < count; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // 起点在传入的rect中心附近
const startX = rect.left + rect.width / 2 + (Math.random() - 0.5) * 50;
                const startY = rect.top + rect.height / 2;
                
                conf.style.left = startX + 'px';
                conf.style.top = startY + 'px';
                
                // 随机抛物线偏秀
const tx = (Math.random() - 0.5) * 200;
                conf.style.transform = `translateX(${tx}px)`;
                
                // 动画时长和延迀            
conf.style.animationDuration = (Math.random() * 1 + 1) + 's';
                conf.style.animationTimingFunction = 'cubic-bezier(.37,0,.63,1)';
                
                container.appendChild(conf);
                
                // 清理DOM
setTimeout(() => conf.remove(), 2000);
            }
        }

        // 初始化
window.onload = init;

    </script>
</body>
